# ESP32 Motor Direction Controller
# Uses two opto-isolated relays in H-bridge configuration with INA226 current sensing.
# See ESP32-MOTOR-CONTROLLER-DESIGN.md for full schematic and parts list.
#
# Relay truth table (matches relay-current-cover-controller.yaml pattern):
#   relay1     relay2    motor     state
#   OFF (NC)   OFF (NC)  -  +     direction A (e.g., opening)
#   ON  (NO)   ON  (NO)  +  -     direction B (e.g., closing)
#   OFF        ON        -  -     stopped (brake)
#   ON         OFF       +  +     stopped (brake)

substitutions:
  device_name: motor-controller
  friendly_name: Motor Controller
  project_name: motor-controller
  project_version: "1.0.0"
  log_level: DEBUG

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: devices/xiao-esp32s3.yaml
      - path: i2c/ina226.yaml
        vars:
          i2c_bus_id: i2c_bus
          i2c_address: "0x40"
          ina226_sensor_id: motor_current_sensor
          ina226_current_sensor_id: motor_current
          ina226_current_sensor_name: "Motor Current"
          ina226_shunt_resistance: "0.001"
          ina226_max_current: "20A"

      # Uncomment to use relay-current-cover-controller for cover/awning control:
      # - path: packages/relay-current-cover-controller.yaml
      #   vars:
      #     cover_name: "Motor Cover"
      #     cover_id: motor_cover
      #     current_sensor_id: motor_current
      #     current_sensor_parent_id: motor_current_sensor
      #     relay_1_id: relay_a
      #     relay_2_id: relay_b
      #     moving_current_threshold: "0.01"
      #     obstacle_current_threshold: "3.5"

      - path: packages/ota/http_update.yaml

# I2C bus for INA226 — XIAO ESP32-S3 default I2C pins
i2c:
  id: i2c_bus
  sda: GPIO5   # D4
  scl: GPIO6   # D5
  scan: true

# Relay control switches (active-HIGH: GPIO HIGH = relay energized via optocoupler)
switch:
  - platform: gpio
    id: relay_a
    name: "Relay A (Direction)"
    pin:
      number: GPIO1   # D0
      mode: output
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    id: relay_b
    name: "Relay B (Direction)"
    pin:
      number: GPIO2   # D1
      mode: output
    restore_mode: ALWAYS_OFF
    internal: true

  # Convenience switches for motor direction
  - platform: template
    id: motor_forward
    name: "Motor Forward"
    icon: "mdi:arrow-right"
    optimistic: true
    turn_on_action:
      - switch.turn_off: motor_reverse
      - switch.turn_off: relay_a
      - switch.turn_off: relay_b
      # Both relays OFF = NC position = Direction A
      - logger.log: "Motor forward: both relays OFF (NC position)"
    turn_off_action:
      - switch.turn_off: relay_a
      - switch.turn_on: relay_b
      # Relay A OFF + Relay B ON = both motor terminals at GND = Stopped
      - logger.log: "Motor stopped"

  - platform: template
    id: motor_reverse
    name: "Motor Reverse"
    icon: "mdi:arrow-left"
    optimistic: true
    turn_on_action:
      - switch.turn_off: motor_forward
      - switch.turn_on: relay_a
      - switch.turn_on: relay_b
      # Both relays ON = NO position = Direction B
      - logger.log: "Motor reverse: both relays ON (NO position)"
    turn_off_action:
      - switch.turn_off: relay_a
      - switch.turn_on: relay_b
      # Relay A OFF + Relay B ON = both motor terminals at GND = Stopped
      - logger.log: "Motor stopped"

# Physical switch inputs (active-LOW with internal pull-up)
binary_sensor:
  - platform: gpio
    id: switch_1
    name: "Switch 1"
    pin:
      number: GPIO3   # D2
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    # Example: Toggle motor forward on press
    on_press:
      - logger.log: "Switch 1 pressed"
      # Add your automation here, e.g.:
      # - switch.toggle: motor_forward

  - platform: gpio
    id: switch_2
    name: "Switch 2"
    pin:
      number: GPIO4   # D3
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    # Example: Toggle motor reverse on press
    on_press:
      - logger.log: "Switch 2 pressed"
      # Add your automation here, e.g.:
      # - switch.toggle: motor_reverse
