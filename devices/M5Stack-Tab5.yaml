# https://devices.esphome.io/devices/m5stack-tab5/
esphome:
  min_version: 2026.6.0
esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
    #   CONFIG_ESP32P4_DATA_CACHE_64KB: "y"
    #   CONFIG_ESP32P4_DATA_CACHE_LINE_64B: "y"
    #   CONFIG_ESP32P4_INSTRUCTION_CACHE_32KB: "y"
    #   # Moves instructions and read only data from flash into PSRAM on boot.
    #   # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
    #   # Considerably speeds up mWW at the cost of using more PSRAM.
    #   CONFIG_SPIRAM_RODATA: "y"
    #   EXECUTE_FROM_PSRAM: "y" 
    #   CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
    #   CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
    #   CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
    #   CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
    #   CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5    
      CONFIG_CAMERA_SC2336: "y"
    #   CONFIG_SPIRAM: "y" 
    #   CONFIG_SPIRAM_SPEED_200M: "y" 
    #   CONFIG_EXAMPLE_ENABLE_CAM_SENSOR_PIC_HFLIP: "y" 
    #   CONFIG_EXAMPLE_ENABLE_CAM_SENSOR_PIC_VFLIP: "y" 
    #   CONFIG_EXAMPLE_VIDEO_BUFFER_TYPE_DRIVER: "y" 
    #   CONFIG_ESP_VIDEO_ENABLE_HW_H264_VIDEO_DEVICE: "y"
    #   CONFIG_ESP_VIDEO_ENABLE_HW_JPEG_VIDEO_DEVICE: "y"
    advanced:
      enable_idf_experimental_features: true

external_components:
  - source: github://pr#12075
    components: [st7123]
    refresh: 1h

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1
logger:
  hardware_uart: USB_SERIAL_JTAG

psram:
  mode: hex
  speed: 200MHz

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
    scan: true

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable

switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3

  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true

  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0

  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    publish_initial_state: true

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

select:
# The DAC Output select needs to be manually 
# (or with an automation) changed to `LINE1` for the onboard speaker
  - platform: es8388
    dac_output:
      name: DAC Output
    adc_input_mic:
      name: ADC Input Mic

  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

motion:
  - platform: bmi270
    i2c_id: bsp_bus
    address: 0x68          # BMI270 is 0x68 or 0x69 - confirm via the I2C scan in the logs
    accelerometer_range: 4G
    gyroscope_range: 2000DPS
    update_interval: 250ms   # poll-only component (no interrupt/on-change); 250ms = responsive wake

sensor:
  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: "Battery Voltage"
    current:
      id: battery_current
      name: "Battery Current"

    # Battery percentage from pack voltage
    # (2S Li-ion: 6.4V empty = 3.2V/cell .. 8.4V full = 4.2V/cell)
  - platform: template
    name: "Battery Percentage"
    id: battery_percent
    device_class: battery
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      float pct = (v - 6.4f) / (8.4f - 6.4f) * 100.0f;
      if (pct > 100.0f) pct = 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      return pct;

  - platform: motion
    type: acceleration_x
    id: accel_x
    name: "Accel X"

  - platform: motion
    type: acceleration_y
    id: accel_y
    name: "Accel Y"

  - platform: motion
    type: acceleration_z
    id: accel_z
    name: "Accel Z"

  - platform: motion
    type: gyroscope_x
    id: gyro_x
    name: "Gyro X"

  - platform: motion
    type: gyroscope_y
    id: gyro_y
    name: "Gyro Y"

  - platform: motion
    type: gyroscope_z
    id: gyro_z
    name: "Gyro Z"

  - platform: bmi270
    type: temperature
    name: "Temperature"

touchscreen:
  - platform: st7123
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    display: lcd
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5      
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch

esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    id: lcd
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

audio_dac:
  - platform: es8388
    id: es8388_dac

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

media_player:
  - platform: speaker
    name: tab5_media_player
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

time:
  - platform: rx8130
    id: rtc_time
    i2c_id: bsp_bus
    # repeated synchronization is not necessary unless the external RTC
    # is much more accurate than the internal clock
    update_interval: never
    timezone: UTC

  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        rx8130.write_time:
        
  - platform: sntp
    id: sntp_time
    on_time_sync:
      then:
        rx8130.write_time:
