# Reusable display sleep package for LVGL-based displays.
# Combines configurable timeout, LVGL pause/resume, keep-awake toggle,
# wake-touch guard, and a remote wake button.
#
# Sleep phases:
#   Active → Dim (low backlight, LVGL still running) → Off (backlight off, LVGL paused)
#   Any touch during dim phase returns to active.
#   The dim phase reduces burn-in by lowering backlight before fully sleeping.
#
# Required substitutions:
#   backlight_id: light id for the display backlight (default: display_backlight_id)
#   touchscreen_id: touchscreen component id for touch input (default: my_touchscreen)
#
# Optional substitutions:
#   default_timeout_seconds: default sleep timeout in seconds (default: 60)
#   default_dim_seconds: how long to stay in dim mode before full off (default: 30)
#   dim_brightness: backlight brightness during dim phase in % (default: 25)
#   active_brightness: backlight brightness during active phase in % (default: 100)
#
# Provides these IDs for consumers to reference:
#   screen_bump_activity (script): call from encoder/other handlers to reset the timeout
#   enter_screen_off (script): force display to sleep immediately
#   exit_screen_off (script): force display to wake immediately
#   screen_is_off (global bool): true when display is sleeping (dim or off)
#   screen_is_dim (global bool): true when display is in dim phase
#   wake_touch (global bool): true on the first touch after waking, consume to ignore wake input
#   keep_display_awake (global bool): true when keep-awake switch is on
#   display_timeout (number): configurable timeout in seconds (10-720)
#   display_dim_duration (number): configurable dim duration in seconds (5-300)
#   display_keep_awake_switch (switch): toggle to keep display always on
#   wake_display_button (button): press to wake display remotely
#
# Usage:
#   packages:
#     display_sleep:
#       url: https://github.com/rluengen/esphome
#       ref: main
#       files:
#         - path: packages/display/sleep.yaml
#           vars:
#             backlight_id: display_backlight_id
#             touchscreen_id: my_touchscreen

substitutions:
  backlight_id: display_backlight_id
  touchscreen_id: my_touchscreen
  default_timeout_seconds: "60"
  default_dim_seconds: "30"
  dim_brightness: "25"
  active_brightness: "100"

# NOTE: This package intentionally does NOT define esphome.on_boot.
# ESPHome package merging lets a later-loaded package's on_boot REPLACE an
# earlier one rather than appending, which previously clobbered the display
# device package's critical bridge/backlight init. Devices that want the
# inactivity timeout to start at boot should call screen_bump_activity from
# their own on_boot (see devices/88-dsi-touch-a.yaml).

number:
  - platform: template
    name: Screen Timeout
    optimistic: true
    entity_category: config
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: ${default_timeout_seconds}
    restore_value: true
    min_value: 10
    max_value: 720
    step: 5
    mode: box

  - platform: template
    name: Screen Dim Duration
    optimistic: true
    entity_category: config
    id: display_dim_duration
    unit_of_measurement: "s"
    initial_value: ${default_dim_seconds}
    restore_value: true
    min_value: 5
    max_value: 300
    step: 5
    mode: box

  - platform: template
    name: Screen Active Brightness
    optimistic: true
    entity_category: config
    id: display_active_brightness
    unit_of_measurement: "%"
    initial_value: ${active_brightness}
    restore_value: true
    min_value: 1
    max_value: 100
    step: 5
    mode: slider

  - platform: template
    name: Screen Dim Brightness
    optimistic: true
    entity_category: config
    id: display_dim_brightness
    unit_of_measurement: "%"
    initial_value: ${dim_brightness}
    restore_value: true
    min_value: 1
    max_value: 100
    step: 5
    mode: slider

globals:
  - id: screen_is_off
    type: bool
    initial_value: "false"

  - id: screen_is_dim
    type: bool
    initial_value: "false"

  - id: wake_touch
    type: bool
    initial_value: "false"

  - id: keep_display_awake
    type: bool
    restore_value: yes
    initial_value: "false"

script:
  # Call whenever user interacts (touch / button / remote wake).
  # Uses mode: restart so each call resets the sleep countdown.
  - id: screen_bump_activity
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(screen_is_off) || id(screen_is_dim);'
          then:
            - script.execute: exit_screen_off
      - if:
          condition:
            lambda: 'return !id(keep_display_awake);'
          then:
            - delay: !lambda |-
                float t = id(display_timeout).state;
                if (std::isnan(t) || t < 5) t = ${default_timeout_seconds};
                return (uint32_t)(t * 1000);
            - script.execute: enter_screen_dim

  # Phase 1: Dim backlight (LVGL still running for glanceability)
  - id: enter_screen_dim
    then:
      - if:
          condition:
            lambda: 'return !id(screen_is_dim) && !id(screen_is_off);'
          then:
            - logger.log: "Display entering dim mode"
            - lambda: 'id(screen_is_dim) = true;'
            - light.turn_on:
                id: ${backlight_id}
                brightness: !lambda |-
                  float b = id(display_dim_brightness).state;
                  if (std::isnan(b)) b = ${dim_brightness};
                  return b / 100.0f;
            - delay: !lambda |-
                float d = id(display_dim_duration).state;
                if (std::isnan(d) || d < 1) d = ${default_dim_seconds};
                return (uint32_t)(d * 1000);
            - script.execute: enter_screen_off

  # Phase 2: Fully off - backlight off + LVGL paused
  - id: enter_screen_off
    then:
      - if:
          condition:
            lambda: 'return !id(screen_is_off);'
          then:
            - logger.log: "Putting display to sleep"
            - lambda: |-
                id(screen_is_off) = true;
                id(screen_is_dim) = false;
            - light.turn_off: ${backlight_id}
            - lvgl.pause:

  # Wake display from any sleep phase: backlight on + LVGL resumed
  - id: exit_screen_off
    then:
      - logger.log: "Waking display"
      - lambda: |-
          id(screen_is_off) = false;
          id(screen_is_dim) = false;
          id(wake_touch) = true;
      - lvgl.resume:
      - lvgl.widget.redraw:   # force a full repaint after resuming from pause
      - light.turn_on:
          id: ${backlight_id}
          brightness: !lambda |-
            float b = id(display_active_brightness).state;
            if (std::isnan(b)) b = ${active_brightness};
            return b / 100.0f;
      - delay: 60ms   # give panel rails time to rise

touchscreen:
  - id: !extend ${touchscreen_id}
    on_touch:
      - script.execute: screen_bump_activity

switch:
  - platform: template
    name: "Display Keep Awake"
    id: display_keep_awake_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: 'id(keep_display_awake) = true;'
      - script.execute: exit_screen_off
    turn_off_action:
      - lambda: 'id(keep_display_awake) = false;'
      - script.execute: screen_bump_activity

button:
  - platform: template
    name: "Wake Display"
    id: wake_display_button
    on_press:
      - script.execute: screen_bump_activity
