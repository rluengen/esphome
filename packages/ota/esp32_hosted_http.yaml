# ESP32 Hosted HTTP mode (manifest-driven)
# Checks for ESP32-C6 firmware via the ESPHome hosted manifest. Checks are
# MANUAL ONLY (press the "Check ESP32-C6 Firmware" button); install is manual.
#
# NOTE: Do NOT add an esphome.on_boot auto-check here. On the ESP32-P4 + C6
# esp-hosted DSI board, an on_boot `wait_until: wifi.connected` + esp32_hosted
# update.check stalls/disrupts the DSI panel bring-up and leaves the display
# dark. Confirmed via isolation test 2026-06-21. Use the manual button instead,
# or packages/ota/esp32_hosted_bootstrap.yaml for pinned firmware.

http_request:

update:
  - platform: esp32_hosted
    id: esp32_c6_firmware
    name: "ESP32-C6 Firmware"
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: never

button:
  - platform: template
    name: "Check ESP32-C6 Firmware"
    icon: mdi:update
    entity_category: config
    on_press:
      - update.check: esp32_c6_firmware
