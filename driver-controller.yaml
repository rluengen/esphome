            x: 730
            y: 420
            text: "\U000F059C"
            text_font: mdi_status
            text_color: ${color_accent}
        - label:
            id: lbl_sunrise
            x: 760
            y: 422
            width: 100
            text: "--:--"
            text_font: font_small
            text_color: ${color_text_dim}
        - label:
            x: 860
            y: 420
            text: "\U000F059B"
            text_font: mdi_status
            text_color: ${color_accent}
        - label:
            id: lbl_sunset
            x: 890
            y: 422
            width: 100
            text: "--:--"
            text_font: font_small
