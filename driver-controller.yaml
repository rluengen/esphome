# Refresh clock every 30 seconds
interval:
  - interval: 30s
    then:
      - script.execute: refresh_time_display
  # Initialize display mode shortly after boot
  - interval: 5s
    then:
      - script.execute: apply_display_mode

# ---- LVGL Dashboard ----
# Layout: 1920x480 landscape.
#   Top bar (y 0-44):   clock | connectivity + mode toggle
#   Core cards (y 50):  Vehicle | Doors | Power | Climate  (always visible)
#   Bottom strip (y 336): Driving quick-actions  OR  Parked controls/TPMS/water
lvgl:
  displays:
    - dsi_display
  rotation: 270
  touchscreens:
    - dsi_touchscreen
  color_depth: 16
  buffer_size: 100%
  byte_order: little_endian
  # Shared pill look for Home-Assistant-style badges (icon + value).
  style_definitions:
    - id: badge_pill
      bg_color: 0x1C2128
      bg_opa: COVER
      radius: 100          # clamped to half-height -> full pill
      border_width: 0
      pad_top: 7
      pad_bottom: 7
      pad_left: 12
      pad_right: 16
      pad_column: 8        # gap between icon and value
  pages:
    - id: main_page
      bg_color: 0x010409
      widgets:
        # ═══════════════════════════════════════════════════
        # DOORS — full-height left column (top-down vehicle schematic)
        # Base van + transparent overlays, all 480×480 (½ of the 960 art) and
        # stacked at the same origin so they stay aligned. Front of van = top.
        # Overlays are toggled by Home Assistant signals; text labels removed.
        # ═══════════════════════════════════════════════════
        - obj:
            id: card_doors
            width: 480
            height: 480
            x: 0
            y: 0
            bg_color: 0x0D1117
            bg_opa: COVER
            radius: 0
            border_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            pad_all: 0
            widgets:
              - image:
                  src: img_van_base
                  align: TOP_LEFT
                  x: 116
                  y: 42
              # Tires (low-pressure warnings)
              - image: { id: ovl_tire_fl, src: img_tire_fl, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_tire_fr, src: img_tire_fr, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_tire_rl, src: img_tire_rl, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_tire_rr, src: img_tire_rr, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              # Cowl / hood
              - image: { id: ovl_cowl, src: img_cowl, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              # Unlock indicators
              - image: { id: ovl_door_drv_unlock, src: img_door_dl_unlock, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_door_pass_unlock, src: img_door_fr_unlock, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_door_slide_unlock, src: img_door_rr_unlock, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_trunk_unlock, src: img_trunk_unlock, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              # Driver windows (mutually exclusive; chosen by update_drv_window)
              - image: { id: ovl_dwin_vent_dc, src: img_dwin_vent_dc, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_dwin_vent_do, src: img_dwin_vent_do, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_dwin_open_dc, src: img_dwin_open_dc, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_dwin_open_do, src: img_dwin_open_do, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              # Passenger windows (mutually exclusive; chosen by update_pass_window)
              - image: { id: ovl_win_vent_dc, src: img_win_vent_dc, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_win_vent_do, src: img_win_vent_do, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_win_open_dc, src: img_win_open_dc, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_win_open_do, src: img_win_open_do, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              # Open doors (drawn last so they sit on top of everything)
              - image: { id: ovl_door_drv_open, src: img_door_dl_open, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_door_pass_open, src: img_door_fr_open, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_door_slide_open, src: img_door_rr_open, align: TOP_LEFT, x: 116, y: 42, hidden: true }
              - image: { id: ovl_trunk_open, src: img_trunk_open, align: TOP_LEFT, x: 116, y: 42, hidden: true }

        # ═══════════════════════════════════════════════════
        # TOP BAR
        # ═══════════════════════════════════════════════════
        - obj:
            width: 1440
            height: 44
            x: 480
            y: 0
            bg_color: 0x010409
            bg_opa: COVER
            border_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            widgets:
              - label:
                  id: lbl_time
                  text: "--:--"
                  text_font: roboto_medium
                  text_color: 0xF0F6FC
                  align: LEFT_MID
                  x: 16
              - label:
                  id: lbl_conn
                  text: "\U000F05AA"
                  text_font: mdi_small
                  text_color: 0xF85149
                  align: RIGHT_MID
                  x: -210
              - button:
                  id: btn_mode
                  width: 190
                  height: 38
                  align: RIGHT_MID
                  x: -8
                  bg_color: 0x21262D
                  radius: 10
                  border_width: 0
                  on_press:
                    then:
                      - lambda: 'id(manual_mode) = (id(manual_mode) + 1) % 3;'
                      - script.execute: apply_display_mode
                  widgets:
                    - label:
                        id: lbl_mode
                        text: "AUTO\u00B7PARK"
                        text_font: roboto_small
                        text_color: 0xF0F6FC
                        align: CENTER

        # ═══════════════════════════════════════════════════
        # CORE CARDS ROW (always visible)
        # ═══════════════════════════════════════════════════
        - obj:
            width: 1440
            height: 282
            x: 480
            y: 50
            bg_opa: TRANSP
            border_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            pad_left: 12
            pad_right: 12
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              # ── Vehicle card ──
              - obj:
                  width: 430
                  height: 282
                  bg_color: 0x161B22
                  bg_opa: COVER
                  radius: 18
                  border_width: 0
                  scrollbar_mode: "OFF"
                  scrollable: false
                  pad_all: 16
                  widgets:
                    - label:
                        text: "VEHICLE"
                        text_font: roboto_small
                        text_color: 0x484F58
                        x: 0
