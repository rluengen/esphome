# Driver Controller - Waveshare 8.8" DSI Touch (ESP32-P4)
# At-a-glance driver dashboard: speed, doors, fuel/DEF, battery, weather, CO2 alert

substitutions:
  device_name: driver-controller
  friendly_name: Driver Controller
  project_name: driver-controller
  project_version: "1.0.0"
  log_level: DEBUG

  # Colors
  color_bg: "0x000000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/esp32-p4-wifi6.yaml
      - path: devices/88-dsi-touch-a.yaml
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: dsi_touchscreen
          backlight_id: display_backlight
      - path: packages/ota/http_update.yaml

# ---- LVGL Layout ----
lvgl:
  displays:
    - dsi_display
  touchscreens:
    - dsi_touchscreen
  pages:
    - id: main_page
      bg_color: ${color_bg}
      widgets: []

