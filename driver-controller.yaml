# ---- LVGL Dashboard ----
# Left column shows a top-down van schematic: base art + transparent overlays
# (doors, windows, tires, unlock indicators) toggled via overlay ids. No HA
# wiring yet — overlays start hidden.
lvgl:
  displays:
    - dsi_display
  rotation: 270
  touchscreens:
    - dsi_touchscreen
  color_depth: 16
  buffer_size: 100%
  byte_order: little_endian
  # Thick horizontal bar look for fuel / DEF gauges.
  style_definitions:
    - id: gauge_bar
      radius: 8
      border_width: 0
      bg_color: 0x21262D
      bg_opa: COVER
    # Rounded card behind a HA-style icon+value badge.
    - id: badge_card
      radius: 14
      border_width: 0
      bg_color: 0x161B22
      bg_opa: COVER
    # Rounded panel behind the charging graph.
    - id: panel_card
      radius: 14
      border_width: 0
      bg_color: 0x0D1117
      bg_opa: COVER
  pages:
    - id: main_page
      bg_color: 0x010409
      widgets:
        - obj:
            id: card_doors
            width: 480
            height: 480
            x: 0
            y: 0
            bg_opa: TRANSP
            radius: 0
            border_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            pad_all: 0
            widgets:
              # Base van (always shown)
              - image: { src: img_van_base, align: TOP_LEFT, x: 155, y: 42 }
              # Cowl / hood
              - image: { id: ovl_cowl, src: img_cowl, align: TOP_LEFT, x: 181, y: 56, hidden: true }
              # Driver (front-left) door + unlock + windows
              - image: { id: ovl_door_driver_open, src: img_door_driver, align: TOP_LEFT, x: 116, y: 124, hidden: true }
              - image: { id: ovl_unlock_driver, src: img_unlock_driver, align: TOP_LEFT, x: 177, y: 131, hidden: true }
              - image: { id: ovl_driver_window_open_doorclosed, src: img_driver_window_open_doorclosed, align: TOP_LEFT, x: 181, y: 160, hidden: true }
              - image: { id: ovl_driver_window_open_dooropen, src: img_driver_window_open_dooropen, align: TOP_LEFT, x: 123, y: 145, hidden: true }
              - image: { id: ovl_driver_window_vent_doorclosed, src: img_driver_window_vent_doorclosed, align: TOP_LEFT, x: 181, y: 160, hidden: true }
              - image: { id: ovl_driver_window_vent_dooropen, src: img_driver_window_vent_dooropen, align: TOP_LEFT, x: 123, y: 145, hidden: true }
              # Passenger (front-right) door + unlock + windows
              - image: { id: ovl_door_pass_open, src: img_door_pass, align: TOP_LEFT, x: 295, y: 128, hidden: true }
              - image: { id: ovl_unlock_pass, src: img_unlock_pass, align: TOP_LEFT, x: 295, y: 131, hidden: true }
              - image: { id: ovl_win_open_doorclosed, src: img_win_open_doorclosed, align: TOP_LEFT, x: 296, y: 159, hidden: true }
              - image: { id: ovl_win_open_dooropen, src: img_win_open_dooropen, align: TOP_LEFT, x: 323, y: 147, hidden: true }
              - image: { id: ovl_win_vent_doorclosed, src: img_win_vent_doorclosed, align: TOP_LEFT, x: 295, y: 160, hidden: true }
              - image: { id: ovl_win_vent_dooropen, src: img_win_vent_dooropen, align: TOP_LEFT, x: 323, y: 147, hidden: true }
              # Sliding (rear-right) door + unlock
              - image: { id: ovl_door_slide_open, src: img_door_slide, align: TOP_LEFT, x: 284, y: 203, hidden: true }
              - image: { id: ovl_unlock_slide, src: img_unlock_slide, align: TOP_LEFT, x: 284, y: 203, hidden: true }
              # Rear barn doors / trunk + unlock
              - image: { id: ovl_trunk_open, src: img_trunk_open, align: TOP_LEFT, x: 176, y: 414, hidden: true }
              - image: { id: ovl_unlock_trunk, src: img_unlock_trunk, align: TOP_LEFT, x: 188, y: 414, hidden: true }
              # Tires (low-pressure warnings)
              - image: { id: ovl_tire_fl, src: img_tire_fl, align: TOP_LEFT, x: 179, y: 95, hidden: true }
              - image: { id: ovl_tire_fr, src: img_tire_fr, align: TOP_LEFT, x: 287, y: 95, hidden: true }
              - image: { id: ovl_tire_rl, src: img_tire_rl, align: TOP_LEFT, x: 179, y: 325, hidden: true }
              - image: { id: ovl_tire_rr, src: img_tire_rr, align: TOP_LEFT, x: 287, y: 325, hidden: true }

        # ═══════════════════════════════════════════════════
        # FLUIDS / POWER column (x 540..1180): Fuel · DEF · Battery
        # ═══════════════════════════════════════════════════
        # ── Fuel ──
        - label: { id: lbl_fuel_title, text: "FUEL", text_font: roboto_small, text_color: 0x8B949E, align: TOP_LEFT, x: 540, y: 56 }
        - label: { id: lbl_fuel_percent, text: "--%", text_font: roboto_medium, text_color: 0x555555, align: TOP_LEFT, x: 1086, y: 50 }
        - bar:
            id: bar_fuel
            styles: gauge_bar
            x: 540
            y: 86
            width: 640
            height: 40
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: ${color_unavailable}
              radius: 8
        # ── DEF ──
        - label: { id: lbl_def_title, text: "DEF", text_font: roboto_small, text_color: 0x8B949E, align: TOP_LEFT, x: 540, y: 146 }
        - label: { id: lbl_def_range, text: "~-- mi", text_font: roboto_small, text_color: 0x555555, align: TOP_LEFT, x: 700, y: 146 }
        - label: { id: lbl_def_percent, text: "--%", text_font: roboto_medium, text_color: 0x555555, align: TOP_LEFT, x: 1086, y: 140 }
        - bar:
            id: bar_def
            styles: gauge_bar
            x: 540
            y: 176
            width: 640
            height: 40
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: ${color_unavailable}
              radius: 8
        # ── Battery ──
        - label: { id: lbl_battery_title, text: "BATTERY", text_font: roboto_small, text_color: 0x8B949E, align: TOP_LEFT, x: 540, y: 236 }
        - label: { id: lbl_battery_percent, text: "--%", text_font: roboto_medium, text_color: 0x555555, align: TOP_LEFT, x: 1086, y: 230 }
        - bar:
            id: bar_battery
            styles: gauge_bar
            x: 540
            y: 266
            width: 640
            height: 40
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: ${color_unavailable}
              radius: 8
        # ── Fuel remaining + range ──
        - label: { id: lbl_fuel_remaining, text: "Fuel: --", text_font: roboto_small, text_color: 0x555555, align: TOP_LEFT, x: 540, y: 322 }
        - label: { id: lbl_range, text: "Range: --", text_font: roboto_small, text_color: 0x555555, align: TOP_LEFT, x: 860, y: 322 }

        # ── Climate badges (icon + value) ──
        - obj:
            id: badge_interior
            styles: badge_card
            x: 540
            y: 372
            width: 200
            height: 58
            pad_left: 16
            pad_right: 14
            scrollbar_mode: "OFF"
            scrollable: false
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_cross: CENTER
              flex_align_main: START
              pad_column: 10
            widgets:
              - label: { id: lbl_interior_icon, text: "\U000F050F", text_font: mdi_badge, text_color: 0x79C0FF }
              - label: { id: lbl_interior_value, text: "--°", text_font: roboto_medium, text_color: 0x555555 }
        - obj:
            id: badge_humidity
            styles: badge_card
            x: 760
            y: 372
            width: 200
            height: 58
            pad_left: 16
            pad_right: 14
            scrollbar_mode: "OFF"
            scrollable: false
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_cross: CENTER
              flex_align_main: START
              pad_column: 10
            widgets:
              - label: { id: lbl_humidity_icon, text: "\U000F058E", text_font: mdi_badge, text_color: 0x58A6FF }
              - label: { id: lbl_humidity_value, text: "--%", text_font: roboto_medium, text_color: 0x555555 }
        - obj:
            id: badge_fridge
            styles: badge_card
            x: 980
            y: 372
            width: 200
            height: 58
            pad_left: 16
            pad_right: 14
            scrollbar_mode: "OFF"
            scrollable: false
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_cross: CENTER
              flex_align_main: START
              pad_column: 10
            widgets:
              - label: { id: lbl_fridge_icon, text: "\U000F0290", text_font: mdi_badge, text_color: 0x81D4FA }
              - label: { id: lbl_fridge_value, text: "--°", text_font: roboto_medium, text_color: 0x555555 }

        # ═══════════════════════════════════════════════════
        # CHARGING graph (solar + alternator watts over time)
        # ═══════════════════════════════════════════════════
        - obj:
            id: card_charge
            styles: panel_card
            x: 1220
            y: 56
            width: 680
            height: 374
            scrollbar_mode: "OFF"
            scrollable: false
            pad_all: 0
            widgets:
              - label: { id: lbl_charge_title, text: "CHARGING (W)", text_font: roboto_small, text_color: 0x8B949E, align: TOP_LEFT, x: 16, y: 12 }
              - label: { text: "Solar", text_font: roboto_small, text_color: 0xFFD700, align: TOP_LEFT, x: 200, y: 12 }
              - label: { id: lbl_solar_watts, text: "-- W", text_font: roboto_small, text_color: 0xFFD700, align: TOP_LEFT, x: 300, y: 12 }
              - label: { text: "Alternator", text_font: roboto_small, text_color: 0x58A6FF, align: TOP_LEFT, x: 392, y: 12 }
              - label: { id: lbl_alternator_watts, text: "-- W", text_font: roboto_small, text_color: 0x58A6FF, align: TOP_LEFT, x: 452, y: 12 }
              - label: { text: "Shore Power", text_font: roboto_small, text_color: 0x3FB950, align: TOP_LEFT, x: 544, y: 12 }
              - label: { id: lbl_ac_watts, text: "-- W", text_font: roboto_small, text_color: 0x3FB950, align: TOP_LEFT, x: 604, y: 12 }
              - line:
                  id: line_alternator
                  x: 16
                  y: 80
                  width: 648
                  height: 270
                  line_color: 0x58A6FF
                  line_width: 3
                  points:
                    - [0, 270]
                    - [648, 270]
              - line:
                  id: line_solar
                  x: 16
                  y: 80
                  width: 648
                  height: 270
                  line_color: 0xFFD700
                  line_width: 3
                  points:
                    - [0, 270]
                    - [648, 270]
              - line:
                  id: line_ac
                  x: 16
                  y: 80
                  width: 648
                  height: 270
                  line_color: 0x3FB950
                  line_width: 3
                  points:
                    - [0, 270]
                    - [648, 270]

        # ═══════════════════════════════════════════════════
        # QUICK ACTIONS — turn off water pump / A/C inverter (HA switches)
        # ═══════════════════════════════════════════════════
        - button:
            id: btn_water_pump_off
            x: 1220
            y: 438
            width: 330
            height: 36
            bg_color: 0x21262D
            radius: 10
            hidden: true
            widgets:
              - label: { text: "WATER PUMP OFF", align: CENTER, text_font: roboto_small, text_color: 0xF0F6FC }
