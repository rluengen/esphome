# ---- Vehicle schematic layers ----
# Top-down van art. Source PNGs are 960x960 on a shared canvas; all layers are
# uniformly cropped to the shared alpha bounding box (232,84)-(730,958) -> 498x874,
# then resized by 1/2 to 249x437. Because the crop+scale is identical for every
# layer they stay pixel-aligned when stacked at the same card offset (116,42).
# RGB565 + alpha_channel (3 bytes/px) keeps per-pixel transparency; RGB565 is
# native to color_depth 16. Base = 907600_car.png; overlays toggled by HA signals.
# Rear inner-dually tires and the driver-side rear sliding door are omitted.
# Regenerate cropped/ with: python scripts/crop_layers.py
image:
  - file: layers/cropped/907600_car.png
    id: img_van_base
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_cowl.png
    id: img_cowl
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  # Driver (front-left) door
  - file: layers/cropped/907600_door_frontleft_open.png
    id: img_door_dl_open
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_door_frontleft_unlock.png
    id: img_door_dl_unlock
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  # Driver (front-left) windows (mutually exclusive states)
  - file: layers/cropped/907600_window_frontleft_opendoorclosed.png
    id: img_dwin_open_dc
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_window_frontleft_opendooropened.png
    id: img_dwin_open_do
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_window_frontleft_ventilatedoorclosed.png
    id: img_dwin_vent_dc
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_window_frontleft_ventilatedooropened.png
    id: img_dwin_vent_do
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  # Passenger (front-right) door
  - file: layers/cropped/907600_door_frontright_open.png
    id: img_door_fr_open
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_door_frontright_unlock.png
    id: img_door_fr_unlock
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  # Sliding (rear-right) door
  - file: layers/cropped/907600_door_rearright_open.png
    id: img_door_rr_open
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_door_rearright_unlock.png
    id: img_door_rr_unlock
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  # Rear barn doors / trunk
  - file: layers/cropped/907600_trunk_open.png
    id: img_trunk_open
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_trunk_unlock.png
    id: img_trunk_unlock
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  # Passenger (front-right) windows (mutually exclusive states)
  - file: layers/cropped/907600_window_frontright_opendoorclosed.png
    id: img_win_open_dc
    type: RGB565
    transparency: alpha_channel
    resize: 249x437
  - file: layers/cropped/907600_window_frontright_opendooropened.png
    id: img_win_open_do
    type: RGB565
    transparency: alpha_channel
