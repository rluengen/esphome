            text_font: font_small
            text_color: ${color_text_dim}
            text_align: RIGHT

# ---- Time update ----
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_time
          text: !lambda |-
            auto time = id(homeassistant_time).now();
            if (!time.is_valid()) return "--:--";
            static char buf[8];
            snprintf(buf, sizeof(buf), "%d:%02d", time.hour % 12 == 0 ? 12 : time.hour % 12, time.minute);
            return buf;
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto time = id(homeassistant_time).now();
            if (!time.is_valid()) return "";
            static const char* months[] = {"","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            static const char* days[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            static char buf[24];
            snprintf(buf, sizeof(buf), "%s %s %d", days[time.day_of_week - 1], months[time.month], time.day_of_month);
            return buf;

# ---- Home Assistant Sensors ----
text_sensor:
  # Weather condition
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: weather.forecast_home
    internal: true
    on_value:
      then:
        - script.execute: update_weather_icon
        - lvgl.label.update:
            id: lbl_weather_cond
            text: !lambda |-
              std::string c = x;
              // Capitalize first letter
              if (!c.empty()) c[0] = toupper(c[0]);
              // Replace underscores with spaces
              for (auto &ch : c) if (ch == '_' || ch == '-') ch = ' ';
              return c;

  # Weather temperature
  - platform: homeassistant
    id: ha_weather_temp
    entity_id: weather.forecast_home
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_temp
            text: !lambda |-
              if (x == "unavailable" || x == "unknown") return "--°";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%s°", x.c_str());
              return buf;

  # Location
  - platform: homeassistant
    id: ha_location_city
    entity_id: sensor.location_city
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_location
            text: !lambda |-
              std::string city = id(ha_location_city).state;
              std::string state = id(ha_location_state).state;
              if (city.empty() && state.empty()) return "";
              if (state.empty()) return city;
              if (city.empty()) return state;
              return city + ", " + state;

  - platform: homeassistant
    id: ha_location_state
    entity_id: sensor.location_state
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_location
            text: !lambda |-
              std::string city = id(ha_location_city).state;
              std::string state = id(ha_location_state).state;
              if (city.empty() && state.empty()) return "";
              if (state.empty()) return city;
              if (city.empty()) return state;
              return city + ", " + state;

  # Sunrise / Sunset
  - platform: homeassistant
    id: ha_sunrise
    entity_id: sensor.sunrise
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sunrise
            text: !lambda 'return x;'

  - platform: homeassistant
    id: ha_sunset
    entity_id: sensor.sunset
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_sunset
            text: !lambda 'return x;'

sensor:
  # Vehicle speed (CAN)
  - platform: homeassistant
    id: ha_vehicle_speed
    entity_id: sensor.mercedes_sprinter_psm_vehicle_speed_can
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_speed
            text: !lambda |-
              if (isnan(x)) return "--";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f", x);
              return buf;
        - script.execute: update_alerts

  # Fuel level
  - platform: homeassistant
    id: ha_fuel_level
    entity_id: sensor.fuel_level
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fuel_pct
            text: !lambda |-
              if (isnan(x)) return "--%";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return buf;
        - lvgl.bar.update:
            id: bar_fuel
            value: !lambda 'return isnan(x) ? 0 : (int)x;'

  # Fuel range
  - platform: homeassistant
    id: ha_fuel_range
    entity_id: sensor.fuel_range
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fuel_range
            text: !lambda |-
              if (isnan(x)) return "-- mi";
              static char buf[16];
              snprintf(buf, sizeof(buf), "%.0f mi", x);
              return buf;

  # DEF level
  - platform: homeassistant
    id: ha_def_level
    entity_id: sensor.def_level
    internal: true
    on_value:
      then:
