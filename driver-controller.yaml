        # --- Solar + AC power row ---
        - label:
            x: 420
            y: 410
            text: "\U000F0A72"
            text_font: mdi_gauge
            text_color: ${color_accent}
        - label:
            id: lbl_solar_watts
            x: 455
            y: 412
            width: 100
            text: "-- W"
            text_font: font_label
            text_color: ${color_text}
        - label:
            x: 570
            y: 410
            text: "\U000F06A5"
            text_font: mdi_gauge
            text_color: ${color_text_dim}
        - label:
            id: lbl_ac_watts
            x: 605
            y: 412
            width: 100
            text: "-- W"
            text_font: font_label
            text_color: ${color_text}

        # ==================== INFO ZONE (center-right, 1020-1500) ====================

        # Location
        - label:
            id: lbl_location
            x: 730
            y: 55
            width: 460
            text: ""
            text_font: font_primary
            text_color: ${color_text}

        # Odometer
        - label:
            x: 730
            y: 95
            text: "\U000F0F54"
            text_font: mdi_gauge
            text_color: ${color_text_dim}
        - label:
            id: lbl_odometer
            x: 765
            y: 97
            width: 280
            text: "-- mi"
            text_font: font_label
            text_color: ${color_text_dim}

        # Vehicle battery
        - label:
            id: lbl_vehicle_battery
            x: 730
            y: 135
            width: 280
