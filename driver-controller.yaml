# Driver Controller - Waveshare 8.8" DSI Touch (ESP32-P4)
# At-a-glance driver dashboard: speed, doors, fuel/DEF, battery, weather, CO2 alert

substitutions:
  device_name: driver-controller
  friendly_name: Driver Controller
  project_name: driver-controller
  project_version: "1.0.0"
  log_level: INFO

  # Colors
  color_bg: "0x000000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/esp32-p4-wifi6.yaml
      - path: devices/88-dsi-touch-a.yaml
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: dsi_touchscreen
          backlight_id: display_backlight
      - path: packages/ota/http_update.yaml

# ---- Display / Touch Orientation ----
# 1920x480 landscape via LVGL rotation (270). Rotation MUST live in the LVGL
# config, not in waveshare_dsi (the display component), otherwise ESPHome errors
# with "use of 'rotation' in the display config is not compatible with LVGL".
# The device package (devices/88-dsi-touch-a.yaml) sets rotation: 270 on the
# panel, so strip it here with !remove and let LVGL own the rotation.
waveshare_dsi:
  rotation: !remove

touchscreen:
  - id: !extend dsi_touchscreen
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

# ---- Display Mode State ----
# Two display modes:
#   Driving (engine on)  -> focused, glanceable vehicle state + quick actions
#   Parked  (engine off) -> same core dashboard + expanded controls, TPMS, water
# Mode follows engine state automatically; the top-bar button cycles a manual
# override: AUTO -> DRIVE -> PARK -> AUTO.
globals:
  - id: engine_is_running
    type: bool
    initial_value: 'false'
  # 0 = AUTO (follow engine), 1 = force DRIVE, 2 = force PARK
  - id: manual_mode
    type: int
    initial_value: '0'
  # Passenger-door open state (drives which window overlay is shown)
  - id: pass_door_open
    type: bool
    initial_value: 'false'
  # Passenger window position: 0 = closed, 1 = vent, 2 = open
  - id: pass_window_mode
    type: int
    initial_value: '0'
  # Driver-door open state (drives which driver-window overlay is shown)
  - id: drv_door_open
    type: bool
    initial_value: 'false'
  # Driver window position: 0 = closed, 1 = vent, 2 = open
  - id: drv_window_mode
    type: int
    initial_value: '0'

script:
  # Apply the effective display mode based on engine state + manual override
  - id: apply_display_mode
    then:
      - lambda: |-
          bool driving;
          int m = id(manual_mode);
          if (m == 1) driving = true;
          else if (m == 2) driving = false;
          else driving = id(engine_is_running);

          if (driving) {
            lv_obj_clear_flag(id(bottom_driving), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(bottom_parked), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(bottom_driving), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(bottom_parked), LV_OBJ_FLAG_HIDDEN);
          }

          const char* lbl = (m == 1) ? "DRIVE" : (m == 2) ? "PARK" : (driving ? "AUTO\u00B7DRIVE" : "AUTO\u00B7PARK");
          lv_label_set_text(id(lbl_mode), lbl);

  - id: refresh_time_display
    then:
      - lvgl.label.update:
          id: lbl_time
          text: !lambda |-
            auto time = id(ha_time).now();
            if (!time.is_valid()) return "--:--";
            static char buf[12];
            int hr = time.hour % 12;
            if (hr == 0) hr = 12;
            snprintf(buf, sizeof(buf), "%d:%02d %s", hr, time.minute, time.hour < 12 ? "AM" : "PM");
            return buf;

  # Pick the correct passenger-window overlay from window mode + door state.
  # The four window images encode {open|vent} x {door closed|door open}.
  - id: update_pass_window
    then:
      - lambda: |-
          // Hide all four first.
          lv_obj_add_flag(id(ovl_win_open_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_open_do), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_vent_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_vent_do), LV_OBJ_FLAG_HIDDEN);
          bool dopen = id(pass_door_open);
          int w = id(pass_window_mode);
          lv_obj_t* show = nullptr;
          if (w == 2) show = dopen ? id(ovl_win_open_do) : id(ovl_win_open_dc);
          else if (w == 1) show = dopen ? id(ovl_win_vent_do) : id(ovl_win_vent_dc);
          if (show) lv_obj_clear_flag(show, LV_OBJ_FLAG_HIDDEN);

  # Driver-window equivalent of update_pass_window (uses the driver door state).
  - id: update_drv_window
    then:
      - lambda: |-
          // Hide all four first.
          lv_obj_add_flag(id(ovl_dwin_open_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_dwin_open_do), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_dwin_vent_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_dwin_vent_do), LV_OBJ_FLAG_HIDDEN);
          bool dopen = id(drv_door_open);
          int w = id(drv_window_mode);
          lv_obj_t* show = nullptr;
          if (w == 2) show = dopen ? id(ovl_dwin_open_do) : id(ovl_dwin_open_dc);
          else if (w == 1) show = dopen ? id(ovl_dwin_vent_do) : id(ovl_dwin_vent_dc);
          if (show) lv_obj_clear_flag(show, LV_OBJ_FLAG_HIDDEN);

# ---- Home Assistant Sensors ----
text_sensor:
  # ── Engine running state (drives mode switching) ──
  # TODO VALIDATE entity_id (WiCAN). If your engine state is an RPM sensor instead
  # of a binary_sensor, change to a `sensor:` reading RPM and treat >0 as running.
  - platform: homeassistant
    id: ha_engine_running_raw
    entity_id: binary_sensor.wican_engine_running  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lambda: 'id(engine_is_running) = (x == "on");'
        - script.execute: apply_display_mode

  # ── Door / lock / window / hood states → image overlays ──
  # Driver = front-LEFT, passenger = front-right, sliding = rear-right (curb side).
  # TODO VALIDATE all entity_ids (WiCAN).
  - platform: homeassistant
    id: ha_door_driver_raw
    entity_id: binary_sensor.wican_door_driver  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lambda: 'id(drv_door_open) = (x == "on");'
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.widget.show: ovl_door_drv_open
            else:
              - lvgl.widget.hide: ovl_door_drv_open
        - script.execute: update_drv_window

  - platform: homeassistant
    id: ha_door_passenger_raw
    entity_id: binary_sensor.wican_door_passenger  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lambda: 'id(pass_door_open) = (x == "on");'
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.widget.show: ovl_door_pass_open
            else:
              - lvgl.widget.hide: ovl_door_pass_open
        - script.execute: update_pass_window

  - platform: homeassistant
    id: ha_door_sliding_raw
    entity_id: binary_sensor.wican_door_sliding  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.widget.show: ovl_door_slide_open
            else:
              - lvgl.widget.hide: ovl_door_slide_open

  - platform: homeassistant
    id: ha_door_rear_raw
    entity_id: binary_sensor.wican_door_rear  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.widget.show: ovl_trunk_open
            else:
              - lvgl.widget.hide: ovl_trunk_open

  # Central lock state → unlock overlays (passenger + sliding + trunk)
  - platform: homeassistant
    id: ha_locks_raw
    entity_id: lock.wican_doors  # TODO VALIDATE (state: locked / unlocked)
    internal: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "unlocked";'
            then:
              - lvgl.widget.show: ovl_door_drv_unlock
              - lvgl.widget.show: ovl_door_pass_unlock
              - lvgl.widget.show: ovl_door_slide_unlock
              - lvgl.widget.show: ovl_trunk_unlock
            else:
              - lvgl.widget.hide: ovl_door_drv_unlock
              - lvgl.widget.hide: ovl_door_pass_unlock
              - lvgl.widget.hide: ovl_door_slide_unlock
              - lvgl.widget.hide: ovl_trunk_unlock

  # Passenger window position (closed / vent / open). The displayed art also
  # depends on whether the passenger door is open, so defer to the script.
  - platform: homeassistant
    id: ha_pass_window_raw
    entity_id: sensor.wican_window_passenger  # TODO VALIDATE (closed/vent/open)
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string s = x;
            if (s == "open") id(pass_window_mode) = 2;
            else if (s == "vent" || s == "ventilate" || s == "partial") id(pass_window_mode) = 1;
            else id(pass_window_mode) = 0;
        - script.execute: update_pass_window

  # Driver window position (closed / vent / open). Mirrors the passenger window;
  # the displayed art also depends on whether the driver door is open.
  - platform: homeassistant
    id: ha_drv_window_raw
    entity_id: sensor.wican_window_driver  # TODO VALIDATE (closed/vent/open)
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string s = x;
            if (s == "open") id(drv_window_mode) = 2;
            else if (s == "vent" || s == "ventilate" || s == "partial") id(drv_window_mode) = 1;
            else id(drv_window_mode) = 0;
        - script.execute: update_drv_window

  # Hood / cowl open
  - platform: homeassistant
    id: ha_hood_raw
    entity_id: binary_sensor.wican_hood  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.widget.show: ovl_cowl
            else:
              - lvgl.widget.hide: ovl_cowl

  # ── Solar charging relay state (EcoFlow) ──
  # TODO VALIDATE entity_id for the solar input relay/switch.
  - platform: homeassistant
    id: ha_solar_relay_raw
    entity_id: switch.ecoflow_solar_charging  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_solar_toggle
            text: !lambda 'return std::string(x=="on"?"ON":(x=="unavailable"?"N/A":"OFF"));'
            text_color: !lambda 'return x=="on"?lv_color_hex(0x3FB950):(x=="unavailable"?lv_color_hex(0x555555):lv_color_hex(0x8B949E));'

  # ── Alternator charging relay state (EcoFlow) ──
  # TODO VALIDATE entity_id for the alternator input relay/switch.
  - platform: homeassistant
    id: ha_alt_relay_raw
    entity_id: switch.ecoflow_alternator_charging  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_alt_toggle
            text: !lambda 'return std::string(x=="on"?"ON":(x=="unavailable"?"N/A":"OFF"));'
            text_color: !lambda 'return x=="on"?lv_color_hex(0x3FB950):(x=="unavailable"?lv_color_hex(0x555555):lv_color_hex(0x8B949E));'

  # ── AC inverter state (EcoFlow) ── parked controls
  - platform: homeassistant
    id: ha_inverter_raw
    entity_id: switch.ecoflow_ac_inverter
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_inverter_state
            text: !lambda 'return std::string(x=="on"?"INV ON":(x=="unavailable"?"INV N/A":"INV OFF"));'
            text_color: !lambda 'return x=="on"?lv_color_hex(0x3FB950):(x=="unavailable"?lv_color_hex(0x555555):lv_color_hex(0x8B949E));'

  # ── Hot water heater state ── parked controls
  - platform: homeassistant
    id: ha_heater_raw
    entity_id: switch.water_tank_display_hot_water_heater
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_heater_state
            text: !lambda 'return std::string(x=="on"?"HEAT ON":(x=="unavailable"?"HEAT N/A":"HEAT OFF"));'
            text_color: !lambda 'return x=="on"?lv_color_hex(0xF0883E):(x=="unavailable"?lv_color_hex(0x555555):lv_color_hex(0x8B949E));'

  # ── Water pump state ── parked controls + quick action feedback
  - platform: homeassistant
    id: ha_pump_raw
    entity_id: switch.water_tank_display_water_pump
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pump_state
            text: !lambda 'return std::string(x=="on"?"PUMP ON":(x=="unavailable"?"PUMP N/A":"PUMP OFF"));'
            text_color: !lambda 'return x=="on"?lv_color_hex(0x58A6FF):(x=="unavailable"?lv_color_hex(0x555555):lv_color_hex(0x8B949E));'

binary_sensor:
  # Connectivity indicator (Wi-Fi/HA API up)
  - platform: status
    id: device_online
    internal: true
    on_state:
      then:
        - lvgl.label.update:
            id: lbl_conn
            text: !lambda 'return std::string(x ? "\U000F05A9" : "\U000F05AA");'
            text_color: !lambda 'return x ? lv_color_hex(0x3FB950) : lv_color_hex(0xF85149);'

sensor:
  # ══ Vehicle (WiCAN OBD2) ══
  # TODO VALIDATE all WiCAN sensor entity_ids below.
  - platform: homeassistant
    id: ha_fuel_level
    entity_id: sensor.wican_fuel_level  # TODO VALIDATE (expects 0-100 %)
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_fuel
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_fuel
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(0x3A3A3A);
                if (x <= 15) return lv_color_hex(0xF85149);
                if (x <= 30) return lv_color_hex(0xF0883E);
                return lv_color_hex(0x3FB950);
        - lvgl.label.update:
            id: lbl_fuel_pct
            text: !lambda |-
              if (isnan(x)) return "--%";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  - platform: homeassistant
    id: ha_def_level
    entity_id: sensor.wican_def_level  # TODO VALIDATE (expects 0-100 %)
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_def
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_def
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(0x3A3A3A);
                if (x <= 15) return lv_color_hex(0xF85149);
                if (x <= 30) return lv_color_hex(0xF0883E);
                return lv_color_hex(0x58A6FF);
        - lvgl.label.update:
            id: lbl_def_pct
            text: !lambda |-
              if (isnan(x)) return "--%";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  - platform: homeassistant
    id: ha_odometer
    entity_id: sensor.wican_odometer  # TODO VALIDATE (miles or km)
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_odometer
            text: !lambda |-
              if (isnan(x)) return "----- mi";
              static char buf[24];
              snprintf(buf, sizeof(buf), "%.0f mi", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  - platform: homeassistant
    id: ha_outside_temp
    entity_id: sensor.wican_outside_temperature  # TODO VALIDATE (WiCAN ambient)
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_outside_temp
            text: !lambda |-
              if (isnan(x)) return "--\u00B0F";
              static char buf[12];
              snprintf(buf, sizeof(buf), "%.1f\u00B0F", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # ══ Power (EcoFlow) ══
  - platform: homeassistant
    id: ha_battery_soc
    entity_id: sensor.ecoflow_battery_percentage
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_battery
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_battery
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(0x3A3A3A);
                if (x <= 15) return lv_color_hex(0xF85149);
                if (x <= 30) return lv_color_hex(0xF0883E);
                return lv_color_hex(0x3FB950);
        - lvgl.label.update:
            id: lbl_batt_pct
            text: !lambda |-
              if (isnan(x)) return "--%";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  - platform: homeassistant
    id: ha_solar_w
    entity_id: sensor.ecoflow_solar_in_power
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_solar_w
            text: !lambda |-
              if (isnan(x)) return "-- W";
              static char buf[12];
              snprintf(buf, sizeof(buf), "%.0f W", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # TODO VALIDATE alternator input power entity_id (EcoFlow DC/alternator charger).
  - platform: homeassistant
    id: ha_alt_w
    entity_id: sensor.ecoflow_alternator_charging_power  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_alt_w
            text: !lambda |-
              if (isnan(x)) return "-- W";
              static char buf[12];
              snprintf(buf, sizeof(buf), "%.0f W", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  - platform: homeassistant
    id: ha_battery_time
    entity_id: sensor.ecoflow_battery_time_remaining  # TODO VALIDATE (minutes)
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_batt_time
            text: !lambda |-
              if (isnan(x)) return "";
              static char buf[24];
              if (x >= 1440) snprintf(buf, sizeof(buf), "%.0f days left", x / 1440.0f);
              else if (x >= 60) snprintf(buf, sizeof(buf), "%.1f hrs left", x / 60.0f);
              else snprintf(buf, sizeof(buf), "%.0f min left", x);
              return buf;

  # ══ Climate badges ══
  # TODO VALIDATE interior temp entity (esparheater cabin average).
  - platform: homeassistant
    id: ha_interior_temp
    entity_id: sensor.cabin_average_temperature  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_interior_temp
            text: !lambda |-
              if (isnan(x)) return "--\u00B0F";
              static char buf[12];
              snprintf(buf, sizeof(buf), "%.1f\u00B0F", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # TODO VALIDATE interior humidity entity.
  - platform: homeassistant
    id: ha_humidity
    entity_id: sensor.interior_humidity  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_humidity
            text: !lambda |-
              if (isnan(x)) return "--%";
              static char buf[12];
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # TODO VALIDATE fridge temperature entity (user: sensor.fridge_temperature).
  - platform: homeassistant
    id: ha_fridge_temp
    entity_id: sensor.fridge_temperature  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fridge_temp
            text: !lambda |-
              if (isnan(x)) return "--\u00B0F";
              static char buf[12];
              snprintf(buf, sizeof(buf), "%.1f\u00B0F", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # ══ Water (parked) ══
  - platform: homeassistant
    id: ha_water_level
    entity_id: sensor.water_tank_display_fresh_water_tank_level
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_water_pk
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.label.update:
            id: lbl_water_pct
            text: !lambda |-
              if (isnan(x)) return "--%";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f%%", x);
              return buf;
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # ══ TPMS (parked) ══
  # TODO VALIDATE all four TPMS entity_ids (BLE/sensor pressures, psi).
  - platform: homeassistant
    id: ha_tpms_fl
    entity_id: sensor.tpms_front_left  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tpms_fl
            text: !lambda |-
              if (isnan(x)) return "--";
              static char buf[8];
              snprintf(buf, sizeof(buf), "%.0f", x);
