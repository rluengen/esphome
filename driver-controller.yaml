# Driver Controller - Waveshare 8.8" DSI Touch (ESP32-P4)
# At-a-glance driver dashboard: speed, doors, fuel/DEF, battery, weather, CO2 alert

substitutions:
  device_name: driver-controller
  friendly_name: Driver Controller
  project_name: driver-controller
  project_version: "1.0.0"
  log_level: DEBUG

  # CO2 alert threshold (ppm)
  co2_alert_threshold: "1000"

  # Colors
  color_bg: "0x000000"
  color_text: "0xFFFFFF"
  color_text_dim: "0x808080"
  color_text_unavail: "0x555555"
  color_accent: "0xFFC107"       # Amber
  color_fuel: "0xFFA726"         # Orange
  color_def: "0x42A5F5"          # Blue
  color_water: "0x4FC3F7"        # Light blue
  color_battery: "0x66BB6A"      # Green
  color_bar_bg: "0x2A2A2A"
  color_alert: "0xEF5350"        # Red
  color_alert_bg: "0x3E1111"     # Dark red

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/esp32-p4-wifi6.yaml
      - path: devices/88-dsi-touch-a.yaml
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: dsi_touchscreen
          backlight_id: display_backlight
      - path: packages/ota/http_update.yaml

# ---- Fonts ----
font:
  # Speed - large center display
  - file: "fonts/Roboto-Regular.ttf"
    id: font_speed
    size: 120
    bpp: 4
    glyphs: " 0123456789"

  # Speed unit label
  - file: "fonts/Roboto-Regular.ttf"
    id: font_speed_unit
    size: 28
    bpp: 4
    glyphs: " MPHKMmphk/"

  # Primary info text
  - file: "fonts/Roboto-Regular.ttf"
    id: font_primary
    size: 32
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~°·"

  # Secondary/label text
  - file: "fonts/Roboto-Regular.ttf"
    id: font_label
    size: 22
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~°·"

  # Small detail text
  - file: "fonts/Roboto-Regular.ttf"
    id: font_small
    size: 18
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~°·"

  # MDI icons - status bar
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_status
    size: 24
    bpp: 4
    glyphs: [
      "\U000F05A9", # mdi-wifi
      "\U000F05AA", # mdi-wifi-off
      "\U000F07D0", # mdi-home-assistant
      "\U000F059C", # mdi-weather-sunset-up (sunrise)
      "\U000F059B", # mdi-weather-sunset-down (sunset)
    ]

  # MDI icons - gauges & info
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_gauge
    size: 28
    bpp: 4
    glyphs: [
      "\U000F07CA", # mdi-fuel
      "\U000F1802", # mdi-molecule (DEF)
      "\U000F058C", # mdi-water
      "\U000F0079", # mdi-battery
      "\U000F008E", # mdi-battery-outline
      "\U000F10CD", # mdi-battery-alert
      "\U000F0084", # mdi-battery-charging
      "\U000F0A72", # mdi-solar-power
      "\U000F06A5", # mdi-power-plug
      "\U000F0438", # mdi-speedometer
      "\U000F0F54", # mdi-road-variant
    ]

  # MDI icons - doors
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_door
    size: 22
    bpp: 4
    glyphs: [
      "\U000F081C", # mdi-door-open
      "\U000F081B", # mdi-door-closed
    ]

  # MDI icons - alert
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_alert
    size: 28
    bpp: 4
    glyphs: [
      "\U000F0026", # mdi-alert
      "\U000F0029", # mdi-alert-circle
      "\U000F12E1", # mdi-molecule-co2
    ]

  # Weather icons
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_weather
    size: 40
    bpp: 4
    glyphs: [
      "\U000F0594", # clear-night
      "\U000F0590", # cloudy
      "\U000F0F2F", # exceptional
      "\U000F0591", # fog
      "\U000F0592", # hail
      "\U000F0593", # lightning
      "\U000F067E", # lightning-rainy
      "\U000F0595", # partlycloudy
      "\U000F0596", # pouring
      "\U000F0597", # rainy
      "\U000F0598", # snowy
      "\U000F067F", # snowy-rainy
      "\U000F0599", # sunny
      "\U000F059D", # windy
      "\U000F059E", # windy-variant
    ]

# ---- Globals ----
globals:
  - id: alert_active
    type: bool
    initial_value: "false"

# ---- Scripts ----
script:
  # Update the alert bar visibility and text
  - id: update_alerts
    mode: restart
    then:
      - lambda: |-
          // Check CO2
          bool co2_high = false;
          if (!isnan(id(ha_co2).state) && id(ha_co2).state >= ${co2_alert_threshold}) {
            co2_high = true;
          }

          // Check doors open while moving
          bool door_while_moving = false;
          if (!isnan(id(ha_vehicle_speed).state) && id(ha_vehicle_speed).state > 5) {
            if (id(ha_any_door_open).state) {
              door_while_moving = true;
            }
          }

          bool any_alert = co2_high || door_while_moving;
          id(alert_active) = any_alert;

          if (any_alert) {
            std::string msg = "";
            if (door_while_moving) msg += "\U000F0026 DOOR OPEN";
            if (co2_high) {
              if (!msg.empty()) msg += "     ";
              char buf[32];
              snprintf(buf, sizeof(buf), "\U000F12E1 CO2 %.0f ppm", id(ha_co2).state);
              msg += buf;
            }
            lv_label_set_text(id(lbl_alert), msg.c_str());
            lv_obj_clear_flag(id(alert_bar), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(alert_bar), LV_OBJ_FLAG_HIDDEN);
          }

  # Update weather icon glyph from condition string
  - id: update_weather_icon
    mode: restart
    then:
      - lambda: |-
          std::string cond = id(ha_weather_condition).state;
          const char* icon = "\U000F0590";  // default: cloudy
          if (cond == "sunny" || cond == "clear-day") icon = "\U000F0599";
          else if (cond == "clear-night") icon = "\U000F0594";
          else if (cond == "partlycloudy" || cond == "partly_cloudy") icon = "\U000F0595";
          else if (cond == "cloudy") icon = "\U000F0590";
          else if (cond == "rainy") icon = "\U000F0597";
          else if (cond == "pouring") icon = "\U000F0596";
          else if (cond == "snowy") icon = "\U000F0598";
          else if (cond == "snowy-rainy") icon = "\U000F067F";
          else if (cond == "fog") icon = "\U000F0591";
          else if (cond == "hail") icon = "\U000F0592";
          else if (cond == "lightning") icon = "\U000F0593";
          else if (cond == "lightning-rainy") icon = "\U000F067E";
          else if (cond == "windy") icon = "\U000F059D";
          else if (cond == "windy-variant") icon = "\U000F059E";
          else if (cond == "exceptional") icon = "\U000F0F2F";
          lv_label_set_text(id(lbl_weather_icon), icon);

# ---- LVGL Layout ----
# 1920x480 landscape strip:
#   [Speed zone ~400px] | [Gauges ~600px] | [Info ~500px] | [Weather+Clock ~420px]
#   Alert bar spans full width at top, hidden by default

lvgl:
  displays:
    - dsi_display
  touchscreens:
    - dsi_touchscreen

  pages:
    - id: main_page
      bg_color: ${color_bg}
      widgets:

        # ==================== ALERT BAR (top, full width, hidden by default) ====================
        - obj:
            id: alert_bar
            x: 0
            y: 0
            width: 1920
            height: 40
            bg_color: ${color_alert_bg}
            hidden: true
            widgets:
              - label:
                  id: lbl_alert
                  align: CENTER
                  text: ""
                  text_font: mdi_alert
                  text_color: ${color_alert}

        # ==================== SPEED ZONE (left, 0-400) ====================
        - label:
            id: lbl_speed
            x: 40
            y: 120
            width: 320
            text: "--"
            text_font: font_speed
            text_color: ${color_text}
            text_align: CENTER

        - label:
            id: lbl_speed_unit
            x: 40
            y: 260
            width: 320
            text: "MPH"
            text_font: font_speed_unit
            text_color: ${color_text_dim}
            text_align: CENTER

        # Door status row below speed
        - obj:
            x: 40
            y: 320
            width: 320
            height: 120
            bg_opa: TRANSP
            widgets:
              # Driver door
              - label:
                  id: lbl_door_driver_icon
                  x: 10
                  y: 0
                  text: "\U000F081B"
                  text_font: mdi_door
                  text_color: ${color_text_dim}
              - label:
                  id: lbl_door_driver
                  x: 0
                  y: 28
                  width: 80
                  text: "DR"
                  text_font: font_small
                  text_color: ${color_text_dim}
                  text_align: CENTER
              # Passenger door
              - label:
                  id: lbl_door_pass_icon
                  x: 90
                  y: 0
                  text: "\U000F081B"
                  text_font: mdi_door
                  text_color: ${color_text_dim}
              - label:
                  id: lbl_door_pass
                  x: 80
                  y: 28
                  width: 80
                  text: "PA"
                  text_font: font_small
                  text_color: ${color_text_dim}
                  text_align: CENTER
              # Sliding door
              - label:
                  id: lbl_door_slide_icon
                  x: 170
                  y: 0
                  text: "\U000F081B"
                  text_font: mdi_door
                  text_color: ${color_text_dim}
              - label:
                  id: lbl_door_slide
                  x: 160
                  y: 28
                  width: 80
                  text: "SL"
                  text_font: font_small
                  text_color: ${color_text_dim}
                  text_align: CENTER
              # Rear door
              - label:
                  id: lbl_door_rear_icon
                  x: 250
                  y: 0
                  text: "\U000F081B"
                  text_font: mdi_door
                  text_color: ${color_text_dim}
              - label:
                  id: lbl_door_rear
                  x: 240
                  y: 28
                  width: 80
                  text: "RE"
                  text_font: font_small
                  text_color: ${color_text_dim}
                  text_align: CENTER

        # ==================== GAUGES ZONE (center-left, 400-1020) ====================

        # --- Fuel gauge ---
        - label:
            x: 420
            y: 50
            text: "\U000F07CA"
            text_font: mdi_gauge
            text_color: ${color_fuel}
        - label:
            id: lbl_fuel_pct
            x: 460
            y: 52
            width: 100
            text: "--%"
            text_font: font_primary
            text_color: ${color_text}
        - bar:
            id: bar_fuel
            x: 420
            y: 90
            width: 260
            height: 14
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_bar_bg}
            indicator:
              bg_color: ${color_fuel}
        - label:
            id: lbl_fuel_range
            x: 420
            y: 108
            width: 260
            text: "-- mi"
            text_font: font_small
            text_color: ${color_text_dim}

        # --- DEF gauge ---
        - label:
            x: 420
            y: 145
            text: "\U000F1802"
            text_font: mdi_gauge
            text_color: ${color_def}
        - label:
            id: lbl_def_pct
            x: 460
            y: 147
            width: 100
            text: "--%"
            text_font: font_primary
            text_color: ${color_text}
        - bar:
            id: bar_def
            x: 420
            y: 185
            width: 260
            height: 14
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_bar_bg}
            indicator:
              bg_color: ${color_def}
        - label:
            id: lbl_def_range
            x: 420
            y: 203
            width: 260
            text: "-- mi"
            text_font: font_small
            text_color: ${color_text_dim}

        # --- Water gauge ---
        - label:
            x: 420
            y: 240
            text: "\U000F058C"
            text_font: mdi_gauge
            text_color: ${color_water}
        - label:
            id: lbl_water_pct
            x: 460
            y: 242
            width: 100
            text: "--%"
            text_font: font_primary
            text_color: ${color_text}
        - bar:
            id: bar_water
            x: 420
            y: 280
            width: 260
            height: 14
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_bar_bg}
            indicator:
              bg_color: ${color_water}

        # --- EcoFlow Battery gauge ---
        - label:
            x: 420
            y: 320
            text: "\U000F0079"
            text_font: mdi_gauge
            text_color: ${color_battery}
        - label:
            id: lbl_battery_pct
            x: 460
            y: 322
            width: 100
            text: "--%"
            text_font: font_primary
            text_color: ${color_text}
        - bar:
            id: bar_battery
            x: 420
            y: 360
            width: 260
            height: 14
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_bar_bg}
            indicator:
              bg_color: ${color_battery}
        - label:
            id: lbl_battery_detail
            x: 420
            y: 378
            width: 260
