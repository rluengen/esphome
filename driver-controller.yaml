        # ==================== WEATHER + CLOCK ZONE (right, 1500-1920) ====================

        # Clock
        - label:
            id: lbl_time
            x: 1500
            y: 50
            width: 400
            text: "--:--"
            text_font: font_primary
            text_color: ${color_text}
            text_align: RIGHT

        # Date
        - label:
            id: lbl_date
            x: 1500
            y: 90
            width: 400
            text: ""
            text_font: font_label
