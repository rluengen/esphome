# ---- LVGL Dashboard ----
# Left column shows a top-down van schematic: base art + transparent overlays
# (doors, windows, tires, unlock indicators) toggled via overlay ids. No HA
# wiring yet — overlays start hidden.
lvgl:
  displays:
    - dsi_display
  rotation: 270
  touchscreens:
    - dsi_touchscreen
  color_depth: 16
  buffer_size: 100%
  byte_order: little_endian
  # Thick horizontal bar look for fuel / DEF gauges.
  style_definitions:
    - id: gauge_bar
      radius: 8
      border_width: 0
      bg_color: 0x21262D
      bg_opa: COVER
  pages:
    - id: main_page
      bg_color: 0x010409
      widgets:
        - obj:
            id: card_doors
            width: 480
            height: 480
            x: 0
            y: 0
            bg_opa: TRANSP
            radius: 0
            border_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            pad_all: 0
            widgets:
              # Base van (always shown)
              - image: { src: img_van_base, align: TOP_LEFT, x: 155, y: 42 }
              # Cowl / hood
              - image: { id: ovl_cowl, src: img_cowl, align: TOP_LEFT, x: 181, y: 56, hidden: true }
              # Driver (front-left) door + unlock + windows
              - image: { id: ovl_door_drv_open, src: img_door_drv, align: TOP_LEFT, x: 116, y: 124, hidden: true }
              - image: { id: ovl_unlock_drv, src: img_unlock_drv, align: TOP_LEFT, x: 177, y: 131, hidden: true }
              - image: { id: ovl_dwin_open_dc, src: img_dwin_open_dc, align: TOP_LEFT, x: 181, y: 160, hidden: true }
              - image: { id: ovl_dwin_open_do, src: img_dwin_open_do, align: TOP_LEFT, x: 123, y: 145, hidden: true }
              - image: { id: ovl_dwin_vent_dc, src: img_dwin_vent_dc, align: TOP_LEFT, x: 181, y: 160, hidden: true }
              - image: { id: ovl_dwin_vent_do, src: img_dwin_vent_do, align: TOP_LEFT, x: 123, y: 145, hidden: true }
              # Passenger (front-right) door + unlock + windows
              - image: { id: ovl_door_pass_open, src: img_door_pass, align: TOP_LEFT, x: 295, y: 128, hidden: true }
              - image: { id: ovl_unlock_pass, src: img_unlock_pass, align: TOP_LEFT, x: 295, y: 131, hidden: true }
              - image: { id: ovl_win_open_dc, src: img_win_open_dc, align: TOP_LEFT, x: 296, y: 159, hidden: true }
              - image: { id: ovl_win_open_do, src: img_win_open_do, align: TOP_LEFT, x: 323, y: 147, hidden: true }
              - image: { id: ovl_win_vent_dc, src: img_win_vent_dc, align: TOP_LEFT, x: 295, y: 160, hidden: true }
              - image: { id: ovl_win_vent_do, src: img_win_vent_do, align: TOP_LEFT, x: 323, y: 147, hidden: true }
              # Sliding (rear-right) door + unlock
              - image: { id: ovl_door_slide_open, src: img_door_slide, align: TOP_LEFT, x: 284, y: 203, hidden: true }
              - image: { id: ovl_unlock_slide, src: img_unlock_slide, align: TOP_LEFT, x: 284, y: 203, hidden: true }
              # Rear barn doors / trunk + unlock
              - image: { id: ovl_trunk_open, src: img_trunk_open, align: TOP_LEFT, x: 176, y: 414, hidden: true }
              - image: { id: ovl_unlock_trunk, src: img_unlock_trunk, align: TOP_LEFT, x: 188, y: 414, hidden: true }
              # Tires (low-pressure warnings)
              - image: { id: ovl_tire_fl, src: img_tire_fl, align: TOP_LEFT, x: 179, y: 95, hidden: true }
              - image: { id: ovl_tire_fr, src: img_tire_fr, align: TOP_LEFT, x: 287, y: 95, hidden: true }
              - image: { id: ovl_tire_rl, src: img_tire_rl, align: TOP_LEFT, x: 179, y: 325, hidden: true }
              - image: { id: ovl_tire_rr, src: img_tire_rr, align: TOP_LEFT, x: 287, y: 325, hidden: true }

        # ═══════════════════════════════════════════════════
        # FUEL + DEF gauges (right of the van schematic)
        # ═══════════════════════════════════════════════════
        # ── Fuel ──
        - label:
            id: lbl_fuel_title
            text: "FUEL"
            text_font: roboto_small
            text_color: 0x8B949E
            align: TOP_LEFT
            x: 540
            y: 70
