# Driver Controller - Waveshare 8.8" DSI Touch (ESP32-P4)
# TEMPORARY base config: minimal LVGL "hello world" with all sensors removed.

substitutions:
  device_name: driver-controller
  friendly_name: Driver Controller
  project_name: driver-controller
  project_version: "1.0.1"
  log_level: INFO

  # Colors
  color_bg: "0x000000"
  color_unavailable: "0x3A3A3A"   # no data / disconnected indicator
  color_critical: "0xF85149"      # critical level (<= 15%)
  color_warning: "0xF0883E"       # warning level (<= 30%)

  # Charging graph full-scale (watts)
  graph_max_w: "1000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/esp32-p4-wifi6.yaml
      - path: devices/88-dsi-touch-a.yaml
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: dsi_touchscreen
          backlight_id: display_backlight
      - path: packages/ota/esp32_hosted_http.yaml

# ---- Display / Touch Orientation ----
# 1920x480 landscape via LVGL rotation (270). The panel itself stays unrotated
# (rotation 0) because LVGL owns the rotation; setting rotation on waveshare_dsi
# while LVGL is active is not allowed. The device package defaults it to 270,
# so override to 0 here (matches the known-good waveshare-esp32-p4 config).
waveshare_dsi:
  rotation: 0

touchscreen:
  - id: !extend dsi_touchscreen
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - logger.log:
          format: "Touch at x=%d y=%d (raw x=%d y=%d)"
          args: ['touch.x', 'touch.y', 'touch.x_raw', 'touch.y_raw']

# ---- Vehicle schematic overlay state ----
# These globals drive which window/door overlays are shown. No Home Assistant
# wiring yet — set them from HA sensors later, or toggle for testing.
globals:
  # Passenger-door open state (drives which window overlay is shown)
  - id: pass_door_open
    type: bool
    initial_value: 'false'
  # Passenger window position: 0 = closed, 1 = vent, 2 = open
  - id: pass_window_mode
    type: int
    initial_value: '0'
  # Driver-door open state (drives which driver-window overlay is shown)
  - id: driver_door_open
    type: bool
    initial_value: 'false'
  # Driver window position: 0 = closed, 1 = vent, 2 = open
  - id: driver_window_mode
    type: int
    initial_value: '0'
  # Latest charging power (W) for the time graph
  - id: solar_watts
    type: float
    initial_value: '0'
  - id: alternator_watts
    type: float
    initial_value: '0'
  - id: ac_watts
    type: float
    initial_value: '0'

  # ── DEF range tracking ──
  # Estimates miles until the DEF tank is empty from the consumption rate
  # measured since the last refill (odometer delta vs DEF % consumed).
  - id: def_level_now        # latest DEF reading (%), -1 = unknown
    type: float
    restore_value: no
    initial_value: '-1'
  - id: def_ref_level        # DEF % captured at the last refill / baseline
    type: float
    restore_value: yes
    initial_value: '-1'
  - id: def_ref_odometer     # odometer (mi) captured at the last refill / baseline
    type: float
    restore_value: yes
    initial_value: '-1'
  - id: def_last_level       # previous DEF % (used to detect a refill)
    type: float
    restore_value: yes
    initial_value: '-1'
  - id: def_miles_remaining  # computed estimate (mi), -1 = not enough data
    type: float
    restore_value: no
    initial_value: '-1'

script:
  # Pick the correct passenger-window overlay from window mode + door state.
  # The four window images encode {open|vent} x {door closed|door open}.
  - id: update_pass_window
    then:
      - lambda: |-
          // Hide all four first.
          lv_obj_add_flag(id(ovl_win_open_doorclosed), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_open_dooropen), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_vent_doorclosed), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_vent_dooropen), LV_OBJ_FLAG_HIDDEN);
          bool door_open = id(pass_door_open);
          int window_mode = id(pass_window_mode);
          lv_obj_t* overlay_to_show = nullptr;
          if (window_mode == 2) overlay_to_show = door_open ? id(ovl_win_open_dooropen) : id(ovl_win_open_doorclosed);
          else if (window_mode == 1) overlay_to_show = door_open ? id(ovl_win_vent_dooropen) : id(ovl_win_vent_doorclosed);
          if (overlay_to_show) lv_obj_clear_flag(overlay_to_show, LV_OBJ_FLAG_HIDDEN);

  # Driver-window equivalent of update_pass_window (uses the driver door state).
  - id: update_driver_window
    then:
      - lambda: |-
          // Hide all four first.
          lv_obj_add_flag(id(ovl_driver_window_open_doorclosed), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_driver_window_open_dooropen), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_driver_window_vent_doorclosed), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_driver_window_vent_dooropen), LV_OBJ_FLAG_HIDDEN);
          bool door_open = id(driver_door_open);
          int window_mode = id(driver_window_mode);
          lv_obj_t* overlay_to_show = nullptr;
          if (window_mode == 2) overlay_to_show = door_open ? id(ovl_driver_window_open_dooropen) : id(ovl_driver_window_open_doorclosed);
          else if (window_mode == 1) overlay_to_show = door_open ? id(ovl_driver_window_vent_dooropen) : id(ovl_driver_window_vent_doorclosed);
          if (overlay_to_show) lv_obj_clear_flag(overlay_to_show, LV_OBJ_FLAG_HIDDEN);

  # Estimate miles until the DEF tank is empty. DEF is consumed roughly in
  # proportion to distance, so we measure the %/mile burn rate since the last
  # refill and project the current level forward.
  - id: update_def_range
    then:
      - lambda: |-
          const float FILL_THRESHOLD = 5.0f;   // % jump that counts as a refill
          const float MIN_USED = 3.0f;         // need >= this % consumed for a stable slope
          const float MIN_MILES = 100.0f;      // and >= this many miles since the baseline

          float def_now = id(def_level_now);
          float odometer_now = id(ha_odometer).state;

          // Need both a DEF reading and an odometer reading to do anything.
          if (def_now < 0 || isnan(odometer_now)) {
            return;
          }

          // Seed the baseline on the first valid sample (or after a flash erase).
          if (id(def_ref_level) < 0 || id(def_ref_odometer) < 0) {
            id(def_ref_level) = def_now;
            id(def_ref_odometer) = odometer_now;
            id(def_last_level) = def_now;
          }

          // Detect a refill (level jumped up): reset the baseline to now.
          if (id(def_last_level) >= 0 && def_now > id(def_last_level) + FILL_THRESHOLD) {
            ESP_LOGI("def", "DEF refill detected (%.0f%% -> %.0f%%) at %.0f mi",
                     id(def_last_level), def_now, odometer_now);
            id(def_ref_level) = def_now;
            id(def_ref_odometer) = odometer_now;
          }
          id(def_last_level) = def_now;

          float miles_since_baseline = odometer_now - id(def_ref_odometer);
          float percent_used = id(def_ref_level) - def_now;   // % consumed since baseline

          if (miles_since_baseline >= MIN_MILES && percent_used >= MIN_USED) {
            float percent_per_mile = percent_used / miles_since_baseline;
            float estimated_miles = def_now / percent_per_mile;   // miles until empty
            id(def_miles_remaining) = estimated_miles < 0 ? 0.0f : estimated_miles;
          } else {
            id(def_miles_remaining) = -1.0f;           // not enough data yet
          }
      - lvgl.label.update:
          id: lbl_def_range
          text: !lambda |-
            if (id(def_miles_remaining) < 0) return std::string("~-- mi");
            char buf[24];
            snprintf(buf, sizeof(buf), "~%.0f mi", id(def_miles_remaining));
            return std::string(buf);
          text_color: !lambda 'return id(def_miles_remaining) < 0 ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

# ---- Charging graph scroll ----
# Every tick, append the latest solar/alternator watts and redraw the two
# polylines. Plot is 648x270 px (matches the line widgets inside card_charge);
# full-scale = ${graph_max_w} W. set_points() copies into the widget's internal
# buffer, so no static storage is needed for the points themselves.
interval:
  - interval: 3s
    then:
      - lambda: |-
          static const int POINT_COUNT = 60;
          static float solar_history[POINT_COUNT] = {0};
          static float alternator_history[POINT_COUNT] = {0};
          static float ac_history[POINT_COUNT] = {0};
          const float plot_width = 648.0f, plot_height = 270.0f;
          const float max_watts = ${graph_max_w};
          for (int i = 1; i < POINT_COUNT; i++) {
            solar_history[i-1] = solar_history[i];
            alternator_history[i-1] = alternator_history[i];
            ac_history[i-1] = ac_history[i];
          }
          solar_history[POINT_COUNT-1]      = isnan(id(solar_watts))      ? 0.0f : id(solar_watts);
          alternator_history[POINT_COUNT-1] = isnan(id(alternator_watts)) ? 0.0f : id(alternator_watts);
          ac_history[POINT_COUNT-1]         = isnan(id(ac_watts))         ? 0.0f : id(ac_watts);
          esphome::FixedVector<lv_point_precise_t> solar_points, alternator_points, ac_points;
          solar_points.init(POINT_COUNT);
          alternator_points.init(POINT_COUNT);
          ac_points.init(POINT_COUNT);
          for (int i = 0; i < POINT_COUNT; i++) {
            lv_value_precise_t point_x = (lv_value_precise_t)((float)i * plot_width / (float)(POINT_COUNT - 1));
            float solar_fraction = solar_history[i] / max_watts;
            if (solar_fraction < 0) solar_fraction = 0;
            if (solar_fraction > 1) solar_fraction = 1;
            float alternator_fraction = alternator_history[i] / max_watts;
            if (alternator_fraction < 0) alternator_fraction = 0;
            if (alternator_fraction > 1) alternator_fraction = 1;
            float ac_fraction = ac_history[i] / max_watts;
            if (ac_fraction < 0) ac_fraction = 0;
            if (ac_fraction > 1) ac_fraction = 1;
            solar_points.push_back(lv_point_precise_t{ point_x, (lv_value_precise_t)(plot_height - solar_fraction * plot_height) });
            alternator_points.push_back(lv_point_precise_t{ point_x, (lv_value_precise_t)(plot_height - alternator_fraction * plot_height) });
            ac_points.push_back(lv_point_precise_t{ point_x, (lv_value_precise_t)(plot_height - ac_fraction * plot_height) });
          }
          id(line_solar)->set_points(std::move(solar_points));
          id(line_alternator)->set_points(std::move(alternator_points));
          id(line_ac)->set_points(std::move(ac_points));

# ---- Fonts ----
font:
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto_small
    size: 26
    bpp: 4
    glyphs: " !\"#%'()+,-./0123456789:;<=>?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz"
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto_medium
    size: 34
    bpp: 4
    glyphs: " !\"#%'()+,-./0123456789:;<=>?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz°"
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto_large
    size: 46
    bpp: 4
    glyphs: " !\"#%'()+,-./0123456789:;<=>?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz"

  # Material Design Icons used by the climate badges.
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_badge
    size: 36
    bpp: 4
    glyphs:
      - "\U000F050F"  # thermometer (interior temp)
      - "\U000F058E"  # water-percent (humidity)
      - "\U000F0290"  # fridge

# ---- Home Assistant Sensors ----
sensor:
  # Fuel tank level (0-100 %)
  - platform: homeassistant
    id: ha_fuel_level
    entity_id: sensor.wican_fc012cdbd495_local_2f_fueltanklevel
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_fuel
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_fuel
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(${color_unavailable});
                if (x <= 15) return lv_color_hex(${color_critical});
                if (x <= 30) return lv_color_hex(${color_warning});
                return lv_color_hex(0x3FB950);
        - lvgl.label.update:
            id: lbl_fuel_percent
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f%%", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # DEF (Diesel Exhaust Fluid) level (0-100 %)
  - platform: homeassistant
    id: ha_def_level
    entity_id: sensor.wican_fc012cdbd495_local_9b_dieselexhaustfluidsensordata
    internal: true
    on_value:
      then:
        - lambda: 'id(def_level_now) = isnan(x) ? -1.0f : x;'
        - lvgl.bar.update:
            id: bar_def
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_def
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(${color_unavailable});
                if (x <= 30) return lv_color_hex(${color_critical});
                if (x <= 50) return lv_color_hex(${color_warning});
                return lv_color_hex(0x58A6FF);
        - lvgl.label.update:
            id: lbl_def_percent
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f%%", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'
        - script.execute: update_def_range

  # ── Odometer (total vehicle distance, miles) — drives the DEF range estimate ──
  - platform: homeassistant
    id: ha_odometer
    entity_id: sensor.odometer  # TODO VALIDATE (must report miles)
    internal: true
    on_value:
      then:
        - script.execute: update_def_range

  # Fuel remaining (HA number entity, numeric state)
  - platform: homeassistant
    id: ha_fuel_remaining
    entity_id: number.fuel_remaining
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fuel_remaining
            text: !lambda |-
              if (isnan(x)) return std::string("Fuel: --");
              char buf[24]; snprintf(buf, sizeof(buf), "Fuel: %.1f gal", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # Range / miles remaining (HA number entity, numeric state)
  - platform: homeassistant
    id: ha_miles_remaining
    entity_id: number.miles_remaining
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_range
            text: !lambda |-
              if (isnan(x)) return std::string("Range: --");
              char buf[24]; snprintf(buf, sizeof(buf), "Range: %.0f mi", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # ── Battery state of charge (0-100 %) ──
  - platform: homeassistant
    id: ha_battery_soc
    entity_id: sensor.ecoflow_battery_percentage  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_battery
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_battery
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(${color_unavailable});
                if (x <= 15) return lv_color_hex(${color_critical});
                if (x <= 30) return lv_color_hex(${color_warning});
                return lv_color_hex(0x3FB950);
        - lvgl.label.update:
            id: lbl_battery_percent
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f%%", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # ── Solar charging power (W) → graph + label ──
  - platform: homeassistant
    id: ha_solar_watts
    entity_id: sensor.ecoflow_solar_in_power  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lambda: 'id(solar_watts) = x;'
        - lvgl.label.update:
            id: lbl_solar_watts
            text: !lambda |-
              if (isnan(x)) return std::string("-- W");
              char buf[12]; snprintf(buf, sizeof(buf), "%.0f W", x); return std::string(buf);

  # ── Alternator charging power (W) → graph + label ──
  - platform: homeassistant
    id: ha_alternator_watts
    entity_id: sensor.ecoflow_alternator_charging_power  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lambda: 'id(alternator_watts) = x;'
        - lvgl.label.update:
            id: lbl_alternator_watts
            text: !lambda |-
              if (isnan(x)) return std::string("-- W");
              char buf[12]; snprintf(buf, sizeof(buf), "%.0f W", x); return std::string(buf);

  # ── A/C (shore power) charging input (W) → graph + label ──
  - platform: homeassistant
    id: ha_ac_watts
    entity_id: sensor.ecoflow_ac_in_power  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lambda: 'id(ac_watts) = x;'
        - lvgl.label.update:
            id: lbl_ac_watts
            text: !lambda |-
              if (isnan(x)) return std::string("-- W");
              char buf[12]; snprintf(buf, sizeof(buf), "%.0f W", x); return std::string(buf);

  # ── Interior temperature (°F) ──
  - platform: homeassistant
    id: ha_interior_temp
    entity_id: sensor.cabin_average_temperature  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_interior_value
            text: !lambda |-
              if (isnan(x)) return std::string("--°");
              char buf[12]; snprintf(buf, sizeof(buf), "%.0f°", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'
        - lvgl.label.update:
            id: lbl_interior_icon
            text_color: !lambda |-
              if (isnan(x)) return lv_color_hex(${color_unavailable});
              if (x >= 85) return lv_color_hex(${color_critical});
              if (x >= 78) return lv_color_hex(${color_warning});
              if (x <= 55) return lv_color_hex(0x58A6FF);
              return lv_color_hex(0x3FB950);

  # ── Interior humidity (%) ──
  - platform: homeassistant
    id: ha_humidity
    entity_id: sensor.interior_humidity  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_humidity_value
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f%%", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'
        - lvgl.label.update:
            id: lbl_humidity_icon
            text_color: !lambda |-
              if (isnan(x)) return lv_color_hex(${color_unavailable});
              if (x >= 70) return lv_color_hex(${color_warning});
              if (x <= 25) return lv_color_hex(${color_warning});
              return lv_color_hex(0x58A6FF);

  # ── Fridge temperature (°F) ──
  - platform: homeassistant
    id: ha_fridge_temp
    entity_id: sensor.fridge_temperature  # TODO VALIDATE
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fridge_value
            text: !lambda |-
              if (isnan(x)) return std::string("--°");
              char buf[12]; snprintf(buf, sizeof(buf), "%.0f°", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'
        - lvgl.label.update:
            id: lbl_fridge_icon
            text_color: !lambda |-
              if (isnan(x)) return lv_color_hex(${color_unavailable});
              if (x >= 45) return lv_color_hex(${color_critical});
              if (x >= 40) return lv_color_hex(${color_warning});
              return lv_color_hex(0x81D4FA);

binary_sensor:
  # When HA/API connection drops, reset bars + labels to the disconnected state.
  - platform: status
    id: device_online
    internal: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return !x;'
            then:
              - lvgl.bar.update:
                  id: bar_fuel
                  value: 0
              - lvgl.bar.update:
                  id: bar_fuel
                  indicator:
                    bg_color: ${color_unavailable}
              - lvgl.bar.update:
                  id: bar_def
                  value: 0
              - lvgl.bar.update:
                  id: bar_def
                  indicator:
                    bg_color: ${color_unavailable}
              - lvgl.label.update:
                  id: lbl_fuel_percent
                  text: "--%"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_def_percent
                  text: "--%"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_def_range
                  text: "~-- mi"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_fuel_remaining
                  text: "Fuel: --"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_range
                  text: "Range: --"
                  text_color: 0x555555
              - lvgl.bar.update:
                  id: bar_battery
                  value: 0
              - lvgl.bar.update:
                  id: bar_battery
                  indicator:
                    bg_color: ${color_unavailable}
              - lvgl.label.update:
                  id: lbl_battery_percent
                  text: "--%"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_solar_watts
                  text: "-- W"
              - lvgl.label.update:
                  id: lbl_alternator_watts
                  text: "-- W"
              - lvgl.label.update:
                  id: lbl_ac_watts
                  text: "-- W"
              - lvgl.label.update:
                  id: lbl_interior_value
                  text: "--°"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_humidity_value
                  text: "--%"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_fridge_value
                  text: "--°"
                  text_color: 0x555555

  # Water pump on/off state — only show the "off" button when it's running.
  - platform: homeassistant
    id: ha_water_pump_state
    entity_id: switch.water_pump  # TODO VALIDATE
    internal: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.widget.show: btn_water_pump_off
            else:
              - lvgl.widget.hide: btn_water_pump_off

  # A/C inverter on/off state — only show the "off" button when it's running.
  - platform: homeassistant
    id: ha_ac_inverter_state
    entity_id: switch.ac_inverter  # TODO VALIDATE
    internal: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              - lvgl.widget.show: btn_ac_inverter_off
            else:
              - lvgl.widget.hide: btn_ac_inverter_off

