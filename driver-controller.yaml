# Driver Controller - Waveshare 8.8" DSI Touch (ESP32-P4)
# TEMPORARY base config: minimal LVGL "hello world" with all sensors removed.

substitutions:
  device_name: driver-controller
  friendly_name: Driver Controller
  project_name: driver-controller
  project_version: "1.0.1"
  log_level: INFO

  # Colors
  color_bg: "0x000000"
  color_unavailable: "0x3A3A3A"   # no data / disconnected indicator
  color_critical: "0xF85149"      # critical level (<= 15%)
  color_warning: "0xF0883E"       # warning level (<= 30%)

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/esp32-p4-wifi6.yaml
      - path: devices/88-dsi-touch-a.yaml
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: dsi_touchscreen
          backlight_id: display_backlight
      - path: packages/ota/esp32_hosted_http.yaml

# ---- Display / Touch Orientation ----
# 1920x480 landscape via LVGL rotation (270). The panel itself stays unrotated
# (rotation 0) because LVGL owns the rotation; setting rotation on waveshare_dsi
# while LVGL is active is not allowed. The device package defaults it to 270,
# so override to 0 here (matches the known-good waveshare-esp32-p4 config).
waveshare_dsi:
  rotation: 0

touchscreen:
  - id: !extend dsi_touchscreen
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - logger.log:
          format: "Touch at x=%d y=%d (raw x=%d y=%d)"
          args: ['touch.x', 'touch.y', 'touch.x_raw', 'touch.y_raw']

# ---- Vehicle schematic overlay state ----
# These globals drive which window/door overlays are shown. No Home Assistant
# wiring yet — set them from HA sensors later, or toggle for testing.
globals:
  # Passenger-door open state (drives which window overlay is shown)
  - id: pass_door_open
    type: bool
    initial_value: 'false'
  # Passenger window position: 0 = closed, 1 = vent, 2 = open
  - id: pass_window_mode
    type: int
    initial_value: '0'
  # Driver-door open state (drives which driver-window overlay is shown)
  - id: drv_door_open
    type: bool
    initial_value: 'false'
  # Driver window position: 0 = closed, 1 = vent, 2 = open
  - id: drv_window_mode
    type: int
    initial_value: '0'

script:
  # Pick the correct passenger-window overlay from window mode + door state.
  # The four window images encode {open|vent} x {door closed|door open}.
  - id: update_pass_window
    then:
      - lambda: |-
          // Hide all four first.
          lv_obj_add_flag(id(ovl_win_open_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_open_do), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_vent_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_win_vent_do), LV_OBJ_FLAG_HIDDEN);
          bool dopen = id(pass_door_open);
          int w = id(pass_window_mode);
          lv_obj_t* show = nullptr;
          if (w == 2) show = dopen ? id(ovl_win_open_do) : id(ovl_win_open_dc);
          else if (w == 1) show = dopen ? id(ovl_win_vent_do) : id(ovl_win_vent_dc);
          if (show) lv_obj_clear_flag(show, LV_OBJ_FLAG_HIDDEN);

  # Driver-window equivalent of update_pass_window (uses the driver door state).
  - id: update_drv_window
    then:
      - lambda: |-
          // Hide all four first.
          lv_obj_add_flag(id(ovl_dwin_open_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_dwin_open_do), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_dwin_vent_dc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ovl_dwin_vent_do), LV_OBJ_FLAG_HIDDEN);
          bool dopen = id(drv_door_open);
          int w = id(drv_window_mode);
          lv_obj_t* show = nullptr;
          if (w == 2) show = dopen ? id(ovl_dwin_open_do) : id(ovl_dwin_open_dc);
          else if (w == 1) show = dopen ? id(ovl_dwin_vent_do) : id(ovl_dwin_vent_dc);
          if (show) lv_obj_clear_flag(show, LV_OBJ_FLAG_HIDDEN);

# ---- Fonts ----
font:
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto_small
    size: 26
    bpp: 4
    glyphs: " !\"#%'()+,-./0123456789:;<=>?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz"
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto_medium
    size: 34
    bpp: 4
    glyphs: " !\"#%'()+,-./0123456789:;<=>?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz"
  - file: "fonts/Roboto-Regular.ttf"
    id: roboto_large
    size: 46
    bpp: 4
    glyphs: " !\"#%'()+,-./0123456789:;<=>?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz"

# ---- Home Assistant Sensors ----
sensor:
  # Fuel tank level (0-100 %)
  - platform: homeassistant
    id: ha_fuel_level
    entity_id: sensor.wican_fc012cdbd495_local_2f_fueltanklevel
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_fuel
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_fuel
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(${color_unavailable});
                if (x <= 15) return lv_color_hex(${color_critical});
                if (x <= 30) return lv_color_hex(${color_warning});
                return lv_color_hex(0x3FB950);
        - lvgl.label.update:
            id: lbl_fuel_pct
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f%%", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # DEF (Diesel Exhaust Fluid) level (0-100 %)
  - platform: homeassistant
    id: ha_def_level
    entity_id: sensor.wican_fc012cdbd495_local_9b_dieselexhaustfluidsensordata
    internal: true
    on_value:
      then:
        - lvgl.bar.update:
            id: bar_def
            value: !lambda 'return isnan(x) ? 0 : (int)x;'
        - lvgl.bar.update:
            id: bar_def
            indicator:
              bg_color: !lambda |-
                if (isnan(x)) return lv_color_hex(${color_unavailable});
                if (x <= 30) return lv_color_hex(${color_critical});
                if (x <= 50) return lv_color_hex(${color_warning});
                return lv_color_hex(0x58A6FF);
        - lvgl.label.update:
            id: lbl_def_pct
            text: !lambda |-
              if (isnan(x)) return std::string("--%");
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f%%", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # Fuel remaining (HA number entity, numeric state)
  - platform: homeassistant
    id: ha_fuel_remaining
    entity_id: number.fuel_remaining
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fuel_remaining
            text: !lambda |-
              if (isnan(x)) return std::string("Fuel: --");
              char buf[24]; snprintf(buf, sizeof(buf), "Fuel: %.1f gal", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

  # Range / miles remaining (HA number entity, numeric state)
  - platform: homeassistant
    id: ha_miles_remaining
    entity_id: number.miles_remaining
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_range
            text: !lambda |-
              if (isnan(x)) return std::string("Range: --");
              char buf[24]; snprintf(buf, sizeof(buf), "Range: %.0f mi", x); return std::string(buf);
            text_color: !lambda 'return isnan(x) ? lv_color_hex(0x555555) : lv_color_hex(0xF0F6FC);'

binary_sensor:
  # When HA/API connection drops, reset bars + labels to the disconnected state.
  - platform: status
    id: device_online
    internal: true
    on_state:
      then:
        - if:
            condition:
              lambda: 'return !x;'
            then:
              - lvgl.bar.update:
                  id: bar_fuel
                  value: 0
              - lvgl.bar.update:
                  id: bar_fuel
                  indicator:
                    bg_color: ${color_unavailable}
              - lvgl.bar.update:
                  id: bar_def
                  value: 0
              - lvgl.bar.update:
                  id: bar_def
                  indicator:
                    bg_color: ${color_unavailable}
              - lvgl.label.update:
                  id: lbl_fuel_pct
                  text: "--%"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_def_pct
                  text: "--%"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_fuel_remaining
                  text: "Fuel: --"
                  text_color: 0x555555
              - lvgl.label.update:
                  id: lbl_range
                  text: "Range: --"
                  text_color: 0x555555

