# ---- LVGL Dashboard ----
# Left column shows a top-down van schematic: base art + transparent overlays
# (doors, windows, tires, unlock indicators) toggled via overlay ids. No HA
# wiring yet — overlays start hidden.
lvgl:
  displays:
    - dsi_display
  rotation: 270
  touchscreens:
    - dsi_touchscreen
  color_depth: 16
  buffer_size: 100%
  byte_order: little_endian
  # Thick horizontal bar look for fuel / DEF gauges.
  style_definitions:
    - id: gauge_bar
      radius: 8
      border_width: 0
      bg_color: 0x21262D
      bg_opa: COVER
    # Rounded card behind a HA-style icon+value badge.
    - id: badge_card
      radius: 14
      border_width: 0
      bg_color: 0x161B22
      bg_opa: COVER
    # Rounded panel behind the charging graph.
    - id: panel_card
      radius: 14
      border_width: 0
      bg_color: 0x0D1117
      bg_opa: COVER
  pages:
    - id: main_page
      bg_color: 0x010409
      widgets:
        - obj:
            id: card_doors
            width: 480
            height: 480
            x: 0
            y: 0
            bg_opa: TRANSP
            radius: 0
            border_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            pad_all: 0
            widgets:
              # Base van (always shown)
              - image: { src: img_van_base, align: TOP_LEFT, x: 155, y: 42 }
