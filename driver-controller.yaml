# Driver Controller - Waveshare 8.8" DSI Touch (ESP32-P4)
# TEMPORARY base config: minimal LVGL "hello world" with all sensors removed.

substitutions:
  device_name: driver-controller
  friendly_name: Driver Controller
  project_name: driver-controller
  project_version: "1.0.1"
  log_level: INFO

  # Colors
  color_bg: "0x000000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/esp32-p4-wifi6.yaml
      - path: devices/88-dsi-touch-a.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: dsi_touchscreen
          backlight_id: display_backlight
      - path: packages/ota/esp32_hosted_http.yaml

# ---- Display / Touch Orientation ----
# 1920x480 landscape via LVGL rotation (270). The panel itself stays unrotated
# (rotation 0) because LVGL owns the rotation; setting rotation on waveshare_dsi
# while LVGL is active is not allowed. The device package defaults it to 270,
# so override to 0 here (matches the known-good waveshare-esp32-p4 config).
waveshare_dsi:
  rotation: 0

touchscreen:
  - id: !extend dsi_touchscreen
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

# ---- LVGL: Hello World ----
lvgl:
  displays:
    - dsi_display
  rotation: 270
  touchscreens:
    - dsi_touchscreen
  color_depth: 16
  buffer_size: 100%
  byte_order: little_endian
  pages:
    - id: main_page
      bg_color: 0x010409
      widgets:
        - label:
            align: CENTER
            text: "Hello, World!"
            text_color: 0xF0F6FC
