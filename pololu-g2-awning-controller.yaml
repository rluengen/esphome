# =============================================================================
#  Awning Controller - Pololu G2 18v17 (18A H-Bridge) with Built-in Current Sensing
#  Hardware: Seeed Studio XIAO ESP32-S3 + Pololu G2 18v17
#
#  Current sensing via Pololu's built-in CURRENT feedback pin (ADC).
#  The motor driver is powered by 12V battery.
#
#  Wiring:
#    12V battery + -- Pololu VIN
#    12V battery - -- Pololu GND
#    Pololu GND -- XIAO GND
#
#    Motor Control (Direct GPIO):
#      XIAO D2 (GPIO3) -- Pololu PWM (motor enable/speed)
#      XIAO D3 (GPIO4) -- Pololu DIR (direction: HIGH=forward, LOW=backward)
#
#    Current Sensing (Direct ADC):
#      XIAO D0 (GPIO1) -- Pololu CURRENT (analog voltage feedback proportional to motor current)
#
#    Pololu OUT A -- Motor terminal 1
#    Pololu OUT B -- Motor terminal 2
#
#  If motor runs the wrong direction, toggle the "Reverse Direction" switch
#  in Home Assistant (persists across reboots), or swap the motor wires.
#
#  Calibration steps:
#    1. Flash this config and power up
#    2. Open the ESPHome logs (or HA device page)
#    3. Run the motor and note the "Motor Current" sensor reading
#    4. Measure actual current with a multimeter
#    5. Adjust current_calibration = actual_amps / reported_amps, reflash
#    6. Run motor to full extend - note the running current (steady state)
#    7. Set moving_current_threshold to ~50% of the running current
#    8. Stall/block the motor briefly - note the stall current
#    9. Set obstacle_current_threshold to ~80% of the stall current
#   10. Time how long full extend/retract takes, set open/close_duration
#       (add a few seconds of margin)
#   11. Reflash with final values
#
  Pololu G2 18v17 note: Rated up to 18V, 18A peak, but operating at 12V.
#  Includes internal current limiting and thermal shutdown protection.
#  Full PWM range supported (0-100%).
#  Built-in current limiting protects against stalls and short circuits.
#  CURRENT pin outputs 0-3.3V proportional to motor current (0-18A).
# =============================================================================

substitutions:
  device_name: awning-controller
  friendly_name: Awning Controller
  project_name: Awning Controller
  project_version: "1.0.0"
  log_level: DEBUG

  # --- Pololu G2 18v17 GPIO pins ---
  # Direct GPIO connections from XIAO to Pololu
  pwm_pin: GPIO3     # Motor enable/speed  (PWM input)
  dir_pin: GPIO4     # Direction control   (logic input: HIGH=forward, LOW=backward)

  # --- Pololu Current Sensing (ADC) ---
  current_sense_pin: GPIO1   # D0 - analog voltage feedback from Pololu CURRENT pin
  # Pololu outputs 0-3.3V on CURRENT pin proportional to 0-18A motor current
  # Conversion factor: voltage_to_amps = current_amps / 3.3 * (3.3 / adc_raw_max)
  current_conversion_factor: "5.45"  # Approximate: 18A / 3.3V

  # --- Current thresholds (amps) ---
  # moving: motor draws MORE than this while running.
  #         When current drops BELOW this, the cover assumes it hit the
  #         end stop and reports fully open or fully closed.
  #         Set to ~50% of steady-state running current.
  moving_current_threshold: "0.3"

  # obstacle: if current exceeds this, something is blocking the motor.
  #           Motor stops immediately to prevent damage.
  #           Set to ~80% of measured stall current.
  obstacle_current_threshold: "5.0"

  # --- Travel times ---
  # How long it takes to fully extend / retract (seconds).
  # Used for position estimation (the 0-100% slider in HA).
  # Measure actual travel time and add a few seconds of margin.
  open_duration_value: "60s"
  close_duration_value: "60s"

  # --- Safety timeout ---
  # Absolute maximum motor run time. Motor stops regardless.
  max_duration_value: "120s"

  # --- Current sensor polling during movement (ms) ---
  # Lower = more responsive end-stop detection, higher CPU usage.
  current_update_interval_ms: "100"

# --- Packages ---
packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: devices/xiao-esp32s3.yaml
      - path: packages/ota/http_update.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}
  on_shutdown:
    then:
      - switch.turn_off: motor_pwm
      - switch.turn_off: motor_dir

# =============================================================================
# GPIO OUTPUTS - Pololu G2 18v17 control pins
# =============================================================================
switch:
  - platform: gpio
    id: motor_dir
    name: "Motor Direction"
    pin: ${dir_pin}
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: motor_pwm
    name: "Motor Enable"
    pin: ${pwm_pin}
    internal: true
    restore_mode: ALWAYS_OFF

  # Flip motor direction from HA without reflashing.
  # State persists across reboots.
  - platform: template
    name: "Reverse Direction"
    id: reverse_direction
    icon: mdi:swap-horizontal
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# =============================================================================
# CURRENT SENSOR - Pololu G2 Built-in Current Sensing (ADC)
# =============================================================================
sensor:
  - platform: adc
    pin: ${current_sense_pin}
    name: "Motor Current"
    id: motor_current
    update_interval: 100ms
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    icon: mdi:current-dc
    attenuation: auto
    filters:
      # Convert ADC voltage (0-3.3V) to current (0-18A)
      # Pololu CURRENT pin: 0V = 0A, 3.3V = 18A
      - lambda: |-
          // ADC reading is 0-4095 for 0-3.3V
          // Pololu outputs voltage proportional to current
          // 3.3V / 4095 = 0.8057 mV per ADC step
          // 18A / 3.3V = 5.45 A/V conversion
          return x * 5.45;

# =============================================================================
# COVER - Current-based with position estimation and end-stop detection
# =============================================================================
cover:
  - platform: current_based
    name: "Awning"
    id: awning_cover
    device_class: awning

    open_action:
      - logger.log: "Awning: extending"
      - lambda: |-
          bool reversed = id(reverse_direction).state;
          if (!reversed) id(motor_dir).turn_on();
          else id(motor_dir).turn_off();
      - switch.turn_on: motor_pwm
      - while:
          condition:
            lambda: |-
              auto state = id(awning_cover).current_operation;
              return state == COVER_OPERATION_OPENING || state == COVER_OPERATION_CLOSING;
          then:
            - delay: ${current_update_interval_ms}ms

    open_duration: ${open_duration_value}
    open_sensor: motor_current
    open_moving_current_threshold: ${moving_current_threshold}
    open_obstacle_current_threshold: ${obstacle_current_threshold}

    close_action:
      - logger.log: "Awning: retracting"
      - lambda: |-
          bool reversed = id(reverse_direction).state;
          if (reversed) id(motor_dir).turn_on();
          else id(motor_dir).turn_off();
      - switch.turn_on: motor_pwm
      - while:
          condition:
            lambda: |-
              auto state = id(awning_cover).current_operation;
              return state == COVER_OPERATION_OPENING || state == COVER_OPERATION_CLOSING;
          then:
            - delay: ${current_update_interval_ms}ms

    close_duration: ${close_duration_value}
    close_sensor: motor_current
    close_moving_current_threshold: ${moving_current_threshold}
    close_obstacle_current_threshold: ${obstacle_current_threshold}

    stop_action:
      - logger.log: "Awning: stopped"
      - switch.turn_off: motor_pwm
      - switch.turn_off: motor_dir

    malfunction_detection: false
    max_duration: ${max_duration_value}
