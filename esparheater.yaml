# =============================================================================
#  Espar (Eberspacher) Airtronic AS3 D2L Diesel Heater - CAN Bus Controller
#  Hardware: Seeed Studio XIAO ESP32-S3 + CAN Bus Breakout Board (MCP2515)
#
#  Approach: Heater-regulated - we send the user's desired temperature to the
#  heater via CAN and let the heater's internal PID controller modulate fan
#  speed and fuel pump rate.  The ESPHome thermostat acts only as a safety
#  supervisor (cuts off if cabin overshoots by 3 deg C).
#
#  Wiring:
#    XIAO CAN Bus Breakout Board plugs directly onto the XIAO ESP32-S3.
#    Connect CAN-H and CAN-L terminals to the Espar heater CAN bus lines.
#    If CAN communication fails, short the P1 pad on the back of the breakout
#    board to enable the 120 ohm termination resistor.
#
#  EasyStart Pro Connector Wire Colors (AS3 D2L):
#    RD   (red)        - +12V Power
#    BN   (brown)      - Ground
#    BURD (blue/red)   - CAN-H
#    BUBK (blue/black) - CAN-L
#
#  CAN Protocol (from TrooperDuper/espar-airtronic-esphome reverse engineering):
#    HEATER -> CONTROLLER:
#      0x625  ~100ms  Heater heartbeat
#      0x2C4  ~220ms  Status: D0=state, D1 bit5=flame, D4/D5=counter LE
#      0x2C5  ~220ms  Secondary status (observed all-zero)
#      0x2C6  ~220ms  Data (static observed)
#
#    CONTROLLER -> HEATER (we transmit):
#      0x54   200ms  Command frame
#                    IDLE: [00][00][FE][FF][ctr_lo][ctr_hi][00][00]
#                    FAN:  [01][02][FE][FF][ctr_lo][ctr_hi][00][00]
#                    HEAT: [01][05][tmp_lo][tmp_hi][ctr_lo][ctr_hi][00][00]
#                    temp = round(celsius * 10)   (CAN word = degrees C x 10)
#      0x55   200ms  Config A: 10 27 00 00 00 00 00 00
#      0x56   200ms  Config B: 10 27 00 00 00 00 00 00
#      0x57   200ms  Config C: 00 00 FE FF FE FF 00 00
#      0x60D  100ms  Controller heartbeat: 0D 10 82 B6 09 20 70 00
#      0x65   ~10s   Status burst (4 frames, D2 cycles 01->02->03)
#      0x5C-0x10A    Init burst (sent at startup until 0x625 received)
#
#  Cabin temperature sensor (optional):
#    Create a Home Assistant template sensor that averages your cabin sensors.
#    Update cabin_temp_entity below to match.  If not configured, the heater
#    runs continuously when mode=HEAT (heater thermocouple limits it safely).
#
#  External NTC temperature sensor (optional hardware):
#    Grey/Red (GYRD) + Brown/White (BNWH) wires on the heater connector.
#    If connected, the heater uses it for internal regulation.
# =============================================================================

substitutions:
  device_name: esparheater
  friendly_name: Espar Heater
  project_name: Van Espar Heater Controller
  project_version: "2.0.0"
  log_level: DEBUG

  # CAN bus bit rate - Espar uses 500 kbps
  can_bit_rate: 500kbps

  # MCP2515 crystal frequency (16MHz on the Seeed CAN Bus Expansion Board)
  mcp_clock: 16MHZ

  # Cabin temperature sensor unit: "F" (Fahrenheit) or "C" (Celsius).
  # This controls whether the sensor value is converted to Celsius internally.
  # ESPHome climate entities always work in Celsius; Home Assistant displays
  # in whatever unit your HA instance is configured for.
  cabin_temp_unit: "F"

  # Home Assistant entity ID for averaged cabin temperature sensor.
  # Set to "" if you do not have one yet - heater will still work.
  cabin_temp_entity: sensor.cabin_average_temperature

# --- Packages (remote) ---
packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: devices/xiao-esp32s3.yaml
      - path: packages/ota/http_update.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}
  on_boot:
    priority: 200
    then:
      - script.execute: send_init_burst
      - lambda: |-
          ESP_LOGI("espar", "Espar CAN controller booted - sending init burst");

# Free GPIO44 (UART0 RX) for MCP2515 CS
logger:
  hardware_uart: USB_CDC

# --- SPI Bus (XIAO ESP32-S3 default pins) ---
spi:
  clk_pin: GPIO7
  miso_pin: GPIO8
  mosi_pin: GPIO9

# =============================================================================
# GLOBALS - CAN state tracking
# =============================================================================
globals:
  # Heater status from 0x2C4
  - id: heater_ctr
    type: uint16_t
    restore_value: no
    initial_value: '0xFFFE'
  - id: heater_d1_state
    type: uint8_t
    restore_value: no
    initial_value: '0'

  # Command state (set by thermostat actions, read by 200ms TX interval)
  - id: cmd_heating
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: cmd_fan
    type: bool
    restore_value: no
    initial_value: 'false'

  # Error tracking
  - id: startup_enter_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: failed_start_count
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: locked_out
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: waiting_heat_confirm
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: heat_cmd_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Heartbeat loss detection (two-stage: timeout + grace period)
  - id: heater_last_seen
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: disconnect_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: disconnect_pending_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Init burst retry
  - id: last_init_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # 0x65 status burst sequencing
  - id: burst_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: status_burst_idx
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: status_seq
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: t_burst_frame_last
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Cabin temp availability flag
  - id: temp_available
    type: bool
    restore_value: no
    initial_value: 'false'

# =============================================================================
# CAN BUS - MCP2515 on Seeed CAN Bus Breakout Board
# =============================================================================
canbus:
  - platform: mcp2515
    id: espar_can
    cs_pin: GPIO44
    interrupt_pin: GPIO4
    clock: ${mcp_clock}
    can_id: 0
    bit_rate: ${can_bit_rate}
    on_frame:
      # --- Heater heartbeat (0x625) ---
      - can_id: 0x625
        then:
          - lambda: |-
              id(heater_last_seen) = millis();
              id(disconnect_pending) = false;
              if (!id(heater_connected)->state) {
                id(failed_start_count) = 0;
                id(locked_out) = false;
                id(heater_connected)->publish_state(true);
                id(heater_fault)->publish_state("OK");
                ESP_LOGI("espar", "Heater heartbeat received - connected");
              }

      # --- Heater status (0x2C4) ---
      - can_id: 0x2C4
        then:
          - lambda: |-
              if (x.size() < 6) return;

              uint8_t new_state = x[0];
              bool new_flame = (x[1] & 0x20) != 0;
              uint16_t new_ctr = (uint16_t)x[4] | ((uint16_t)x[5] << 8);
              id(heater_ctr) = new_ctr;

              bool state_changed = (new_state != id(heater_d1_state))
                                || (new_flame != id(flame_active)->state);

              // Track startup state transitions for error detection
              if (new_state == 0x02 && id(heater_d1_state) != 0x02) {
                id(startup_enter_ms) = millis();
                ESP_LOGD("espar", "Heater entering STARTUP state");
              }
              if (id(heater_d1_state) == 0x02 && new_state != 0x02) {
                id(startup_enter_ms) = 0;
                if (new_state == 0x03 && id(cmd_heating)) {
                  id(failed_start_count) = id(failed_start_count) + 1;
                  ESP_LOGW("espar", "STARTUP->IDLE without HEATING - failed start #%u",
                           id(failed_start_count));
                  if (id(failed_start_count) >= 10) {
                    id(locked_out) = true;
                    id(cmd_heating) = false;
                    id(cmd_fan) = false;
                    id(heater_fault)->publish_state("LOCKOUT: power-cycle heater");
                  } else {
                    char buf[32];
                    snprintf(buf, sizeof(buf), "Failed start #%u", id(failed_start_count));
                    id(heater_fault)->publish_state(buf);
                  }
                }
              }

              // Confirm heating started
              if (new_state == 0x09 && id(waiting_heat_confirm)) {
                id(waiting_heat_confirm) = false;
                id(failed_start_count) = 0;
                ESP_LOGI("espar", "Heating confirmed - flame: %s",
                         new_flame ? "active" : "off");
              }

              id(heater_d1_state) = new_state;

              if (state_changed) {
                const char *state_str =
                  (new_state == 0x09) ? "HEATING" :
                  (new_state == 0x21) ? "FAN" :
                  (new_state == 0x03) ? "IDLE" :
                  (new_state == 0x02) ? "STARTUP" : "UNKNOWN";
                id(heater_state)->publish_state(state_str);
                id(flame_active)->publish_state(new_flame);
                ESP_LOGI("espar", "State: %s | Flame: %s | Ctr: 0x%04X",
                         state_str, new_flame ? "ON" : "off", new_ctr);
              }

      # --- Catch-all: log unknown CAN IDs for future RE ---
      - can_id: 0
        can_id_mask: 0
        then:
          - lambda: |-
              // Skip known IDs
              if (can_id == 0x625 || can_id == 0x2C4 ||
                  can_id == 0x2C5 || can_id == 0x2C6) return;

              std::string hex;
              for (size_t i = 0; i < x.size(); i++) {
                char buf[4];
                snprintf(buf, sizeof(buf), "%02X ", x[i]);
                hex += buf;
              }
              ESP_LOGD("espar", "Unknown CAN 0x%03X [%d]: %s",
                       can_id, x.size(), hex.c_str());

# =============================================================================
# SCRIPT - 17-frame CAN init burst (sent until heater responds with 0x625)
# =============================================================================
script:
  - id: send_init_burst
    then:
      - lambda: |-
          auto *can = id(espar_can);
          std::vector<uint8_t> d;
          d = {0x1E,0x00,0x1E,0x00,0x00,0x00,0x00,0x00}; can->send_data(0x5C,  false, d);
          can->send_data(0x5F,  false, d);
          d = {0x12,0x00,0x00,0x00,0x00,0x00,0x00,0xF1}; can->send_data(0x62,  false, d);
          d = {0x32,0x01,0x01,0x00,0x00,0x00,0x00,0x00}; can->send_data(0x63,  false, d);
          d = {0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00}; can->send_data(0x66,  false, d);
          d = {0x12,0x00,0x00,0x00,0x00,0x00,0x00,0xF0}; can->send_data(0x6D,  false, d);
          d = {0x10,0x00,0x01,0x20,0x10,0x01};            can->send_data(0x10A, false, d);
          d = {0x00,0x00,0x00,0x00,0x00,0x00,0xFE,0xFF}; can->send_data(0x5D,  false, d);
          d = {0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00}; can->send_data(0x5E,  false, d);
          d = {0x00,0x00,0x00,0x00,0x00,0x00,0xFE,0xFF}; can->send_data(0x60,  false, d);
          d = {0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00}; can->send_data(0x61,  false, d);
          d = {0x3C,0x00,0x05,0x00,0xC8,0x00,0xFF,0x03}; can->send_data(0x64,  false, d);
          d = {0xBE,0x3E,0x27,0x00,0x01,0x1E,0x00,0x00}; can->send_data(0x67,  false, d);
          can->send_data(0x68, false, d);
          can->send_data(0x69, false, d);
          can->send_data(0x6A, false, d);
          can->send_data(0x6B, false, d);
          can->send_data(0x6C, false, d);
          ESP_LOGD("espar", "Init burst sent (17 frames)");

# =============================================================================
# INTERVALS - Periodic CAN TX and safety checks
# =============================================================================
interval:
  # --- 100ms: Controller heartbeat + init retry + status burst frames ---
  - interval: 100ms
    then:
      - lambda: |-
          if (id(espar_standby)->state) return;
          auto *can = id(espar_can);
          uint32_t now = millis();

          // Controller heartbeat 0x60D
          std::vector<uint8_t> hb = {0x0D,0x10,0x82,0xB6,0x09,0x20,0x70,0x00};
          can->send_data(0x60D, false, hb);

          // Init burst retry if heater not connected (every 150ms)
          if (!id(heater_connected)->state && (now - id(last_init_ms)) >= 150) {
            id(send_init_burst).execute();
            id(last_init_ms) = now;
          }

          // Status burst frame TX (4 frames spaced ~150ms within each burst)
          if (id(burst_in_progress)) {
            if ((now - id(t_burst_frame_last)) >= 150 || id(status_burst_idx) == 0) {
              uint8_t seq_vals[] = {0x01, 0x02, 0x03};
              uint8_t ctr_lo = id(heater_ctr) & 0xFF;
              uint8_t ctr_hi = (id(heater_ctr) >> 8) & 0xFF;
              std::vector<uint8_t> d65 = {ctr_lo, ctr_hi, seq_vals[id(status_seq)],
                                          0x00, 0x00, 0x00, 0x00, 0x00};
              can->send_data(0x65, false, d65);
              id(t_burst_frame_last) = now;
              id(status_burst_idx) = id(status_burst_idx) + 1;
              if (id(status_burst_idx) >= 4) {
                id(status_seq) = (id(status_seq) + 1) % 3;
                id(burst_in_progress) = false;
              }
            }
          }

  # --- 200ms: Command group (0x54/55/56/57) ---
  - interval: 200ms
    then:
      - lambda: |-
          if (id(espar_standby)->state) return;
          auto *can = id(espar_can);

          // NaN fallback: if HEAT mode but no cabin sensor data yet, force heating.
          // The heater's internal thermocouple provides safety limiting.
          if (id(heater_climate)->mode == climate::CLIMATE_MODE_HEAT &&
              !id(temp_available) && !id(cmd_heating) && !id(locked_out)) {
            id(cmd_heating) = true;
            id(cmd_fan) = false;
            ESP_LOGI("espar", "No cabin temp - defaulting to HEAT");
          }

          // Build 0x54 command frame
          uint8_t ctr_lo = id(heater_ctr) & 0xFF;
          uint8_t ctr_hi = (id(heater_ctr) >> 8) & 0xFF;
          std::vector<uint8_t> d54(8, 0);

          if (id(cmd_heating) && !id(locked_out)) {
            d54[0] = 0x01;
            d54[1] = 0x05;
            // Encode target temperature: CAN word = celsius * 10
            float target_c = id(heater_climate)->target_temperature;
            if (std::isnan(target_c)) target_c = 21.0f;
            target_c = std::max(10.0f, std::min(30.0f, target_c));
            uint16_t temp_word = (uint16_t)(target_c * 10.0f + 0.5f);
            d54[2] = temp_word & 0xFF;
            d54[3] = (temp_word >> 8) & 0xFF;
          } else if (id(cmd_fan) && !id(locked_out)) {
            d54[0] = 0x01;
            d54[1] = 0x02;
            d54[2] = 0xFE;
            d54[3] = 0xFF;
          } else {
            d54[0] = 0x00;
            d54[1] = 0x00;
            d54[2] = 0xFE;
            d54[3] = 0xFF;
          }
          d54[4] = ctr_lo;
          d54[5] = ctr_hi;
          can->send_data(0x54, false, d54);

          // Static config frames
          std::vector<uint8_t> d55 = {0x10,0x27,0x00,0x00,0x00,0x00,0x00,0x00};
          can->send_data(0x55, false, d55);
          can->send_data(0x56, false, d55);
          std::vector<uint8_t> d57 = {0x00,0x00,0xFE,0xFF,0xFE,0xFF,0x00,0x00};
          can->send_data(0x57, false, d57);

  # --- 1s: Safety checks ---
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();

          // Two-stage heartbeat loss: 10s timeout + 5s grace before disconnect
          if (id(heater_connected)->state && (now - id(heater_last_seen)) > 10000) {
            if (!id(disconnect_pending)) {
              id(disconnect_pending) = true;
              id(disconnect_pending_ms) = now;
              ESP_LOGD("espar", "Heartbeat late - grace period started");
            } else if ((now - id(disconnect_pending_ms)) >= 5000) {
              id(disconnect_pending) = false;
              id(heater_ctr) = 0xFFFE;
              id(last_init_ms) = 0;
              id(heater_connected)->publish_state(false);
              id(heater_fault)->publish_state("Heartbeat lost");
              ESP_LOGW("espar", "Heater heartbeat lost");
            }
          }

          // Startup timeout: stuck in STARTUP > 90s
          if (id(heater_d1_state) == 0x02 && id(startup_enter_ms) != 0) {
            if ((now - id(startup_enter_ms)) > 90000) {
              id(startup_enter_ms) = 0;
              id(failed_start_count) = id(failed_start_count) + 1;
              ESP_LOGW("espar", "Startup timeout - failed start #%u",
                       id(failed_start_count));
              if (id(failed_start_count) >= 10) {
                id(locked_out) = true;
                id(cmd_heating) = false;
                id(cmd_fan) = false;
                id(heater_fault)->publish_state("LOCKOUT: power-cycle heater");
              } else {
                char buf[32];
                snprintf(buf, sizeof(buf), "Failed start #%u", id(failed_start_count));
                id(heater_fault)->publish_state(buf);
              }
            }
          }

          // Heat confirm timeout: HEAT sent but not HEATING after 30s
          if (id(waiting_heat_confirm) && id(cmd_heating)) {
            if ((now - id(heat_cmd_ms)) > 30000 && id(heater_d1_state) != 0x09) {
              id(waiting_heat_confirm) = false;
              ESP_LOGW("espar", "Heat confirm timeout");
              id(heater_fault)->publish_state("Heat confirm timeout");
            }
          }

  # --- 10s: Start status burst ---
  - interval: 10s
    then:
      - lambda: |-
          if (!id(burst_in_progress) && !id(espar_standby)->state) {
            id(burst_in_progress) = true;
            id(status_burst_idx) = 0;
            id(t_burst_frame_last) = millis();
          }

# =============================================================================
# SENSOR - Cabin temperature from Home Assistant
# =============================================================================
sensor:
  - platform: homeassistant
    id: cabin_temp
    entity_id: ${cabin_temp_entity}
    filters:
      - filter_out: nan
      - lambda: |-
          // Convert to Celsius if cabin_temp_unit is F; pass through if C
          if (std::string("${cabin_temp_unit}") == "F")
            return (x - 32.0f) * 5.0f / 9.0f;
          return x;
    on_value:
      then:
        - lambda: 'id(temp_available) = true;'

# =============================================================================
# CLIMATE - Thermostat (safety supervisor; heater does primary regulation)
# =============================================================================
#
# The heater's internal PID controller modulates fan/fuel to maintain the
# setpoint we send via CAN.  The ESPHome thermostat only intervenes as a
# safety cutoff if the cabin overshoots by heat_overrun degrees.
#
climate:
  - platform: thermostat
    name: "Climate"
    id: heater_climate
    sensor: cabin_temp
    visual:
      min_temperature: 10
      max_temperature: 30
      temperature_step: 0.5
    min_idle_time: 10s
    min_heating_off_time: 60s
    min_heating_run_time: 60s
    heat_deadband: 0.5
    heat_overrun: 3.0
    startup_delay: true
    heat_action:
      - lambda: |-
          if (id(locked_out)) return;
          id(cmd_heating) = true;
          id(cmd_fan) = false;
          id(waiting_heat_confirm) = true;
          id(heat_cmd_ms) = millis();
          float t = id(heater_climate)->target_temperature;
          ESP_LOGI("espar", "Thermostat: HEAT at %.1f C (%.0f F)",
                   t, t * 9.0f / 5.0f + 32.0f);
    idle_action:
      - lambda: |-
          id(cmd_heating) = false;
          id(cmd_fan) = false;
          id(waiting_heat_confirm) = false;
          ESP_LOGI("espar", "Thermostat: IDLE (safety cutoff or mode change)");
    fan_only_action:
      - lambda: |-
          id(cmd_heating) = false;
          id(cmd_fan) = true;
          id(waiting_heat_confirm) = false;
          ESP_LOGI("espar", "Thermostat: FAN ONLY");
    off_mode:
      - lambda: |-
          id(cmd_heating) = false;
          id(cmd_fan) = false;
          id(waiting_heat_confirm) = false;
          ESP_LOGI("espar", "Thermostat: OFF");
    heat_mode:
      - lambda: 'ESP_LOGI("espar", "Climate mode -> HEAT");'
    fan_only_mode:
      - lambda: 'ESP_LOGI("espar", "Climate mode -> FAN_ONLY");'
    min_fanning_off_time: 30s
    min_fanning_run_time: 30s
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 21

# =============================================================================
# STATUS SENSORS
# =============================================================================
text_sensor:
  - platform: template
    name: "State"
    id: heater_state
    icon: mdi:radiator

  - platform: template
    name: "Fault"
    id: heater_fault
    icon: mdi:alert-circle

binary_sensor:
  - platform: template
    name: "Flame Active"
    id: flame_active
    device_class: heat
    icon: mdi:fire

  - platform: template
    name: "Connected"
    id: heater_connected
    device_class: connectivity

# =============================================================================
# CONTROLS
# =============================================================================

# CAN standby: suspends all outbound CAN frames.
# Use before connecting EasyStart Pro or OEM diagnostic tools.
switch:
  - platform: template
    name: "CAN Standby"
    id: espar_standby
    icon: mdi:pause-circle-outline
    restore_mode: ALWAYS_OFF
    optimistic: true
    turn_on_action:
      - lambda: |-
          ESP_LOGI("espar", "TX standby ON - outbound frames suspended");
          id(heater_fault)->publish_state("TX standby: safe for OEM tool");
    turn_off_action:
      - lambda: |-
          ESP_LOGI("espar", "TX standby OFF - resuming, re-running handshake");
          id(heater_connected)->publish_state(false);
          id(disconnect_pending) = false;
          id(last_init_ms) = 0;
          id(heater_fault)->publish_state("OK");

