# Espar (Eberspacher) Airtronic AS3 D2L Diesel Heater - CAN Bus Controller
# Hardware: Seeed Studio XIAO ESP32-S3 + CAN Bus Breakout Board (MCP2515 + SN65HVD230)
# https://wiki.seeedstudio.com/xiao-can-bus-expansion/
#
# Wiring:
#   XIAO CAN Bus Breakout Board plugs directly onto the XIAO ESP32-S3.
#   Connect CAN-H and CAN-L terminals to the Espar heater's CAN bus lines.
#   If CAN communication fails, short the P1 pad on the back of the breakout
#   board to enable the 120 ohm termination resistor.
#
# EasyStart Pro Connector Wire Colors (AS3 D2L):
#   RD   (red)        - +12V Power
#   BN   (brown)      - Ground
#   BURD (blue/red)   - CAN-H
#   BUBK (blue/black) - CAN-L
#
# IMPORTANT - Before using commands:
#   1. Start with sniff_mode: "true" to discover CAN IDs on your heater
#   2. Monitor logs to identify the status broadcast and command IDs
#   3. Update the can_id substitutions below with your discovered values
#   4. Set sniff_mode: "false" to switch to normal operation
#
# The Espar AS3 D2L CAN bus protocol is proprietary. The CAN IDs and data byte
# assignments below are typical starting points based on community findings.
# Your specific heater firmware version may differ - always verify by sniffing first.
#
# Known CAN Message IDs (from community reverse engineering):
#   Source: https://www.fordtransitusaforum.com/threads/101989/
#
#   0x625       - EasyStart Pro heartbeat/keep-alive (frequent, consistent data)
#                 Example: 25 10 6F 3D 7C D3 E4 01
#   0x2C4       - Heater status / temperature data
#                 Bytes 5-6 appear to be temperature (e.g. 7E 04, 7B 04, 79 04)
#   0x2C5       - Heater status update (additional parameters)
#   0x2C6       - Heater operational state
#                 Example: F4 01 84 03 (consistent during operation)
#   0x7A0       - Diagnostic request (ISO-TP multi-frame protocol)
#   0x73C       - Diagnostic response (ISO-TP multi-frame protocol)

# https://romheat.romcomm.com/images/uploaded/Espar_CANBUS_Instructions.pdf

# From the Eberspächer troubleshooting manual (Krueger.co.uk), the external air inlet temperature sensor connects to:
# Grey/Red (GYRD) wire
# Brown/White (BNWH) wire
# This is an NTC thermistor sensor — the heater auto-detects it during startup. You can buy the Eberspächer 
# OEM sensor or use a matching NTC component (the same part that works on the D2/D4/D5 also works on the 
# S2/S3/M3 series per community testing). The sensor is not polarity dependent.

substitutions:
  device_name: esparheater
  friendly_name: Espar Heater
  project_name: Van Espar Heater Controller
  project_version: "1.0.3"
  log_level: DEBUG

  # --- CAN Bus Configuration ---
  # Set to "true" to log ALL CAN frames (discovery mode)
  # Set to "false" for normal operation with parsed sensors
  sniff_mode: "true"

  # CAN bus bit rate - Espar AS3 typically uses 25kbps
  # If no frames appear, try: 10kbps, 20kbps, 50kbps, 100kbps
  can_bit_rate: 50kbps

  # MCP2515 crystal frequency (8MHz on the Seeed breakout board)
  mcp_clock: 8MHZ

  # --- Espar CAN IDs (update after sniffing your heater) ---
  # Based on community findings - verify by sniffing your specific unit
  # TODO: Uncomment and update these after sniffing your heater's CAN bus
  # heater_status_id: "0x2C4"       # Heater -> Controller: status/temperature data
  # heater_temp_id: "0x2C5"         # Heater -> Controller: additional status
  # heater_error_id: "0x2C6"        # Heater -> Controller: operational state
  # heater_command_id: "0x625"      # Controller -> Heater: heartbeat/commands
  # heater_diag_req_id: "0x7A0"     # Diagnostic request (ISO-TP)
  # heater_diag_resp_id: "0x73C"    # Diagnostic response (ISO-TP)

# --- Packages (remote with variable overrides) ---
packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: devices/xiao-esp32s3.yaml
      - path: packages/ota/http_update.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}
  on_boot:
    priority: 600
    then:
      - lambda: |-
          ESP_LOGI("espar", "Espar Heater CAN Bus Controller booted");
          ESP_LOGI("espar", "Sniff mode: ${sniff_mode}");
          ESP_LOGI("espar", "CAN bit rate: ${can_bit_rate}");
          ESP_LOGI("espar", "MCP2515 clock: ${mcp_clock}");
          ESP_LOGI("espar", "SPI pins - CLK: GPIO7, MISO: GPIO8, MOSI: GPIO9");
          ESP_LOGI("espar", "MCP2515 CS pin: GPIO44");

interval:
  - interval: 10s
    then:
      - lambda: |-
          static uint32_t can_check_count = 0;
          can_check_count++;

          ESP_LOGI("espar_diag", "--- CAN Bus Health Check #%d ---", can_check_count);

          // Check if any frames have been received
          static uint32_t last_frame_count = 0;
          uint32_t current = id(can_frame_counter);
          if (current == last_frame_count) {
            ESP_LOGW("espar_diag", "No new CAN frames received since last check (total: %d)", current);
          } else {
            ESP_LOGI("espar_diag", "CAN frames received: %d (delta: +%d)", current, current - last_frame_count);
          }
          last_frame_count = current;

globals:
  - id: can_frame_counter
    type: uint32_t
    restore_value: no
    initial_value: '0'

# --- SPI Bus (XIAO ESP32-S3 default SPI pins) ---
spi:
  clk_pin: GPIO7    # D8
  miso_pin: GPIO8   # D9
  mosi_pin: GPIO9   # D10

# --- CAN Bus (MCP2515 on Seeed CAN Bus Breakout Board) ---
canbus:
  - platform: mcp2515
    id: espar_can
    cs_pin: GPIO44   # D7 - CS pin on the CAN Bus Breakout Board
    clock: ${mcp_clock}
    can_id: 0
    bit_rate: ${can_bit_rate}
    on_frame:
      # ---------------------------------------------------------------
      # SNIFF MODE: Log all CAN frames for protocol discovery
      # ---------------------------------------------------------------
      - can_id: 0
        can_id_mask: 0          # Match ALL CAN IDs
        then:
          - lambda: |-
              // Always log in sniff mode, skip in normal mode
              if (std::string("${sniff_mode}") != "true") return;

              // Increment frame counter for diagnostics
              id(can_frame_counter) += 1;

              // Format data bytes as hex string
              std::string data_hex = "";
              for (size_t i = 0; i < x.size(); i++) {
                char buf[4];
                snprintf(buf, sizeof(buf), "%02X ", x[i]);
                data_hex += buf;
              }
              ESP_LOGI("espar_sniff", "CAN ID: 0x%03X  Len: %d  Data: %s",
                can_id, x.size(), data_hex.c_str());

      # ---------------------------------------------------------------
