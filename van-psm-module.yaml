# Recreational Vehicle Programmable Special Module (PSM) Configuration for ESPHome
# using the waveshare esp32 s3 8di 8do board.
#
# Programmable Special Module Standard Programs
# https://www.mbvans.com/en/upfitter/resources/psm-programs
# https://www.mbvans.com/content/dam/mb-vans/us/upfitter/psm-programs/MY25_RV_Software_Specification_V4.pdf
#
# ==========================================================================
# Wiring: Mercedes Sprinter PSM Connectors → Waveshare ESP32-S3-8DI-8DO
# ==========================================================================
#
#   PSM Connector 2 (Inputs - Active High):
#     Pin 7  (Passenger Door Open) ──► DI1 (GPIO4)
#     Pin 1  (Driver Door Open)    ──► DI2 (GPIO5)
#
#   PSM Connector 3 (Inputs - Active Low):
#     Pin 3  (Sliding Door Open)   ──► DI3 (GPIO6)
#     Pin 13 (Rear Door Open)      ──► DI4 (GPIO7)
#
#   PSM Connector 3 (Inputs - Active High):
#     Pin 31 (Vehicle Locked)      ──► DI5 (GPIO8)
#     Pin 32 (Vehicle Unlocked)    ──► DI6 (GPIO9)
#     Pin 21 (Speed > 0 mph)       ──► DI7 (GPIO10)
#
#   PSM Connector 3 (Outputs - Relay):
#     Pin 30 (Lock Relay)          ◄── DO1 (PCA9554 pin 0)
#     Pin 23 (Hazard Lights)       ◄── DO2 (PCA9554 pin 1)
#
#   CAN Bus (PSM CAN B, 250kbps):
#     CAN H ──► ESP32 CAN TX (GPIO2)
#     CAN L ──► ESP32 CAN RX (GPIO3)
#
# Board Pinout:
#
#   Waveshare ESP32-S3-POE-ETH-8DI-8DO:
#     ┌─────────────────────────────────────────────────────┐
#     │         Waveshare ESP32-S3 8DI-8DO                  │
#     │                                                     │
#     │  Digital Inputs (active-low, pull-up, 10ms debounce)│
#     │  ┌──────────────────────────────────────────────┐   │
#     │  │ DI1 (GPIO4)  ── Passenger Door Open          │   │
#     │  │ DI2 (GPIO5)  ── Driver Door Open             │   │
#     │  │ DI3 (GPIO6)  ── Sliding Door Open            │   │
#     │  │ DI4 (GPIO7)  ── Rear Door Open               │   │
#     │  │ DI5 (GPIO8)  ── Vehicle Locked Signal        │   │
#     │  │ DI6 (GPIO9)  ── Vehicle Unlocked Signal      │   │
#     │  │ DI7 (GPIO10) ── Speed > 0 mph               │   │
#     │  │ DI8 (GPIO11) ── (unused)                     │   │
#     │  └──────────────────────────────────────────────┘   │
#     │                                                     │
#     │  Digital Outputs (PCA9554 I2C expander, relay)      │
#     │  ┌──────────────────────────────────────────────┐   │
#     │  │ DO1 (PCA0) ── Vehicle Lock Relay (500ms pulse)│  │
#     │  │ DO2 (PCA1) ── Hazard Warning Lights          │   │
#     │  │ DO3-DO8    ── (unused)                       │   │
#     │  └──────────────────────────────────────────────┘   │
#     │                                                     │
#     │  CAN Bus (ESP32 TWAI, 250kbps)                      │
#     │  ┌──────────────────────────────────────────────┐   │
#     │  │ TX (GPIO2) ── CAN H                          │   │
#     │  │ RX (GPIO3) ── CAN L                          │   │
#     │  └──────────────────────────────────────────────┘   │
#     │                                                     │
#     │  I2C (PCA9554 + PCF85063 RTC)                       │
#     │  │ SDA (GPIO42), SCL (GPIO41), 100kHz           │   │
#     │                                                     │
#     │  Accessories                                        │
#     │  │ Buzzer (GPIO46), RGB LED (GPIO38/WS2812)     │   │
#     │                                                     │
#     └─────────────────────────────────────────────────────┘
#
#   CAN Bus Decoded Signals (from vs30_canb_psm.dbc):
#     0x0A1 (161) ── Rear wheel speed (L/R) + direction
#     0x0A3 (163) ── Front wheel speed (L/R)
#     0x225 (549) ── Handbrake state (on/off)
#     0x307 (775) ── Central locking events (keyfob/interior)
#     0x31A (794) ── Driver window (open/closed)
#     0x320 (800) ── Passenger window (open/closed)
#     0x351 (849) ── Rear door state (open/closed)
#     0x375 (885) ── Odometer (km)
#     0x397 (919) ── Driver door state (open/closed)
#     0x39B (923) ── Passenger door state (open/closed)
#     0x3A5 (933) ── Sliding door state (open/closed)
#

substitutions:
  device_name: van-psm-module
  friendly_name: Mercedes Sprinter PSM
  project_name: mercedes-sprinter-psm
  project_version: "1.0.3"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: smartvan.${project_name}
    version: ${project_version}

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: devices/waveshare-esp32-s3-8di-8do.yaml

# https://www.mbvans.com/content/dam/mb-vans/us/upfitter/psm-programs/MY25_RV_Software_Specification_V4.pdf
# CAN B DBC reference (check for updates):
#   https://github.com/bistromath/vs30-dbc/blob/main/vs30_canb_psm.dbc
# PSM CAN B interface is 250kbps (firewalled subset of full CAN B)
# outputs:
# hazard warning lights
# vehicle lock

#inputs:
# gear in park

# ==========================================================
# CAN Bus Frame Logger & Decoded Sensors
# ==========================================================
# Set can_log_enabled to true to log all raw CAN frames.
# Disable once you've captured what you need to reduce log noise.

globals:
  - id: can_log_enabled
    type: bool
    initial_value: "true"

canbus:
  - id: !extend canbus0
    bit_rate: 250kbps  # PSM CAN B = 250kbps. Try 500kbps if on CAN C or Interior bus.
    on_frame:
      # ---- Raw frame logger (all CAN IDs) ----
      - can_id: 0
        can_id_mask: 0
        then:
          - lambda: |-
              if (!id(can_log_enabled)) return;
              char buf[64];
              int len = snprintf(buf, sizeof(buf), "CAN 0x%03X [%d]", can_id, x.size());
              for (int i = 0; i < x.size() && i < 8; i++) {
                len += snprintf(buf + len, sizeof(buf) - len, " %02X", x[i]);
              }
              ESP_LOGI("canbus", "%s", buf);

      # ---- Decoded: Rear Wheel Speed (CAN ID 0x0A1 / 161) ----
      - can_id: 0x0A1
        then:
          - lambda: |-
              if (x.size() < 7) {
                ESP_LOGW("CAN", "0x0A1 Rear Wheel: frame too short (%d bytes, need 7)", x.size());
                return;
              }
              // WheelSpeedRight: start_bit=16, length=14, little-endian, scale=0.068355
              uint16_t raw_right = (x[2] | (x[3] << 8)) & 0x3FFF;
              float speed_right = raw_right * 0.068355;
              id(can_rear_wheel_speed_right).publish_state(speed_right);

              // WheelSpeedLeft: start_bit=40, length=14, little-endian, scale=0.068355
              uint16_t raw_left = (x[5] | (x[6] << 8)) & 0x3FFF;
              float speed_left = raw_left * 0.068355;
              id(can_rear_wheel_speed_left).publish_state(speed_left);

              // WheelMovingRight: start_bit=54, length=2
              uint8_t dir_right = (x[6] >> 6) & 0x03;
              const char* dir_right_str = dir_right == 2 ? "Reverse" : dir_right == 1 ? "Forward" : "Stopped";
              id(can_rear_wheel_dir_right).publish_state(dir_right_str);

              // WheelMovingLeft: start_bit=30, length=2
              uint8_t dir_left = (x[3] >> 6) & 0x03;
              const char* dir_left_str = dir_left == 2 ? "Reverse" : dir_left == 1 ? "Forward" : "Stopped";
              id(can_rear_wheel_dir_left).publish_state(dir_left_str);

              ESP_LOGI("CAN", "0x0A1 Rear Wheels: R=%.1f km/h (%s) L=%.1f km/h (%s)",
                speed_right, dir_right_str, speed_left, dir_left_str);

      # ---- Decoded: Front Wheel Speed (CAN ID 0x0A3 / 163) ----
      - can_id: 0x0A3
        then:
          - lambda: |-
              if (x.size() < 7) {
                ESP_LOGW("CAN", "0x0A3 Front Wheel: frame too short (%d bytes, need 7)", x.size());
                return;
              }
              uint16_t raw_right = (x[2] | (x[3] << 8)) & 0x3FFF;
              float speed_right = raw_right * 0.068355;
              id(can_front_wheel_speed_right).publish_state(speed_right);

              uint16_t raw_left = (x[5] | (x[6] << 8)) & 0x3FFF;
              float speed_left = raw_left * 0.068355;
              id(can_front_wheel_speed_left).publish_state(speed_left);

              ESP_LOGI("CAN", "0x0A3 Front Wheels: R=%.1f km/h L=%.1f km/h", speed_right, speed_left);

      # ---- Decoded: Sliding Door State (CAN ID 0x3A5 / 933) ----
      - can_id: 0x3A5
        then:
          - lambda: |-
              if (x.size() < 2) {
                ESP_LOGW("CAN", "0x3A5 Sliding Door: frame too short (%d bytes, need 2)", x.size());
                return;
              }
              // SlidingDoorState: start_bit=12, length=1. VAL: 1=Closed, 0=Open
              bool closed = (x[1] >> 4) & 0x01;
              ESP_LOGI("CAN", "0x3A5 Sliding Door (CAN): %s", closed ? "CLOSED" : "OPEN");
              id(sliding_door_open).publish_state(!closed);

      # ---- Decoded: Driver Door State (CAN ID 0x397 / 919) ----
      - can_id: 0x397
        then:
          - lambda: |-
              if (x.size() < 2) return;
              // DriverDoorState: start_bit=12, length=2. VAL: 2=Open, 1=Closed
              uint8_t state = (x[1] >> 4) & 0x03;
              bool open = (state == 2);
              ESP_LOGI("CAN", "0x397 Driver Door (CAN): %s (raw=%d)", open ? "OPEN" : "CLOSED", state);
              id(driver_door_open).publish_state(open);

      # ---- Decoded: Passenger Door State (CAN ID 0x39B / 923) ----
      - can_id: 0x39B
        then:
          - lambda: |-
              if (x.size() < 2) return;
              // PassengerDoorState: start_bit=12, length=2. VAL: 2=Open, 1=Closed
              uint8_t state = (x[1] >> 4) & 0x03;
              bool open = (state == 2);
              ESP_LOGI("CAN", "0x39B Passenger Door (CAN): %s (raw=%d)", open ? "OPEN" : "CLOSED", state);
              id(passenger_door_open).publish_state(open);

      # ---- Decoded: Rear Door State (CAN ID 0x351 / 849) ----
      - can_id: 0x351
        then:
          - lambda: |-
              if (x.size() < 1) return;
              // RearDoorState: start_bit=0, length=2. VAL: 1=Closed, 2=Open
              uint8_t state = x[0] & 0x03;
              bool open = (state == 2);
              ESP_LOGI("CAN", "0x351 Rear Door (CAN): %s (raw=%d)", open ? "OPEN" : "CLOSED", state);
              id(rear_door_open).publish_state(open);

      # ---- Decoded: Driver Window (CAN ID 0x31A / 794) ----
      - can_id: 0x31A
        then:
          - lambda: |-
              if (x.size() < 2) return;
              // DriverWindowClosed: start_bit=13, length=1
              bool closed = (x[1] >> 5) & 0x01;
              ESP_LOGI("CAN", "0x31A Driver Window (CAN): %s", closed ? "CLOSED" : "OPEN");
              id(can_driver_window).publish_state(closed);

      # ---- Decoded: Passenger Window (CAN ID 0x320 / 800) ----
      - can_id: 0x320
        then:
          - lambda: |-
              if (x.size() < 2) return;
              // PassengerWindowClosed: start_bit=13, length=1
              bool closed = (x[1] >> 5) & 0x01;
              ESP_LOGI("CAN", "0x320 Passenger Window (CAN): %s", closed ? "CLOSED" : "OPEN");
              id(can_passenger_window).publish_state(closed);

      # ---- Decoded: Odometer (CAN ID 0x375 / 885) ----
      - can_id: 0x375
        then:
          - lambda: |-
              if (x.size() < 6) return;
              // Odometer: start_bit=16, length=32, little-endian, scale=0.01, unit=km
              uint32_t raw = x[2] | (x[3] << 8) | (x[4] << 16) | (x[5] << 24);
              float km = raw * 0.01;
              id(can_odometer).publish_state(km);

      # ---- Decoded: Handbrake State (CAN ID 0x225 / 549) ----
      - can_id: 0x225
        then:
          - lambda: |-
              if (x.size() < 3) return;
              // HandbrakeState: start_bit=16, length=3. VAL: 3=On, 4=Off
              uint8_t state = (x[2]) & 0x07;
              bool engaged = (state == 3);
              ESP_LOGI("CAN", "0x225 Handbrake (CAN): %s (raw=%d)", engaged ? "ON" : "OFF", state);
              id(can_handbrake_on).publish_state(engaged);

      # ---- Decoded: Central Locking (CAN ID 0x307 / 775) ----
      # 50Hz rate, 10 frames transmitted on state changes
      - can_id: 0x307
        then:
          - lambda: |-
              if (x.size() < 4) return;
              // CentralLockingFlagsB3: start_bit=24, length=8
              uint8_t flags = x[3];
              if (flags == 0) return;  // Idle, skip
              const char* action = "Unknown";
              switch (flags) {
                case 1: action = "Interior lock request"; break;
                case 10: action = "Interior unlock request"; break;
                case 21: action = "Keyfob lock (doors open)"; break;
                case 85: action = "Keyfob lock (doors closed)"; break;
                case 170: action = "Keyfob unlock"; break;
              }
              ESP_LOGI("CAN", "0x307 Central Locking: %s (0x%02X)", action, flags);
              id(can_central_locking_event).publish_state(action);

sensor:
  # Rear wheel speeds
  - platform: template
    id: can_rear_wheel_speed_right
    name: "Rear Wheel Speed (Right)"
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    icon: "mdi:tire"
    state_class: measurement

  - platform: template
    id: can_rear_wheel_speed_left
    name: "Rear Wheel Speed (Left)"
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    icon: "mdi:tire"
    state_class: measurement

  # Front wheel speeds
  - platform: template
    id: can_front_wheel_speed_right
    name: "Front Wheel Speed (Right)"
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    icon: "mdi:tire"
    state_class: measurement

  - platform: template
    id: can_front_wheel_speed_left
    name: "Front Wheel Speed (Left)"
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    icon: "mdi:tire"
    state_class: measurement

  # Average vehicle speed (all 4 wheels)
  - platform: template
    id: can_vehicle_speed
    name: "Vehicle Speed (CAN)"
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    icon: "mdi:speedometer"
    state_class: measurement
    lambda: |-
      float sum = 0; int count = 0;
      if (!isnan(id(can_rear_wheel_speed_right).state)) { sum += id(can_rear_wheel_speed_right).state; count++; }
      if (!isnan(id(can_rear_wheel_speed_left).state)) { sum += id(can_rear_wheel_speed_left).state; count++; }
      if (!isnan(id(can_front_wheel_speed_right).state)) { sum += id(can_front_wheel_speed_right).state; count++; }
      if (!isnan(id(can_front_wheel_speed_left).state)) { sum += id(can_front_wheel_speed_left).state; count++; }
      return count > 0 ? sum / count : NAN;
    update_interval: 1s

  # Odometer
  - platform: template
    id: can_odometer
    name: "Odometer (CAN)"
    unit_of_measurement: "km"
    accuracy_decimals: 1
    icon: "mdi:counter"
    state_class: total_increasing
    entity_category: diagnostic

text_sensor:
  - platform: template
    id: can_rear_wheel_dir_right
    name: "Rear Wheel Direction (Right)"
    icon: "mdi:arrow-up-down"

  - platform: template
    id: can_rear_wheel_dir_left
    name: "Rear Wheel Direction (Left)"
    icon: "mdi:arrow-up-down"

  - platform: template
    id: can_central_locking_event
    name: "Central Locking Event (CAN)"
    icon: "mdi:car-key"

binary_sensor:
  # --- Unified door sensors (updated by both CAN and digital inputs) ---
  - platform: template
    id: driver_door_open
    name: "Driver Door Open"
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          bool any = id(driver_door_open).state || id(passenger_door_open).state || id(sliding_door_open).state || id(rear_door_open).state;
          id(any_door_open).publish_state(any);

  - platform: template
    id: passenger_door_open
    name: "Passenger Door Open"
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          bool any = id(driver_door_open).state || id(passenger_door_open).state || id(sliding_door_open).state || id(rear_door_open).state;
          id(any_door_open).publish_state(any);

  - platform: template
    id: sliding_door_open
    name: "Sliding Door Open"
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          bool any = id(driver_door_open).state || id(passenger_door_open).state || id(sliding_door_open).state || id(rear_door_open).state;
          id(any_door_open).publish_state(any);

  - platform: template
    id: rear_door_open
    name: "Rear Door Open"
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          bool any = id(driver_door_open).state || id(passenger_door_open).state || id(sliding_door_open).state || id(rear_door_open).state;
          id(any_door_open).publish_state(any);

  - platform: template
    id: any_door_open
    name: "Any Door Open"
    icon: "mdi:car-door"
    device_class: door

  # --- CAN-only sensors (windows, handbrake) ---
  - platform: template
    id: can_driver_window
    name: "Driver Window"
    icon: "mdi:window-closed-variant"
    device_class: window

  - platform: template
    id: can_passenger_window
    name: "Passenger Window"
    icon: "mdi:window-closed-variant"
    device_class: window

  - platform: template
    id: can_handbrake_on
    name: "Handbrake Engaged"
    icon: "mdi:car-brake-parking"

  # Connector 2, Pin 7, High
  - id: !extend di1
    name: "Passenger Door (Input)"
    internal: true
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          ESP_LOGI("DOOR", "Passenger door (Input): %s", x ? "OPEN" : "CLOSED");
          id(passenger_door_open).publish_state(x);

  # Connector 2, Pin 1, High
  - id: !extend di2
    name: "Driver Door (Input)"
    internal: true
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          ESP_LOGI("DOOR", "Driver door (Input): %s", x ? "OPEN" : "CLOSED");
          id(driver_door_open).publish_state(x);

  # Connector 3, Pin 3, Low
  - id: !extend di3
    name: "Sliding Door (Input)"
    internal: true
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          ESP_LOGI("DOOR", "Sliding door (Input): %s", x ? "OPEN" : "CLOSED");
          id(sliding_door_open).publish_state(x);

  # Connector 3, Pin 13, Low
  - id: !extend di4
    name: "Rear Door (Input)"
    internal: true
    icon: "mdi:car-door"
    device_class: door
    on_state:
      - lambda: |-
          ESP_LOGI("DOOR", "Rear door (Input): %s", x ? "OPEN" : "CLOSED");
          id(rear_door_open).publish_state(x);

  # Connector 3, Pin 31, High
  - id: !extend di5
    name: "Vehicle Locked"
    icon: "mdi:car-lock"
    device_class: lock
    on_state:
      - lambda: |-
          ESP_LOGI("LOCK", "Lock signal (di5): %s", x ? "HIGH (locked)" : "LOW");
          if (x) {
            ESP_LOGI("LOCK", "Publishing vehicle_lock = LOCKED");
            id(vehicle_lock).publish_state(true);
          }

  # Connector 3, Pin 32, High
  - id: !extend di6
    name: "Vehicle Unlocked"
    icon: "mdi:car-lock"
    device_class: lock
    on_state:
      - lambda: |-
          ESP_LOGI("LOCK", "Unlock signal (di6): %s", x ? "HIGH (unlocked)" : "LOW");
          if (x) {
            ESP_LOGI("LOCK", "Publishing vehicle_lock = UNLOCKED");
            id(vehicle_lock).publish_state(false);
          }

  # Connector 3, Pin 21, High
  - id: !extend di7
    name: "Vehicle Speed > 0 mph"
    icon: "mdi:speedometer"

switch:
  - platform: template
    id: can_logger_switch
    name: "CAN Bus Logger"
    icon: "mdi:math-log"
    entity_category: diagnostic
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: 'id(can_log_enabled) = true;'
    turn_off_action:
      - lambda: 'id(can_log_enabled) = false;'

  # Connector 3, Pin 30
  - id: !extend do1
    name: "Vehicle Lock Relay"
    internal: true

  - platform: template
    id: vehicle_lock
    name: "Vehicle Lock"
    icon: "mdi:car-lock"
    optimistic: false
    lambda: 'return id(di5).state;'
    turn_on_action:
      - if:
          condition:
            binary_sensor.is_on: any_door_open
          then:
            - lambda: |-
                ESP_LOGW("LOCK", "Cannot lock - doors open: Passenger=%s Driver=%s Sliding=%s Rear=%s",
                  id(passenger_door_open).state ? "OPEN" : "CLOSED",
                  id(driver_door_open).state ? "OPEN" : "CLOSED",
                  id(sliding_door_open).state ? "OPEN" : "CLOSED",
                  id(rear_door_open).state ? "OPEN" : "CLOSED");
          else:
            - lambda: 'ESP_LOGI("LOCK", "Sending lock pulse via relay (do1) for 500ms");'
            - switch.turn_on: do1
            - delay: 500ms
            - switch.turn_off: do1
            - lambda: 'ESP_LOGI("LOCK", "Lock pulse complete - relay off");'
    turn_off_action:
      - lambda: 'ESP_LOGI("LOCK", "Lock switch is momentary - no unlock action available");'

  # Connector 3, Pin 23
  - id: !extend do2
    name: "Hazard Warning Lights"
    icon: "mdi:car-hazard"
    device_class: switch

  - id: !extend do3
    disabled_by_default: true
  - id: !extend do4
    disabled_by_default: true
  - id: !extend do5
    disabled_by_default: true
  - id: !extend do6
    disabled_by_default: true
  - id: !extend do7
    disabled_by_default: true
  - id: !extend do8
    disabled_by_default: true
