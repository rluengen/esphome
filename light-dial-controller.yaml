                      text_color: ${color_text_accent}

              - id: tile_dog_crate
                row: 0
                column: 7
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_dog_crate_icon
                      align: CENTER
                      x: 0
                      y: -35
                      text: "\U000F0335"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_dog_crate_name
                      align: CENTER
                      x: 0
                      y: 10
                      text: "Dog Crate"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_dog_crate_pct
                      align: CENTER
                      x: 0
                      y: 40
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

            on_value:
              then:
                - lambda: |-
                    // Map visible tile to selected index and entity
                    int idx = 0;
                    if (tile == id(tile_all_lights)) idx = 0;
                    else if (tile == id(tile_bed_interior)) idx = 1;
                    else if (tile == id(tile_main_can)) idx = 2;
                    else if (tile == id(tile_bed_can)) idx = 3;
                    else if (tile == id(tile_led_capsule)) idx = 4;
                    else if (tile == id(tile_exterior)) idx = 5;
                    else if (tile == id(tile_door)) idx = 6;
                    else if (tile == id(tile_dog_crate)) idx = 7;
                    id(selected_light_index) = idx;
                    
                    auto &opts = id(dial_selected_light).traits.get_options();
                    id(selected_entity) = std::string(opts[idx]);
                    id(dial_selected_light).publish_state(std::string(opts[idx]));
                    ESP_LOGI("tileview", "Selected idx=%d entity=%s", idx, opts[idx]);
                    
                    // Mark swipe so tap handler can ignore it
                    id(just_swiped) = true;
                - script.execute: clear_swipe_flag
                - script.execute: update_light_display

select:
  - platform: template
    name: "Dial Selected Light"
    id: dial_selected_light
    initial_option: light.all_lights
    restore_value: false
    options:
      - light.all_lights
      - light.quinled_van_lightcontroller_bed_interior_lights
      - light.quinled_van_lightcontroller_main_can_lights
      - light.quinled_van_lightcontroller_bed_can_lights
      - light.quinled_van_lightcontroller_cwww_led_capsule_lights
      - light.quinled_van_lightcontroller_exterior_lights
      - light.quinled_van_lightcontroller_door_light
      - light.quinled_van_lightcontroller_cwww_led_dog_crate_lights

    set_action:
      - logger.log:
          format: "Selected light option (remote): %s"
          args: ["x.c_str()"]
      - lambda: |-
          auto &opts = id(dial_selected_light).traits.get_options();
          for (int i = 0; i < (int)opts.size(); i++) {
            if (x == std::string(opts[i])) {
              id(selected_light_index) = i;
              id(selected_entity) = std::string(opts[i]);
              break;
            }
          }
      - lvgl.tileview.select:
          id: light_tiles
          row: 0
          column: !lambda 'return id(selected_light_index);'
          animated: true
      - lambda: 'id(just_swiped) = false;'
      - script.execute: update_light_display

    on_value:
      then:
        - logger.log:
            format: "Selected light option: %s"
            args: ["x.c_str()"]

globals:
  - id: current_brightness
    type: int
    initial_value: "0"

  - id: selected_light_index
    type: int
    initial_value: "0"
    restore_value: yes

  - id: selected_entity
    type: std::string
    initial_value: '"light.all_lights"'
    restore_value: yes

  - id: previous_brightness
    type: int
    initial_value: "100"

  - id: just_swiped
    type: bool
    initial_value: "false"

  - id: user_adjusting
    type: bool
    initial_value: "false"

script:
  # Auto-clear the swipe guard flag after a short delay.
  # This handles medium-duration swipes (500ms-2s) whose touch ON/OFF
  # timing doesn't match any on_multi_click pattern and would otherwise
  # leave the flag set, causing the next intentional tap to be consumed.
  - id: clear_swipe_flag
    mode: restart
    then:
      - delay: 1s
      - lambda: 'id(just_swiped) = false;'

  - id: restore_roller_position
    then:
      - lvgl.tileview.select:
          id: light_tiles
          row: 0
          column: !lambda 'return id(selected_light_index);'
          animated: false
      - lambda: 'id(just_swiped) = false;'
      - script.execute: update_light_display

  - id: update_light_display
    mode: restart
    then:
      - lambda: |-
          int idx = id(selected_light_index);
          // Only sync from HA when the user is NOT actively turning the dial
          if (!id(user_adjusting)) {
            auto pct_from_attr = [](float attr) -> int {
              if (isnan(attr)) return -1;  // -1 = entity not available
              int v = (int)roundf((attr / 255.0f) * 100.0f);
              if (v < 0) v = 0; if (v > 100) v = 100; return v;
            };
            int brightness = 0;
            switch (idx) {
              case 0: brightness = pct_from_attr(id(light_all_lights_brightness).state); break;
              case 1: brightness = pct_from_attr(id(light_bed_interior_lights_brightness).state); break;
              case 2: brightness = pct_from_attr(id(light_main_can_lights_brightness).state); break;
              case 3: brightness = pct_from_attr(id(light_bed_can_lights_brightness).state); break;
              case 4: brightness = pct_from_attr(id(light_cwww_led_capsule_lights_brightness).state); break;
              case 5: brightness = pct_from_attr(id(light_exterior_lights_brightness).state); break;
              case 6: brightness = pct_from_attr(id(light_door_light_brightness).state); break;
              case 7: brightness = pct_from_attr(id(light_cwww_led_dog_crate_lights_brightness).state); break;
              default: brightness = 0; break;
            }
            id(current_brightness) = brightness;
          }
          int brightness = id(current_brightness);
          if (brightness < 0) {
            ESP_LOGW("ui", "update_light_display idx=%d -> entity not available in HA", idx);
          } else {
            ESP_LOGI("ui", "update_light_display idx=%d -> %d%%", idx, brightness);
          }
          
          // Update icon color: amber when on, dim gray when off
          lv_obj_t* icons[] = {
            id(tile_all_lights_icon), id(tile_bed_interior_icon), id(tile_main_can_icon),
            id(tile_bed_can_icon), id(tile_led_capsule_icon), id(tile_exterior_icon),
            id(tile_door_icon), id(tile_dog_crate_icon)
          };
          lv_color_t icon_color = (brightness > 0) ? lv_color_hex(${color_icon_on}) : lv_color_hex(${color_icon_off});
          lv_obj_set_style_text_color(icons[idx], icon_color, 0);
          
          // Update arc indicator color
          lv_color_t arc_ind_color = (brightness > 0) ? lv_color_hex(${color_arc_active}) : lv_color_hex(${color_arc_bg});
          lv_obj_set_style_arc_color(id(brightness_arc), arc_ind_color, LV_PART_INDICATOR);
      - lvgl.arc.update:
          id: brightness_arc
          value: !lambda 'return std::max(0, id(current_brightness));'
      - lambda: |-
          // Update visible tab percent label text
          char buf[8];
          if (id(current_brightness) < 0) {
            snprintf(buf, sizeof(buf), "-%%");
          } else {
            snprintf(buf, sizeof(buf), "%d%%", id(current_brightness));
          }
          switch (id(selected_light_index)) {
            case 0: lv_label_set_text(id(tile_all_lights_pct), buf); break;
            case 1: lv_label_set_text(id(tile_bed_interior_pct), buf); break;
            case 2: lv_label_set_text(id(tile_main_can_pct), buf); break;
            case 3: lv_label_set_text(id(tile_bed_can_pct), buf); break;
            case 4: lv_label_set_text(id(tile_led_capsule_pct), buf); break;
            case 5: lv_label_set_text(id(tile_exterior_pct), buf); break;
            case 6: lv_label_set_text(id(tile_door_pct), buf); break;
            case 7: lv_label_set_text(id(tile_dog_crate_pct), buf); break;
            default: break;
          }
          
          // Update dot indicators
          int idx = id(selected_light_index);
          std::string dots = "";
          for (int i = 0; i < 8; i++) {
            if (i > 0) dots += " ";
            dots += (i == idx) ? "\u25CF" : "\u25CB";
          }
          lv_label_set_text(id(tile_dots), dots.c_str());

  - id: increase_light_brightness
    mode: restart
    then:
      - lambda: |-
          id(user_adjusting) = true;
          int step = 5;
          id(current_brightness) = std::min(100, id(current_brightness) + step);
          ESP_LOGI("dial", "Increase brightness -> %d%%", id(current_brightness));
      - script.execute: update_light_display
      - script.execute: publish_brightness_throttled

  - id: decrease_light_brightness
    mode: restart
    then:
      - lambda: |-
          id(user_adjusting) = true;
          int step = 5;
          id(current_brightness) = std::max(0, id(current_brightness) - step);
          ESP_LOGI("dial", "Decrease brightness -> %d%%", id(current_brightness));
      - script.execute: update_light_display
      - script.execute: publish_brightness_throttled

  - id: publish_brightness_throttled
    mode: restart
    then:
      - delay: 300ms
      - lambda: 'id(user_adjusting) = false;'
      - if:
          condition:
            lambda: 'return id(current_brightness) == 0;'
          then:
            - lambda: |-
                ESP_LOGI("ha", "Calling light.turn_off on %s", id(selected_entity).c_str());
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: !lambda 'return id(selected_entity);'
          else:
            - lambda: |-
                ESP_LOGI("ha", "Calling light.turn_on on %s brightness=%d%%", id(selected_entity).c_str(), id(current_brightness));
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_entity);'
                  brightness: !lambda |
                    // convert 0..100 -> 1..255 and clamp
                    int val = id(current_brightness);
                    int b = (int)(val * 255.0f / 100.0f + 0.5f);
                    if (b < 1) b = 1;   // avoid sending 0
                    if (b > 255) b = 255;
                    return b;

  - id: toggle_selected_light
    then:
      - lambda: |-
          ESP_LOGI("touch", "Toggle light: %s", id(selected_entity).c_str());
          if (id(current_brightness) > 0) {
            id(previous_brightness) = id(current_brightness);
            id(current_brightness) = 0;
          } else {
            id(current_brightness) = id(previous_brightness);
          }
      - script.execute: update_light_display
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: !lambda 'return id(selected_entity);'

  - id: turn_on_selected_light
    then:
      - lambda: |-
          ESP_LOGI("touch", "Turn ON light: %s", id(selected_entity).c_str());
          if (id(current_brightness) == 0) id(current_brightness) = id(previous_brightness);
      - script.execute: update_light_display
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: !lambda 'return id(selected_entity);'

  - id: turn_off_selected_light
    then:
      - lambda: |-
          ESP_LOGI("touch", "Turn OFF light: %s", id(selected_entity).c_str());
          id(current_brightness) = 0;
      - script.execute: update_light_display
      - homeassistant.service:
          service: light.turn_off
          data:
            entity_id: !lambda 'return id(selected_entity);'

binary_sensor:
  - id: !extend touch_input
    on_multi_click:
      # Single tap: toggle the selected light (ignored if wake touch or swipe)
      - timing:
          - ON for at most 500ms
          - OFF for at least 350ms
        then:
          - if:
              condition:
                lambda: 'return id(wake_touch) || id(just_swiped);'
              then:
                - lambda: |-
                    id(wake_touch) = false;
                    id(just_swiped) = false;
                - logger.log: "Touch consumed (wake or swipe) - no action"
              else:
                - script.execute: toggle_selected_light

      # Double tap: turn the light on (ignored if wake touch or swipe)
      - timing:
          - ON for at most 500ms
          - OFF for at most 300ms
          - ON for at most 500ms
          - OFF for at least 350ms
        then:
          - if:
              condition:
                lambda: 'return id(wake_touch) || id(just_swiped);'
              then:
                - lambda: |-
                    id(wake_touch) = false;
                    id(just_swiped) = false;
                - logger.log: "Touch consumed (wake or swipe) - no action"
              else:
                - script.execute: turn_on_selected_light

      # Long press (2 seconds): turn the light off
      - timing:
          - ON for at least 2s
        then:
          - if:
              condition:
                lambda: 'return id(wake_touch) || id(just_swiped);'
              then:
                - lambda: |-
                    id(wake_touch) = false;
                    id(just_swiped) = false;
                - logger.log: "Touch consumed (wake or swipe) - no action"
              else:
                - script.execute: turn_off_selected_light

# Software quadrature decoder — the stock ESPHome rotary_encoder platform
# (PCNT-based) only fires once then goes silent on this device.
# This is a known issue with the Waveshare ESP32-S3 Knob Touch LCD 1.8:
#   https://community.home-assistant.io/t/display-knob/905249/11
# KrX3D's custom polling component works around it the same way:
#   https://github.com/KrX3D/WaveShare-Knob-Esp32S3/tree/main/components/rotary_encoder_custom
# Polls GPIO7/GPIO8 every 5ms and fires on full-detent completion.
interval:
  - interval: 5ms
    then:
      - lambda: |-
          static uint8_t prev_state = 0xFF;   // uninitialized sentinel
          static int8_t accumulated = 0;

          uint8_t a = gpio_get_level(GPIO_NUM_8);   // pin_a
          uint8_t b = gpio_get_level(GPIO_NUM_7);   // pin_b
          uint8_t curr = (a << 1) | b;               // 2-bit gray code

          if (prev_state == 0xFF) { prev_state = curr; return; }  // first run
          if (curr == prev_state) return;                          // no change

          // Standard quadrature lookup: +1 = CW, -1 = CCW, 0 = invalid/skip
          static const int8_t lut[4][4] = {
            /*          to: 00  01  10  11 */
            /* from 00 */ {  0, -1,  1,  0 },
            /* from 01 */ {  1,  0,  0, -1 },
            /* from 10 */ { -1,  0,  0,  1 },
            /* from 11 */ {  0,  1, -1,  0 }
          };
          accumulated += lut[prev_state][curr];
          prev_state = curr;

          // Fire once the encoder returns to the detent position (both HIGH = state 3)
          if (curr == 3 && accumulated != 0) {
            if (accumulated > 0) {
              ESP_LOGI("encoder", "SW CLOCKWISE  (acc=%d)", accumulated);
              id(screen_bump_activity).execute();
              id(increase_light_brightness).execute();
            } else {
              ESP_LOGI("encoder", "SW ANTICLOCKWISE  (acc=%d)", accumulated);
              id(screen_bump_activity).execute();
              id(decrease_light_brightness).execute();
            }
            accumulated = 0;
          }

sensor:
  # Keep the PCNT-based sensor for HA visibility but strip its handlers —
  # actual rotation is handled by the software decoder above.
  - id: !extend rotary_encoder_id
    name: "Rotary Encoder"
    internal: true

  # Home Assistant brightness attribute sensors for each selectable light.
  # Each sensor only triggers a display update when it matches the currently selected light.
  - platform: homeassistant
    id: light_all_lights_brightness
    entity_id: light.all_lights
    attribute: brightness
    internal: true
    on_value:
      - if:
