                      text_color: ${color_icon_off}
                  - label:
                      id: tile_exterior_name
                      align: CENTER
                      x: 0
                      y: 10
                      text: "Exterior"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_exterior_pct
                      align: CENTER
