# Template for a dial controller using ESP32 with a rotary encoder and display.

# tapping the screen when off will wake the device
# tapping the screen will toggle the current device on/off.
# rotating the dial will adjust a value (e.g., brightness).
# pressing and holding the touch screen for 2 seconds will turn the device off.
# double-tap the screen will turn the light on?
# automatically turn off the display after a period of inactivity.

substitutions:
  device_name: light-dial-controller
  friendly_name: Light Dial Controller
  project_name: light-dial-controller
  project_version: "1.0.18"
  log_level: INFO

  # Theme colors
  color_bg: "0x000000"
  color_icon_on: "0xFFC107"
  color_icon_off: "0x666666"
  color_arc_bg: "0x444444"
  color_arc_active: "0xFFC107"
  color_text: "0xFFFFFF"
  color_text_accent: "0xFFDD44"
  color_dots: "0xAAAAAA"

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password
      - path: packages/time/homeassistant.yaml
      - path: devices/waveshare-ESP32-S3-Knob-Touch-LCD-1.8.yaml
        vars:
          rotary_encoder_id: rotary_encoder_id
      - path: packages/icons/network_icons.yaml
      - path: packages/icons/battery_icons.yaml
      - path: packages/icons/homeassistant_icons.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: my_touchscreen
          backlight_id: display_backlight_id
      - path: packages/ota/http_update.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: smartvan.${project_name}
    version: ${project_version}

font:
  - file: "fonts/segoeui.ttf"
    id: segoeui_16
    size: 24
    glyphs: "!%()+=,-_.:°●○0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz"

  - file: "fonts/segoeui.ttf"
    id: segoeui_32
    size: 32
    glyphs: "!%()+=,-_.:°●○0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz"

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_icons_large
    size: 48
    bpp: 4
    glyphs: [
      "\U000F0335", # mdi-lightbulb (group on)
      "\U000F12CD", # mdi-lightbulb-group-off (group unavailable)
      "\U000F06E8", # mdi-lightbulb-on (individual on)
      "\U000F0336", # mdi-lightbulb-outline (individual off)
      "\U000F0E4F", # mdi-lightbulb-off (individual unavailable)
    ]

lvgl:
  on_boot:
    then:
      - script.execute: restore_roller_position
      - lvgl.resume:

  disp_bg_color: ${color_bg}

  top_layer:
    widgets:
      - label:
          id: wifi_icon
          align: TOP_LEFT
          x: 35
          y: 18
          text: "\U000F05A9"  # mdi:wifi
          text_font: wifi_icons
          text_color: ${color_text}

      - label:
          id: ha_status_icon
          align: TOP_RIGHT
          x: -50
          y: 18
          text: "\U000F07D0"
          text_font: homeassistant_icons
          text_color: ${color_text}

      # Stationary brightness arc overlay (non-interactive, transparent background)
      - arc:
          id: brightness_arc
          align: CENTER
          x: 0
          y: 0
          width: 360
          height: 360
          clickable: false
          bg_opa: TRANSP
          arc_color: ${color_arc_bg}
          arc_width: 20
          min_value: 0
          max_value: 100
          value: 0
          adjustable: false
          indicator:
            arc_color: ${color_arc_active}
            arc_width: 22

      # Tile position dot indicators
      - label:
          id: tile_dots
          align: CENTER
          x: 0
          y: 90
          text: "● ○ ○ ○ ○ ○ ○ ○"
          text_font: segoeui_16
          text_color: ${color_dots}

  pages:
    - id: main_page
      bg_color: ${color_bg}
      widgets:
        # Swipeable TileView (no headers; swipe horizontally between tiles)
        - tileview:
            id: light_tiles
            bg_opa: TRANSP
            tiles:
              - id: tile_all_lights
                row: 0
                column: 0
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_all_lights_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0335"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_all_lights_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "All Lights"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_all_lights_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_bed_interior
                row: 0
                column: 1
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_bed_interior_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_bed_interior_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Interior"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_bed_interior_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_main_can
                row: 0
                column: 2
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_main_can_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_main_can_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Main Can"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_main_can_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_bed_can
                row: 0
                column: 3
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_bed_can_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_bed_can_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Bed Can"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_bed_can_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_led_capsule
                row: 0
                column: 4
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_led_capsule_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_led_capsule_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Bed Capsule"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_led_capsule_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_exterior
                row: 0
                column: 5
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_exterior_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_exterior_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Exterior"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_exterior_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_door
                row: 0
                column: 6
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_door_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_door_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Door"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_door_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_dog_crate
                row: 0
                column: 7
                dir: HOR
                bg_opa: TRANSP
                widgets:
                  - label:
                      id: tile_dog_crate_icon
                      align: CENTER
                      x: 0
                      y: -10
                      text: "\U000F0336"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_dog_crate_name
                      align: CENTER
                      x: 0
                      y: 30
                      text: "Dog Crate"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_dog_crate_pct
                      align: CENTER
                      x: 0
                      y: 55
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

            on_value:
              then:
                - lambda: |-
                    // Map visible tile to selected index and entity
                    int idx = 0;
                    if (tile == id(tile_all_lights)) idx = 0;
                    else if (tile == id(tile_bed_interior)) idx = 1;
                    else if (tile == id(tile_main_can)) idx = 2;
                    else if (tile == id(tile_bed_can)) idx = 3;
                    else if (tile == id(tile_led_capsule)) idx = 4;
                    else if (tile == id(tile_exterior)) idx = 5;
                    else if (tile == id(tile_door)) idx = 6;
                    else if (tile == id(tile_dog_crate)) idx = 7;
                    id(selected_light_index) = idx;
                    
                    auto &opts = id(dial_selected_light).traits.get_options();
                    id(selected_entity) = std::string(opts[idx]);
                    id(dial_selected_light).publish_state(std::string(opts[idx]));
                    ESP_LOGI("tileview", "Selected idx=%d entity=%s", idx, opts[idx]);
                    
                    // Mark swipe so tap handler can ignore it
                    id(just_swiped) = true;
                - script.execute: clear_swipe_flag
                - script.execute: update_light_display

select:
  - platform: template
    name: "Dial Selected Light"
    id: dial_selected_light
    initial_option: light.all_lights
    restore_value: false
    options:
      - light.all_lights
      - light.interior_lights
      - light.quinled_van_lightcontroller_main_can_lights
      - light.quinled_van_lightcontroller_bed_can_lights
      - light.quinled_van_lightcontroller_bed_capsule_lights
      - light.quinled_van_lightcontroller_exterior_lights
      - light.quinled_van_lightcontroller_door_light
      - light.quinled_van_lightcontroller_cwww_led_dog_crate_lights

    set_action:
      - logger.log:
          format: "Selected light option (remote): %s"
          args: ["x.c_str()"]
      - lambda: |-
          auto &opts = id(dial_selected_light).traits.get_options();
          for (int i = 0; i < (int)opts.size(); i++) {
            if (x == std::string(opts[i])) {
              id(selected_light_index) = i;
              id(selected_entity) = std::string(opts[i]);
              break;
            }
          }
      - lvgl.tileview.select:
          id: light_tiles
          row: 0
          column: !lambda 'return id(selected_light_index);'
          animated: true
      - lambda: 'id(just_swiped) = false;'
      - script.execute: update_light_display

    on_value:
      then:
        - logger.log:
            format: "Selected light option: %s"
            args: ["x.c_str()"]

globals:
  - id: current_brightness
    type: int
    initial_value: "0"

  - id: selected_light_index
    type: int
    initial_value: "0"
    restore_value: yes

  - id: selected_entity
    type: std::string
    initial_value: '"light.all_lights"'
    restore_value: yes

  - id: previous_brightness
    type: int
    initial_value: "100"

  - id: just_swiped
    type: bool
    initial_value: "false"

  - id: user_adjusting
    type: bool
    initial_value: "false"

script:
  # Auto-clear the swipe guard flag after a short delay.
  # This handles medium-duration swipes (500ms-2s) whose touch ON/OFF
  # timing doesn't match any on_multi_click pattern and would otherwise
  # leave the flag set, causing the next intentional tap to be consumed.
  - id: clear_swipe_flag
    mode: restart
    then:
      - delay: 1s
      - lambda: 'id(just_swiped) = false;'

  - id: restore_roller_position
    then:
      - lvgl.tileview.select:
          id: light_tiles
          row: 0
          column: !lambda 'return id(selected_light_index);'
          animated: false
      - lambda: 'id(just_swiped) = false;'
      - script.execute: update_light_display

  - id: update_light_display
    mode: restart
    then:
      - lambda: |-
          int idx = id(selected_light_index);
          // Only sync from HA when the user is NOT actively turning the dial
          if (!id(user_adjusting)) {
            auto pct_from_attr = [](float attr) -> int {
              // When a light is OFF, HA reports brightness as NaN — treat as 0%
              if (isnan(attr)) return 0;
              int v = (int)roundf((attr / 255.0f) * 100.0f);
              if (v < 0) v = 0; if (v > 100) v = 100; return v;
            };
            int brightness = 0;
            switch (idx) {
              case 0: {
                // Staged: infer master level from the 3 staged lights
                int cap = pct_from_attr(id(light_bed_capsule_lights_brightness).state);
                int bed = pct_from_attr(id(light_bed_can_lights_brightness).state);
                int mc  = pct_from_attr(id(light_main_can_lights_brightness).state);
                brightness = 0;
                if (cap > brightness) brightness = cap;
                if (bed > brightness) brightness = bed;
                if (mc  > brightness) brightness = mc;
                break;
              }
              case 1: brightness = pct_from_attr(id(light_interior_lights_brightness).state); break;
              case 2: brightness = pct_from_attr(id(light_main_can_lights_brightness).state); break;
              case 3: brightness = pct_from_attr(id(light_bed_can_lights_brightness).state); break;
              case 4: brightness = pct_from_attr(id(light_bed_capsule_lights_brightness).state); break;
              case 5: brightness = pct_from_attr(id(light_exterior_lights_brightness).state); break;
              case 6: brightness = pct_from_attr(id(light_door_light_brightness).state); break;
              case 7: brightness = pct_from_attr(id(light_cwww_led_dog_crate_lights_brightness).state); break;
              default: brightness = 0; break;
            }
            id(current_brightness) = brightness;
          }
          int brightness = id(current_brightness);
          if (brightness < 0) {
            ESP_LOGW("ui", "update_light_display idx=%d -> entity not available in HA", idx);
          } else {
            ESP_LOGI("ui", "update_light_display idx=%d -> %d%%", idx, brightness);
          }
          
          // Update icon per type: group (idx 0) vs individual (idx 1-7)
          lv_obj_t* icons[] = {
            id(tile_all_lights_icon), id(tile_bed_interior_icon), id(tile_main_can_icon),
            id(tile_bed_can_icon), id(tile_led_capsule_icon), id(tile_exterior_icon),
            id(tile_door_icon), id(tile_dog_crate_icon)
          };
          lv_color_t icon_color;
          bool is_group = (idx == 0);
          if (brightness < 0) {
            // Unavailable: gray + slashed icon
            icon_color = lv_color_hex(${color_icon_off});
            lv_label_set_text(icons[idx], is_group ? "\U000F12CD" : "\U000F0E4F");
          } else if (brightness > 0) {
            // On: amber + lit icon
            icon_color = lv_color_hex(${color_icon_on});
            lv_label_set_text(icons[idx], is_group ? "\U000F0335" : "\U000F06E8");
          } else {
            // Off: gray + outline icon
            icon_color = lv_color_hex(${color_icon_off});
            lv_label_set_text(icons[idx], is_group ? "\U000F0335" : "\U000F0336");
          }
          lv_obj_set_style_text_color(icons[idx], icon_color, 0);
          
          // Update arc indicator color (gray when unavailable or off)
          lv_color_t arc_ind_color = (brightness > 0) ? lv_color_hex(${color_arc_active}) : lv_color_hex(${color_arc_bg});
          lv_obj_set_style_arc_color(id(brightness_arc), arc_ind_color, LV_PART_INDICATOR);
      - lvgl.arc.update:
          id: brightness_arc
          value: !lambda 'return std::max(0, id(current_brightness));'
      - lambda: |-
          // Update visible tab percent label text
          char buf[8];
          if (id(current_brightness) < 0) {
            snprintf(buf, sizeof(buf), "N/A");
          } else {
            snprintf(buf, sizeof(buf), "%d%%", id(current_brightness));
          }
          switch (id(selected_light_index)) {
            case 0: lv_label_set_text(id(tile_all_lights_pct), buf); break;
            case 1: lv_label_set_text(id(tile_bed_interior_pct), buf); break;
            case 2: lv_label_set_text(id(tile_main_can_pct), buf); break;
            case 3: lv_label_set_text(id(tile_bed_can_pct), buf); break;
            case 4: lv_label_set_text(id(tile_led_capsule_pct), buf); break;
            case 5: lv_label_set_text(id(tile_exterior_pct), buf); break;
            case 6: lv_label_set_text(id(tile_door_pct), buf); break;
            case 7: lv_label_set_text(id(tile_dog_crate_pct), buf); break;
            default: break;
          }
          
          // Update dot indicators
          int idx = id(selected_light_index);
          std::string dots = "";
          for (int i = 0; i < 8; i++) {
            if (i > 0) dots += " ";
            dots += (i == idx) ? "\u25CF" : "\u25CB";
          }
          lv_label_set_text(id(tile_dots), dots.c_str());

  - id: increase_light_brightness
    mode: restart
    then:
      - lambda: |-
          id(user_adjusting) = true;
          int step = 5;
          id(current_brightness) = std::min(100, id(current_brightness) + step);
          ESP_LOGI("dial", "Increase brightness -> %d%%", id(current_brightness));
      - script.execute: update_light_display
      - script.execute: publish_brightness_throttled

  - id: decrease_light_brightness
    mode: restart
    then:
      - lambda: |-
          id(user_adjusting) = true;
          int step = 5;
          id(current_brightness) = std::max(0, id(current_brightness) - step);
          ESP_LOGI("dial", "Decrease brightness -> %d%%", id(current_brightness));
      - script.execute: update_light_display
      - script.execute: publish_brightness_throttled

  - id: publish_brightness_throttled
    mode: restart
    then:
      - delay: 100ms
      - script.execute: publish_brightness_now

  - id: publish_brightness_now
    mode: single
    then:
      - lambda: 'id(user_adjusting) = false;'
      - if:
          condition:
            lambda: 'return id(selected_light_index) == 0;'
          then:
            - script.execute: publish_staged_brightness
          else:
            - if:
                condition:
                  lambda: 'return id(current_brightness) == 0;'
                then:
                  - lambda: |-
                      ESP_LOGI("ha", "Calling light.turn_off on %s", id(selected_entity).c_str());
                  - homeassistant.service:
                      service: light.turn_off
                      data:
                        entity_id: !lambda 'return id(selected_entity);'
                else:
                  - lambda: |-
                      ESP_LOGI("ha", "Calling light.turn_on on %s brightness=%d%%", id(selected_entity).c_str(), id(current_brightness));
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: !lambda 'return id(selected_entity);'
                        brightness: !lambda |
                          int val = id(current_brightness);
                          int b = (int)(val * 255.0f / 100.0f + 0.5f);
                          if (b < 1) b = 1;
                          if (b > 255) b = 255;
                          return b;

  # Staged "All Lights" — sequential by priority, reverse staged off.
  # Thresholds: Bed Capsule >= 1%, Bed Can >= 30%, Main Can >= 60%
  - id: publish_staged_brightness
    then:
      - lambda: |-
          int b = id(current_brightness);
          ESP_LOGI("ha", "Staged publish: master=%d%% capsule=%s bed_can=%s main_can=%s",
            b, b > 0 ? "ON" : "OFF", b >= 30 ? "ON" : "OFF", b >= 60 ? "ON" : "OFF");
      # Bed Capsule: on at >= 1%
      - if:
          condition:
            lambda: 'return id(current_brightness) > 0;'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.quinled_van_lightcontroller_bed_capsule_lights
                  brightness: !lambda |
                    int b = (int)(id(current_brightness) * 255.0f / 100.0f + 0.5f);
                    return std::clamp(b, 1, 255);
          else:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.quinled_van_lightcontroller_bed_capsule_lights
      # Bed Can: on at >= 30%
      - if:
          condition:
            lambda: 'return id(current_brightness) >= 30;'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.quinled_van_lightcontroller_bed_can_lights
                  brightness: !lambda |
                    int b = (int)(id(current_brightness) * 255.0f / 100.0f + 0.5f);
                    return std::clamp(b, 1, 255);
          else:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.quinled_van_lightcontroller_bed_can_lights
      # Main Can: on at >= 60%
      - if:
          condition:
            lambda: 'return id(current_brightness) >= 60;'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.quinled_van_lightcontroller_main_can_lights
                  brightness: !lambda |
                    int b = (int)(id(current_brightness) * 255.0f / 100.0f + 0.5f);
                    return std::clamp(b, 1, 255);
          else:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.quinled_van_lightcontroller_main_can_lights

  - id: toggle_selected_light
    then:
      - if:
          condition:
            lambda: 'return id(current_brightness) < 0;'
          then:
            - lambda: 'ESP_LOGW("touch", "Entity unavailable — ignoring toggle");'
          else:
            - lambda: |-
                ESP_LOGI("touch", "Toggle light: %s", id(selected_entity).c_str());
                if (id(current_brightness) > 0) {
                  id(previous_brightness) = id(current_brightness);
                  id(current_brightness) = 0;
                } else {
                  id(current_brightness) = id(previous_brightness);
                }
            - script.execute: update_light_display
            - script.execute: publish_brightness_now

  - id: turn_on_selected_light
    then:
      - if:
          condition:
            lambda: 'return id(current_brightness) < 0;'
          then:
            - lambda: 'ESP_LOGW("touch", "Entity unavailable — ignoring turn on");'
          else:
            - lambda: |-
                ESP_LOGI("touch", "Turn ON light: %s", id(selected_entity).c_str());
                if (id(current_brightness) == 0) id(current_brightness) = id(previous_brightness);
            - script.execute: update_light_display
            - script.execute: publish_brightness_now

  - id: turn_off_selected_light
    then:
      - if:
          condition:
            lambda: 'return id(current_brightness) < 0;'
          then:
            - lambda: 'ESP_LOGW("touch", "Entity unavailable — ignoring turn off");'
          else:
            - lambda: |-
                ESP_LOGI("touch", "Turn OFF light: %s", id(selected_entity).c_str());
                id(current_brightness) = 0;
            - script.execute: update_light_display
            - script.execute: publish_brightness_now

binary_sensor:
  - id: !extend touch_input
    on_multi_click:
      # Single tap: toggle the selected light (ignored if wake touch or swipe)
      - timing:
          - ON for at most 500ms
          - OFF for at least 350ms
        then:
          - if:
              condition:
                lambda: 'return id(wake_touch) || id(just_swiped);'
              then:
                - lambda: |-
                    id(wake_touch) = false;
                    id(just_swiped) = false;
                - logger.log: "Touch consumed (wake or swipe) - no action"
              else:
                - script.execute: toggle_selected_light

      # Double tap: turn the light on (ignored if wake touch or swipe)
      - timing:
          - ON for at most 500ms
          - OFF for at most 300ms
          - ON for at most 500ms
          - OFF for at least 350ms
        then:
          - if:
              condition:
                lambda: 'return id(wake_touch) || id(just_swiped);'
              then:
                - lambda: |-
                    id(wake_touch) = false;
                    id(just_swiped) = false;
                - logger.log: "Touch consumed (wake or swipe) - no action"
              else:
                - script.execute: turn_on_selected_light

      # Long press (2 seconds): turn the light off
      - timing:
          - ON for at least 2s
        then:
          - if:
              condition:
                lambda: 'return id(wake_touch) || id(just_swiped);'
              then:
                - lambda: |-
                    id(wake_touch) = false;
                    id(just_swiped) = false;
                - logger.log: "Touch consumed (wake or swipe) - no action"
              else:
                - script.execute: turn_off_selected_light

# The sleep.yaml package's !extend on the touchscreen replaces the device's
# original on_touch/on_release handlers that publish to touch_input.
# Re-add them here so on_multi_click tap detection works.
touchscreen:
  - id: !extend my_touchscreen
    on_touch:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: OFF

# The software quadrature decoder that was here has been replaced by the
# on_value handler on the rotary_encoder_custom sensor above, which uses
# the hardware PCNT counter and reliably captures every step.

sensor:
  # The rotary_encoder_custom component (PCNT-based) reliably reports every
  # step.  We track the previous count and derive a delta to adjust brightness.
  - id: !extend rotary_encoder_id
    name: "Rotary Encoder"
    internal: true
    on_value:
      then:
        - lambda: |-
            static bool initialized = false;
            static int last_val = 0;
            int new_val = (int)x;
            if (!initialized) {
              last_val = new_val;
              initialized = true;
              return;
            }
            int delta = new_val - last_val;
            last_val = new_val;
            if (delta == 0) return;

            // Block dial adjustment if entity is unavailable
            if (id(current_brightness) < 0) {
              ESP_LOGW("dial", "Entity unavailable — ignoring rotation");
              return;
            }

            id(user_adjusting) = true;
            int step = 5;  // 5 % per encoder detent
            int change = step * abs(delta);
            if (delta > 0) {
              id(current_brightness) = std::min(100, id(current_brightness) + change);
              ESP_LOGI("dial", "Increase brightness -> %d%% (delta=%d)", id(current_brightness), delta);
            } else {
              id(current_brightness) = std::max(0, id(current_brightness) - change);
              ESP_LOGI("dial", "Decrease brightness -> %d%% (delta=%d)", id(current_brightness), delta);
            }
            id(screen_bump_activity).execute();
            id(update_light_display).execute();
            id(publish_brightness_throttled).execute();

  # Home Assistant brightness attribute sensors for each selectable light.
  # Each sensor only triggers a display update when it matches the currently
  # selected light.  Staged lights (capsule, bed can, main can) also refresh
  # the "All Lights" tile (index 0).

  - platform: homeassistant
    id: light_interior_lights_brightness
