                      y: -35
                      text: "\U000F0335"
                      text_font: mdi_icons_large
                      text_color: ${color_icon_off}
                  - label:
                      id: tile_all_lights_name
                      align: CENTER
                      x: 0
                      y: 10
                      text: "All Lights"
                      text_font: segoeui_16
                      text_color: ${color_text}
                  - label:
                      id: tile_all_lights_pct
                      align: CENTER
                      x: 0
                      y: 40
                      text: "%"
                      text_font: segoeui_16
                      text_color: ${color_text_accent}

              - id: tile_bed_interior
