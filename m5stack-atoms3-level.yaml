# M5Stack AtomS3 leveling + BLE presence node.
#
# Reuses the shared board/IMU definition and the vehicle-leveling package, and
# acts as a Bluetooth proxy so Home Assistant can do BLE room/device presence
# detection through this node.
esphome:
  name: atoms3-level
  friendly_name: M5Stack AtomS3 Leveling Node
  min_version: 2026.6.0

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: devices/M5Stack-AtomS3.yaml
      # Vehicle leveling (pitch/roll, per-wheel lift, calibration, geometry).
      - path: packages/level.yaml
        vars:
          accel_x_id: accel_x
          accel_y_id: accel_y
          accel_z_id: accel_z
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password

# Bluetooth presence detection: forward all BLE advertisements to Home Assistant.
# HA's Bluetooth integration (and ble_device_tracker/private BLE device helpers)
# can then derive room/device presence from this node.
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true
