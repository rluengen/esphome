esphome:
  name: tab5-ha-hmi
  friendly_name: M5Stack Tab5 Home Assistant HMI
  min_version: 2026.6.0
  on_boot:
    # Log the reset reason early so crashes/brownouts are visible in the boot log
    - priority: 600
      then:
        - lambda: |-
            int reason = esp_reset_reason();
            const char* reason_str;
            switch(reason) {
              case 1: reason_str = "POWERON (normal boot)"; break;
              case 2: reason_str = "EXTERNAL RESET"; break;
              case 3: reason_str = "SOFTWARE RESET"; break;
              case 4: reason_str = "PANIC/EXCEPTION - CRASH!"; break;
              case 5: reason_str = "INTERRUPT WATCHDOG - CRASH!"; break;
              case 6: reason_str = "TASK WATCHDOG - CRASH!"; break;
              case 7: reason_str = "WATCHDOG - CRASH!"; break;
              case 8: reason_str = "DEEPSLEEP RESET"; break;
              case 9: reason_str = "BROWNOUT - POWER ISSUE!"; break;
              case 10: reason_str = "SDIO RESET"; break;
              default: reason_str = "UNKNOWN"; break;
            }
            ESP_LOGW("boot", "ESP32 boot reason: %s (code %d)", reason_str, reason);
    - priority: -100
      then:
        # Make sure the display backlight is on at boot
        - light.turn_on:
            id: backlight
            brightness: 100%
        - lvgl.resume:

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      # M5Stack Tab5 board definition - esp32 / esp32_hosted / logger / psram /
      # i2c / pi4ioe / display / touch / audio / power + IMU sensors / time / ...
      - path: devices/M5Stack-Tab5.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: touch
          backlight_id: backlight

api:
  encryption:
    key: !secret encryption_key
  on_client_connected: 
    then:
      - lvgl.widget.show: api_icon_label
  on_client_disconnected: 
    then:
      - lvgl.widget.hide: api_icon_label

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  on_connect: 
    then:
      - script.execute: update_wifi_icon
  on_disconnect: 
    then:
      - script.execute: update_wifi_icon

binary_sensor:
  # `charging` is defined in the M5Stack-Tab5 package; extend it to count
  # charge-status flaps (to infer a missing battery) and refresh the LVGL icon.
  - id: !extend charging
    on_state:
      - lambda: 'id(charge_toggles) += 1;'
      - logger.log:
          format: "Charging: %s"
          args: ['x ? "yes" : "no"']
      - script.execute: update_battery

  # Level when both pitch and roll are within the configurable tolerance.
  - platform: template
    name: "Vehicle Level"
    id: vehicle_level
    filters:
      - delayed_on_off: 1s
    lambda: |-
      float pitch_degrees = id(pitch).state;
      float roll_degrees = id(roll).state;
      if (isnan(pitch_degrees) || isnan(roll_degrees)) return false;
      float tolerance = id(level_tolerance_degrees).state;
      return fabsf(pitch_degrees) < tolerance && fabsf(roll_degrees) < tolerance;

sensor:
  # `gyro_z` (from the M5Stack-Tab5 package) publishes last in each IMU update
  # cycle, so all six axes are fresh here - use it to wake the screen on movement.
  - id: !extend gyro_z
    on_value:
      # All six axes are fresh this cycle, so recompute the tilt angles now
      # instead of letting the template sensors poll on their default interval.
      - component.update: pitch
      - component.update: roll
      # Per-wheel leveling heights depend on pitch/roll, so refresh them too.
      - component.update: lift_front_left
      - component.update: lift_front_right
      - component.update: lift_rear_left
      - component.update: lift_rear_right
      - if:
          condition:
            # Pickup/move = rotation or off-gravity accel above the resting noise floor
            lambda: |-
              float gx = id(gyro_x).state, gy = id(gyro_y).state, gz = id(gyro_z).state;
              float ax = id(accel_x).state, ay = id(accel_y).state, az = id(accel_z).state;
              if (isnan(gx) || isnan(ax)) return false;
              float gmag = sqrtf(gx*gx + gy*gy + gz*gz);   // deg/s (~0 at rest)
              float amag = sqrtf(ax*ax + ay*ay + az*az);   // g (~1.0 at rest)
              return gmag > 30.0f || fabsf(amag - 1.0f) > 0.15f;
          then:
            - logger.log: "Device moved - waking screen"
            - script.execute: screen_bump_activity

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 15s
    on_value:
      - script.execute: update_wifi_icon

  # Tilt angles derived from the accelerometer. update_interval: never -> these
  # only recompute when driven by gyro_z's on_value (once per fresh IMU cycle).
  - platform: template
    id: pitch
    name: "Pitch"
    unit_of_measurement: "°"
    accuracy_decimals: 2
    update_interval: never
    icon: mdi:axis-arrow
    lambda: |-
      float accel_x = id(accel_x).state;
      float accel_y = id(accel_y).state;
      float accel_z = id(accel_z).state;
      if (isnan(accel_x) || isnan(accel_y) || isnan(accel_z)) return NAN;
      float pitch_raw = atan2(accel_y, sqrt(pow(accel_x, 2) + pow(accel_z, 2))) * 57.2958;
      return pitch_raw - id(pitch_offset);

  - platform: template
    id: roll
    name: "Roll"
    unit_of_measurement: "°"
    accuracy_decimals: 2
    update_interval: never
    icon: mdi:axis-arrow
    lambda: |-
      float accel_x = id(accel_x).state;
      float accel_z = id(accel_z).state;
      if (isnan(accel_x) || isnan(accel_z)) return NAN;
      float roll_raw = atan2(-accel_x, accel_z) * 57.2958;
      return roll_raw - id(roll_offset);

  # Per-wheel height needed to level the vehicle, derived from pitch/roll and the
  # wheelbase/track geometry. pitch_lift uses the wheelbase (front<->rear), roll_lift
  # uses the track width (left<->right). The per-corner signs assume nose-up pitch
  # raises the front and the IMU's roll sign matches the `roll` sensor above; if a
  # corner reports lift on the wrong side, negate that corner's roll_lift (or pitch_lift).
  - platform: template
    name: "Lift Front Left"
    id: lift_front_left
    unit_of_measurement: "in"
    accuracy_decimals: 1
    icon: mdi:ruler
    update_interval: never
    lambda: |-
      float pitch_degrees = id(pitch).state;
      float roll_degrees = id(roll).state;
      if (isnan(pitch_degrees) || isnan(roll_degrees)) return NAN;
      float pitch_radians = pitch_degrees * 0.01745329252f;
      float roll_radians = roll_degrees * 0.01745329252f;
      float pitch_lift = (id(wheelbase_inches).state / 2.0f) * tanf(pitch_radians);
      float roll_lift = (id(track_width_inches).state / 2.0f) * tanf(roll_radians);
      float lift = -pitch_lift + roll_lift;
      return lift > 0.0f ? lift : 0.0f;

  - platform: template
    name: "Lift Front Right"
    id: lift_front_right
    unit_of_measurement: "in"
    accuracy_decimals: 1
    icon: mdi:ruler
    update_interval: never
    lambda: |-
      float pitch_degrees = id(pitch).state;
      float roll_degrees = id(roll).state;
      if (isnan(pitch_degrees) || isnan(roll_degrees)) return NAN;
      float pitch_radians = pitch_degrees * 0.01745329252f;
      float roll_radians = roll_degrees * 0.01745329252f;
      float pitch_lift = (id(wheelbase_inches).state / 2.0f) * tanf(pitch_radians);
      float roll_lift = (id(track_width_inches).state / 2.0f) * tanf(roll_radians);
      float lift = -pitch_lift - roll_lift;
      return lift > 0.0f ? lift : 0.0f;

  - platform: template
    name: "Lift Rear Left"
    id: lift_rear_left
    unit_of_measurement: "in"
    accuracy_decimals: 1
    icon: mdi:ruler
    update_interval: never
    lambda: |-
      float pitch_degrees = id(pitch).state;
      float roll_degrees = id(roll).state;
      if (isnan(pitch_degrees) || isnan(roll_degrees)) return NAN;
      float pitch_radians = pitch_degrees * 0.01745329252f;
      float roll_radians = roll_degrees * 0.01745329252f;
      float pitch_lift = (id(wheelbase_inches).state / 2.0f) * tanf(pitch_radians);
      float roll_lift = (id(track_width_inches).state / 2.0f) * tanf(roll_radians);
      float lift = pitch_lift + roll_lift;
      return lift > 0.0f ? lift : 0.0f;

  - platform: template
    name: "Lift Rear Right"
    id: lift_rear_right
    unit_of_measurement: "in"
    accuracy_decimals: 1
    icon: mdi:ruler
    update_interval: never
    lambda: |-
      float pitch_degrees = id(pitch).state;
      float roll_degrees = id(roll).state;
      if (isnan(pitch_degrees) || isnan(roll_degrees)) return NAN;
      float pitch_radians = pitch_degrees * 0.01745329252f;
      float roll_radians = roll_degrees * 0.01745329252f;
      float pitch_lift = (id(wheelbase_inches).state / 2.0f) * tanf(pitch_radians);
      float roll_lift = (id(track_width_inches).state / 2.0f) * tanf(roll_radians);
      float lift = pitch_lift - roll_lift;
      return lift > 0.0f ? lift : 0.0f;

button:
  # Captures the current orientation as "level": stores the raw pitch/roll into
  # the offsets so the sensors read 0 here. Persisted via the restore_value globals.
  - platform: template
    name: "Zero Level"
    id: calibrate_tilt
    on_press:
      - lambda: |-
          float accel_x = id(accel_x).state;
          float accel_y = id(accel_y).state;
          float accel_z = id(accel_z).state;
          if (isnan(accel_x) || isnan(accel_y) || isnan(accel_z)) {
            ESP_LOGW("tilt", "Cannot calibrate - accelerometer reading not available");
            return;
          }
          id(pitch_offset) = atan2(accel_y, sqrt(pow(accel_x, 2) + pow(accel_z, 2))) * 57.2958;
          id(roll_offset) = atan2(-accel_x, accel_z) * 57.2958;
          ESP_LOGI("tilt", "Calibrated: pitch_offset=%.2f roll_offset=%.2f", id(pitch_offset), id(roll_offset));
      - component.update: pitch
      - component.update: roll

  # Clears the calibration so the sensors report the raw, uncorrected angles again.
  - platform: template
    name: "Reset Level"
    id: reset_tilt_calibration
    on_press:
      - lambda: |-
          id(pitch_offset) = 0.0f;
          id(roll_offset) = 0.0f;
          ESP_LOGI("tilt", "Level calibration reset");
      - component.update: pitch
      - component.update: roll

# Material Design Icons subset for the status-bar glyphs (battery, wifi, HA)
font:
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_icons
    size: 24
    bpp: 4
    glyphs:
      - "\U000F0079"  # mdi:battery (100%)
      - "\U000F0082"  # mdi:battery-90
      - "\U000F0081"  # mdi:battery-80
      - "\U000F0080"  # mdi:battery-70
      - "\U000F007F"  # mdi:battery-60
      - "\U000F007E"  # mdi:battery-50
      - "\U000F007D"  # mdi:battery-40
      - "\U000F007C"  # mdi:battery-30
      - "\U000F007B"  # mdi:battery-20
      - "\U000F007A"  # mdi:battery-10
      - "\U000F008E"  # mdi:battery-outline (empty)
      - "\U000F0083"  # mdi:battery-alert (no reading)
      - "\U000F0085"  # mdi:battery-charging-100
      - "\U000F008B"  # mdi:battery-charging-90
      - "\U000F008A"  # mdi:battery-charging-80
      - "\U000F089E"  # mdi:battery-charging-70
      - "\U000F0089"  # mdi:battery-charging-60
      - "\U000F089D"  # mdi:battery-charging-50
      - "\U000F0088"  # mdi:battery-charging-40
      - "\U000F0087"  # mdi:battery-charging-30
      - "\U000F0086"  # mdi:battery-charging-20
      - "\U000F089C"  # mdi:battery-charging-10
      - "\U000F06A5"  # mdi:power-plug (no battery / on USB)
      - "\U000F1C3C"  # mdi:power-plug-battery-outline (external power, no battery)
      - "\U000F05AA"  # mdi:wifi-off
      - "\U000F091F"  # mdi:wifi-strength-1
      - "\U000F0922"  # mdi:wifi-strength-2
      - "\U000F0925"  # mdi:wifi-strength-3
      - "\U000F0928"  # mdi:wifi-strength-4
      - "\U000F092F"  # mdi:wifi-strength-outline (0 / very weak)

  # Simple Icons (pinned version: its Private-Use codepoints shift between majors)
  - file: "https://cdn.jsdelivr.net/npm/simple-icons-font@14.15.0/font/SimpleIcons.ttf"
    id: si_icons
    size: 24
    bpp: 4
    glyphs:
      - "\uEF11"  # si:homeassistant (Simple Icons v14.15.0)

# Inferred battery presence: a real pack (charging or full) holds a steady
# charge-status line; with no battery the charger oscillates. Count the flaps.
globals:
  - id: charge_toggles
    type: int
    initial_value: "0"
  - id: battery_present
    type: bool
    initial_value: "true"
  # Tilt calibration offsets (degrees). Captured by the "Zero Pitch & Roll"
  # button and subtracted from the raw angles so a chosen position reads 0.
  # restore_value: yes -> the calibration survives reboots.
  - id: pitch_offset
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: roll_offset
    type: float
    restore_value: yes
    initial_value: "0.0"
  # Bubble position as a pixel offset from the center of the level field; eased
  # toward the target each tick for smooth motion. 0,0 = centered (level).
  - id: bubble_translate_x
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: bubble_translate_y
    type: float
    restore_value: no
    initial_value: "0.0"

# Vehicle leveling geometry, adjustable from Home Assistant and persisted to flash.
number:
  - platform: template
    name: "Wheelbase"
    id: wheelbase_inches
    unit_of_measurement: "in"
    min_value: 60
    max_value: 300
    step: 0.1
    initial_value: 144
    restore_value: true
    optimistic: true
    mode: box
    icon: mdi:arrow-expand-horizontal

  - platform: template
    name: "Track Width"
    id: track_width_inches
    unit_of_measurement: "in"
    min_value: 30
    max_value: 120
    step: 0.1
    initial_value: 79
    restore_value: true
    optimistic: true
    mode: box
    icon: mdi:arrow-expand-vertical

  - platform: template
    name: "Level Tolerance"
    id: level_tolerance_degrees
    unit_of_measurement: "°"
    min_value: 0.1
    max_value: 10
    step: 0.1
    initial_value: 1.5
    restore_value: true
    optimistic: true
    mode: box
    icon: mdi:angle-acute

# Spirit-level bubble image (generate/regenerate with scripts/make_bubble.py)
image:
  - file: images/bubble.png
    id: bubble_img
    type: RGB565
    transparency: alpha_channel

interval:
  # Battery-presence detection + charger control.
  # With no battery the charger oscillates into the open battery terminal, so the
  # STAT line (`charging`) flaps. We count those flaps each window:
  #   - flapping while the charger is enabled -> no battery -> disable the charger
  #     to stop the oscillation (and the wasted power / log spam)
  #   - a steady line while the charger is enabled -> a real battery is present
  - interval: 5s
    then:
      - lambda: |-
          bool flapping = id(charge_toggles) >= 3;
          id(charge_toggles) = 0;
          // Only judge presence while the charger is enabled; with the charger
          // off there is nothing to flap and the STAT line is meaningless.
          if (id(charge_enable).state) {
            if (flapping) {
              id(battery_present) = false;
              id(charge_enable).turn_off();
              ESP_LOGW("battery", "No battery detected (charger flapping) - disabling charger");
            } else {
              id(battery_present) = true;
            }
          }
      - script.execute: update_battery
      - script.execute: update_wifi_icon

  # Periodically re-enable the charger to check whether a battery was attached.
  # If a pack is present the STAT line stays steady and charging continues; if
  # not, the 5s detector above sees the flapping again and switches it back off.
  - interval: 60s
    then:
      - if:
          condition:
            switch.is_off: charge_enable
          then:
            - logger.log: "Re-probing for battery - enabling charger"
            - switch.turn_on: charge_enable

  # Spirit-level bubble animation. Map pitch/roll to a pixel offset from the
  # center of the level field and ease the bubble toward it. The bubble floats
  # toward the raised side (invert a sign below if it moves the wrong way).
  - interval: 50ms
    then:
      - lambda: |-
          const float max_angle_degrees = 15.0f;   // tilt that pushes the bubble to the rim
          const float max_offset_pixels = 106.0f;  // (field 260 - bubble 48) / 2
          float pitch_degrees = id(pitch).state;
          float roll_degrees = id(roll).state;
          if (isnan(pitch_degrees) || isnan(roll_degrees)) return;
          float roll_clamped = fmaxf(fminf(roll_degrees, max_angle_degrees), -max_angle_degrees);
          float pitch_clamped = fmaxf(fminf(pitch_degrees, max_angle_degrees), -max_angle_degrees);
          float target_x = (roll_clamped / max_angle_degrees) * max_offset_pixels;
          float target_y = (-pitch_clamped / max_angle_degrees) * max_offset_pixels;
          const float smoothing = 0.2f;
          id(bubble_translate_x) += smoothing * (target_x - id(bubble_translate_x));
          id(bubble_translate_y) += smoothing * (target_y - id(bubble_translate_y));
      - lvgl.widget.update:
          id: level_bubble
          translate_x: !lambda 'return (int) id(bubble_translate_x);'
          translate_y: !lambda 'return (int) id(bubble_translate_y);'

# Refreshes the clock + date labels from the first valid time source
script:
  - id: update_clock
    mode: restart
    then:
      - lvgl.label.update:
          id: time_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) t = id(sntp_time).now();
            if (!t.is_valid()) t = id(rtc_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int hour = t.hour % 12;
            if (hour == 0) hour = 12;
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%d:%02d %s", hour, t.minute, t.hour < 12 ? "am" : "pm");
            return std::string(buffer);
      - lvgl.label.update:
          id: date_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) t = id(sntp_time).now();
            if (!t.is_valid()) t = id(rtc_time).now();
            if (!t.is_valid()) return std::string("--- --- -- ----");
            return t.strftime("%A %B %d %Y").c_str();

# Updates the battery status icon (level glyph + charging bolt) and percentage
  - id: update_battery
    mode: restart
    then:
      - lvgl.label.update:
          id: battery_icon_label
          text: !lambda |-
            // Charging when current flows into the pack (INA226: negative = charging)
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            // STAT asserted AND current into pack (INA226: negative) proves a pack is charging
            bool have_batt = id(battery_present) || is_charging;
            // External power, no battery -> charger flaps, pack absent
            if (!have_batt) return std::string("\U000F1C3C");  // mdi:power-plug-battery-outline
            float p = id(battery_percent).state;
            if (isnan(p)) return std::string("\U000F0083");  // mdi:battery-alert (no reading)
            int lvl = (int) (roundf(p / 10.0f) * 10);        // nearest 10%
            if (lvl > 100) lvl = 100;
            if (lvl < 0) lvl = 0;
            if (is_charging) {
              switch (lvl) {
                case 100: return std::string("\U000F0085");  // mdi:battery-charging-100
                case 90:  return std::string("\U000F008B");  // mdi:battery-charging-90
                case 80:  return std::string("\U000F008A");  // mdi:battery-charging-80
                case 70:  return std::string("\U000F089E");  // mdi:battery-charging-70
                case 60:  return std::string("\U000F0089");  // mdi:battery-charging-60
                case 50:  return std::string("\U000F089D");  // mdi:battery-charging-50
                case 40:  return std::string("\U000F0088");  // mdi:battery-charging-40
                case 30:  return std::string("\U000F0087");  // mdi:battery-charging-30
                case 20:  return std::string("\U000F0086");  // mdi:battery-charging-20
                default:  return std::string("\U000F089C");  // mdi:battery-charging-10
              }
            }
            switch (lvl) {
              case 100: return std::string("\U000F0079");    // mdi:battery (full)
              case 90:  return std::string("\U000F0082");    // mdi:battery-90
              case 80:  return std::string("\U000F0081");    // mdi:battery-80
              case 70:  return std::string("\U000F0080");    // mdi:battery-70
              case 60:  return std::string("\U000F007F");    // mdi:battery-60
              case 50:  return std::string("\U000F007E");    // mdi:battery-50
              case 40:  return std::string("\U000F007D");    // mdi:battery-40
              case 30:  return std::string("\U000F007C");    // mdi:battery-30
              case 20:  return std::string("\U000F007B");    // mdi:battery-20
              case 10:  return std::string("\U000F007A");    // mdi:battery-10
              default:  return std::string("\U000F008E");    // mdi:battery-outline (empty)
            }
          text_color: !lambda |-
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            bool have_batt = id(battery_present) || is_charging;
            if (!have_batt) return lv_color_hex(0xA8DADC); // on USB, no battery
            if (is_charging) return lv_color_hex(0x4CAF50);   // green while charging
            float p = id(battery_percent).state;
            if (!isnan(p) && p <= 15) return lv_color_hex(0xE53935); // red when low
            return lv_color_hex(0xA8DADC);
      - lvgl.label.update:
          id: battery_pct_label
          text: !lambda |-
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            if (!id(battery_present) && !is_charging) return std::string("");   // no SoC without a battery
            float p = id(battery_percent).state;
            if (isnan(p)) return std::string("--%");
            return std::to_string((int) roundf(p)) + "%";

  # Sets the wifi status glyph: signal strength when connected, wifi-off otherwise
  - id: update_wifi_icon
    mode: restart
    then:
      - lvgl.label.update:
          id: wifi_icon_label
          text: !lambda |-
            if (!wifi::global_wifi_component->is_connected()) return std::string("\U000F05AA");  // mdi:wifi-off
            float r = id(wifi_rssi).state;
            if (isnan(r)) return std::string("\U000F092F");             // mdi:wifi-strength-outline (unknown)
            if (r >= -55) return std::string("\U000F0928");             // mdi:wifi-strength-4
            if (r >= -65) return std::string("\U000F0925");             // mdi:wifi-strength-3
            if (r >= -75) return std::string("\U000F0922");             // mdi:wifi-strength-2
            if (r >= -85) return std::string("\U000F091F");             // mdi:wifi-strength-1
            return std::string("\U000F092F");                          // mdi:wifi-strength-outline (very weak)

lvgl:
  buffer_size: 100%
  byte_order: little_endian
  rotation: 270
  pages:
    - id: main_page
      bg_color: 0x0E1A2B
      widgets:
        - label:
            id: time_label
            align: CENTER
            y: -40
            text: "--:--"
            text_font: montserrat_48
            text_color: 0xF1FAEE
        - label:
            id: date_label
            align: CENTER
            y: 40
            text: "--- --- -- ----"
            text_font: montserrat_28
            text_color: 0xA8DADC
        - button:
            id: charge_btn
            align: CENTER
            y: 140
            width: 220
            height: 64
            checkable: true
            on_click:
              - logger.log: "Charge button tapped"
              - switch.toggle: charge_enable
            widgets:
              - label:
                  id: charge_btn_label
                  align: CENTER
                  text: "Charge"
                  text_font: montserrat_20
        # Spirit-level bubble. Crosshair + center ring mark level; the bubble
        # image is moved via translate_x/translate_y by the 50ms interval above.
        - obj:
            id: level_field
            align: LEFT_MID
            x: 60
            width: 260
            height: 260
            radius: 130
            clip_corner: true
            bg_color: 0x14243A
            bg_opa: COVER
            border_color: 0x456073
            border_width: 2
            clickable: false
            scrollable: false
            scrollbar_mode: "OFF"
            pad_all: 0
            widgets:
              - line:
                  points: [{x: 18, y: 128}, {x: 238, y: 128}]
                  line_color: 0x456073
                  line_width: 2
              - line:
                  points: [{x: 128, y: 18}, {x: 128, y: 238}]
                  line_color: 0x456073
                  line_width: 2
              - obj:
                  align: CENTER
                  width: 54
                  height: 54
                  radius: 27
                  bg_opa: TRANSP
                  border_color: 0x4CAF50
                  border_width: 2
                  clickable: false
              - image:
                  id: level_bubble
                  src: bubble_img
                  align: CENTER
                  translate_x: 0
                  translate_y: 0
  top_layer:
    widgets:
      # Top-right status bar. ROW_REVERSE => first child sits furthest right.
      - obj:
          id: status_bar
          align: TOP_RIGHT
          width: 100%
          height: SIZE_CONTENT
          y: 8
          clickable: false
          bg_opa: TRANSP
          border_opa: TRANSP
          pad_right: 16
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            pad_column: 16
          widgets:
            - label:
                id: battery_icon_label
                text: "\U000F0079"  # mdi:battery (full)
                text_font: mdi_icons
                text_color: 0xA8DADC
            - label:
                id: battery_pct_label
                text: "--%"
                text_font: montserrat_20
                text_color: 0xA8DADC
            - label:
                id: api_icon_label
                hidden: true
                text: "\uEF11"  # si:homeassistant
                text_font: si_icons
                text_color: 0xA8DADC
            - label:
                id: wifi_icon_label
                text: "\U000F05AA"  # mdi:wifi-off (until connected)
                text_font: mdi_icons
                text_color: 0xA8DADC

time:
  # ha_time / sntp_time / rtc_time are defined by the M5Stack-Tab5 package (which
  # writes the RX8130 RTC on every sync); extend them to also refresh the LVGL clock.
  - id: !extend ha_time
    on_time_sync:
      then:
        - rx8130.write_time:
        # Fill the labels in immediately instead of waiting for the next minute
        - script.execute: update_clock
  - id: !extend sntp_time
    on_time_sync:
      then:
        - rx8130.write_time:
        - script.execute: update_clock
  # rtc_time is the package's RX8130; refresh the clock on the minute boundary
  # (the label only shows hours:minutes) - it is also the offline fallback source.
  - id: !extend rtc_time
    on_time:
      - seconds: 0
        minutes: '*'
        then:
          - script.execute: update_clock
