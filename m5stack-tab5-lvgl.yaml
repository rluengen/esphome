esphome:
  name: tab5-ha-hmi
  friendly_name: M5Stack Tab5 Home Assistant HMI
  min_version: 2026.6.0
  on_boot:
    # Log the reset reason early so crashes/brownouts are visible in the boot log
    - priority: 600
      then:
        - lambda: |-
            int reason = esp_reset_reason();
            const char* reason_str;
            switch(reason) {
              case 1: reason_str = "POWERON (normal boot)"; break;
              case 2: reason_str = "EXTERNAL RESET"; break;
              case 3: reason_str = "SOFTWARE RESET"; break;
              case 4: reason_str = "PANIC/EXCEPTION - CRASH!"; break;
              case 5: reason_str = "INTERRUPT WATCHDOG - CRASH!"; break;
              case 6: reason_str = "TASK WATCHDOG - CRASH!"; break;
              case 7: reason_str = "WATCHDOG - CRASH!"; break;
              case 8: reason_str = "DEEPSLEEP RESET"; break;
              case 9: reason_str = "BROWNOUT - POWER ISSUE!"; break;
              case 10: reason_str = "SDIO RESET"; break;
              default: reason_str = "UNKNOWN"; break;
            }
            ESP_LOGW("boot", "ESP32 boot reason: %s (code %d)", reason_str, reason);
    - priority: -100
      then:
        # Make sure the display backlight is on at boot
        - light.turn_on:
            id: backlight
            brightness: 100%
        - lvgl.resume:

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      # M5Stack Tab5 board definition - esp32 / esp32_hosted / logger / psram /
      # i2c / pi4ioe / display / touch / audio / power + IMU sensors / time / ...
      - path: devices/M5Stack-Tab5.yaml
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: touch
          backlight_id: backlight
      # Vehicle leveling (pitch/roll, per-wheel lift, calibration, geometry).
      - path: packages/level.yaml
        vars:
          accel_x_id: accel_x
          accel_y_id: accel_y
          accel_z_id: accel_z
      - path: packages/webserver.yaml
      - path: packages/common.yaml
        vars:
          api_encryption_key: !secret encryption_key
      - path: packages/network/wifi.yaml
        vars:
          wifi_ssid: !secret wifi_ssid
          wifi_password: !secret wifi_password

api:
  on_client_connected: 
    then:
      - lvgl.widget.show: api_icon_label
  on_client_disconnected: 
    then:
      - lvgl.widget.hide: api_icon_label

wifi:
  on_connect: 
    then:
      - script.execute: update_wifi_icon
  on_disconnect: 
    then:
      - script.execute: update_wifi_icon

binary_sensor:
  # `charging` (the charger STAT line) is defined in the M5Stack-Tab5 package;
  # extend it to refresh the LVGL battery icon whenever the charge state changes.
  - id: !extend charging
    on_state:
      # Every STAT edge bumps the flap counter the presence detector samples.
      - lambda: 'id(charge_toggles) += 1;'
      - script.execute: update_battery

sensor:
  # `battery_percent` (package sensor, recomputed every 30s) drives the battery
  # icon on change, so no periodic poll is needed to keep it fresh.
  - id: !extend battery_percent
    on_value:
      - script.execute: update_battery

  # `gyro_z` (from the M5Stack-Tab5 package) publishes last in each IMU update
  # cycle, so all six axes are fresh here - use it to wake the screen on movement.
  - id: !extend gyro_z
    on_value:
      - if:
          condition:
            # Pickup/move = rotation or off-gravity accel above the resting noise floor
            lambda: |-
              float gx = id(gyro_x).state, gy = id(gyro_y).state, gz = id(gyro_z).state;
              float ax = id(accel_x).state, ay = id(accel_y).state, az = id(accel_z).state;
              if (isnan(gx) || isnan(ax)) return false;
              float gmag = sqrtf(gx*gx + gy*gy + gz*gz);   // deg/s (~0 at rest)
              float amag = sqrtf(ax*ax + ay*ay + az*az);   // g (~1.0 at rest)
              return gmag > 30.0f || fabsf(amag - 1.0f) > 0.15f;
          then:
            - logger.log: "Device moved - waking screen"
            - script.execute: screen_bump_activity

  # Main Can Lights brightness (0-255 from HA) -> Lights-tab slider + bulb icon.
  - platform: template
    id: ha_bright_main_cans
    internal: true
    on_value:
      - lvgl.slider.update:
          id: sld_main_cans
          value: !lambda 'return isnan(x) ? 0 : (int) x;'
      - lvgl.label.update:
          id: lbl_icon_main_cans
          text: !lambda 'return std::string((!isnan(x) && x > 0) ? "\U000F0336" : "\U000F0335");'
          text_color: !lambda 'return (!isnan(x) && x > 0) ? lv_color_hex(0xFFD700) : lv_color_hex(0x808080);'
      # Lights nav badge: "1" when the main cans are on, hidden when off.
      - lvgl.label.update:
          id: badge_lights
          text: !lambda 'return (!isnan(x) && x > 0) ? std::string("1") : std::string("");'
      - lvgl.widget.update:
          id: badge_lights
          hidden: !lambda 'return !(!isnan(x) && x > 0);'

# HA drops the brightness attribute entirely when a light is off, so import it as
# text and normalize missing/None to 0 before publishing the numeric brightness.
text_sensor:
  - platform: homeassistant
    id: ha_bright_main_cans_raw
    entity_id: light.quinled_van_lightcontroller_main_can_lights
    attribute: brightness
    internal: true
    on_value:
      - lambda: |-
          float brightness = 0.0f;
          if (!x.empty() && x != "None" && x != "unknown" && x != "unavailable") {
            brightness = strtof(x.c_str(), nullptr);
          }
          id(ha_bright_main_cans).publish_state(brightness);

