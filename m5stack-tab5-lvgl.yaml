globals:
  # Battery-presence inference: with no pack the charger oscillates into the open
  # terminal, so the charger STAT line (`charging`) flaps. The interval below
  # counts those toggles per window - a flapping line means no battery is fitted.
  - id: charge_toggles
    type: int
    initial_value: "0"
  - id: battery_present
    type: bool
    initial_value: "true"
  # Bubble position as a pixel offset from the center of the level field; eased
  # toward the target each tick for smooth motion. 0,0 = centered (level).
  - id: bubble_translate_x
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: bubble_translate_y
    type: float
    restore_value: no
    initial_value: "0.0"
  # Pending Main Can Lights brightness (0-255) awaiting the debounced HA call.
  - id: pending_bright_main_cans
    type: int
    restore_value: no
    initial_value: "0"

# Spirit-level bubble image (generate/regenerate with scripts/make_bubble.py)
image:
  - file: images/bubble.png
    id: bubble_img
    type: RGB565
    transparency: alpha_channel

interval:
  # Battery-presence detection. Flapping is a "many edges in a window" signature,
  # so unlike the icon refreshes this genuinely needs a periodic sample. While the
  # charger is enabled, a flapping STAT line = charger oscillating into an open
  # terminal = no pack fitted; a steady line = a real battery. Refresh the icon
  # only when the inferred result flips.
  - interval: 5s
    then:
      - lambda: |-
          bool was_present = id(battery_present);
          if (id(charge_enable).state) {
            id(battery_present) = (id(charge_toggles) < 3);
          }
          id(charge_toggles) = 0;
          if (id(battery_present) != was_present) id(update_battery).execute();

  # Spirit-level bubble animation. Map pitch/roll to a pixel offset from the
  # center of the level field and ease the bubble toward it. The bubble floats
  # toward the raised side (invert a sign below if it moves the wrong way).
  - interval: 50ms
    then:
      - lambda: |-
          const float max_angle_degrees = 45.0f;   // tilt (deg) that reaches the rim; raise to keep the bubble more centered
          const float max_offset_pixels = 106.0f;  // (field 260 - bubble 48) / 2
          float pitch_degrees = id(pitch).state;
          float roll_degrees = id(roll).state;
          if (isnan(pitch_degrees) || isnan(roll_degrees)) return;
          // Linear, uniform map (no deadzone, no expo) so the bubble tracks tilt
          // predictably and never "accelerates" across; each axis clamps at the rim.
          float roll_clamped = fmaxf(fminf(roll_degrees, max_angle_degrees), -max_angle_degrees);
          float pitch_clamped = fmaxf(fminf(pitch_degrees, max_angle_degrees), -max_angle_degrees);
          float target_x = (roll_clamped / max_angle_degrees) * max_offset_pixels;
          float target_y = (-pitch_clamped / max_angle_degrees) * max_offset_pixels;
          // Heavy low-pass so accelerometer noise near level averages out (less
          // variance in the middle) instead of flinging the bubble side to side.
          // Lower = calmer/slower, higher = snappier (1.0 disables smoothing).
          const float smoothing = 0.1f;
          id(bubble_translate_x) += smoothing * (target_x - id(bubble_translate_x));
          id(bubble_translate_y) += smoothing * (target_y - id(bubble_translate_y));
      - lvgl.widget.update:
          id: level_bubble
          translate_x: !lambda 'return (int) id(bubble_translate_x);'
          translate_y: !lambda 'return (int) id(bubble_translate_y);'

# Refreshes the clock + date labels from the first valid time source
script:
  - id: update_clock
    mode: restart
    then:
      - lvgl.label.update:
          id: time_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) t = id(sntp_time).now();
            if (!t.is_valid()) t = id(rtc_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int hour = t.hour % 12;
            if (hour == 0) hour = 12;
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%d:%02d %s", hour, t.minute, t.hour < 12 ? "am" : "pm");
            return std::string(buffer);
      - lvgl.label.update:
          id: date_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) t = id(sntp_time).now();
            if (!t.is_valid()) t = id(rtc_time).now();
            if (!t.is_valid()) return std::string("-/-/----");
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%d/%d/%d", t.month, t.day_of_month, t.year);
            return std::string(buffer);

# Updates the battery status icon (level glyph + charging bolt) and percentage
  - id: update_battery
    mode: restart
    then:
      - lvgl.label.update:
          id: battery_icon_label
          text: !lambda |-
            // Charging when current flows into the pack (INA226: negative = charging);
            // external power present when the pack is not discharging (i below ~0).
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            bool on_external = is_charging || (!isnan(i) && i < 0.05f);
            // On external power with no pack fitted -> plug glyph instead of a level.
            if (on_external && !id(battery_present)) return std::string("\U000F1C3C");  // mdi:power-plug-battery-outline
            float p = id(battery_percent).state;
            if (isnan(p)) return std::string("\U000F0083");  // mdi:battery-alert (no reading)
            int lvl = (int) (roundf(p / 10.0f) * 10);        // nearest 10%
            if (lvl > 100) lvl = 100;
            if (lvl < 0) lvl = 0;
            if (is_charging) {
              switch (lvl) {
                case 100: return std::string("\U000F0085");  // mdi:battery-charging-100
                case 90:  return std::string("\U000F008B");  // mdi:battery-charging-90
                case 80:  return std::string("\U000F008A");  // mdi:battery-charging-80
                case 70:  return std::string("\U000F089E");  // mdi:battery-charging-70
                case 60:  return std::string("\U000F0089");  // mdi:battery-charging-60
                case 50:  return std::string("\U000F089D");  // mdi:battery-charging-50
                case 40:  return std::string("\U000F0088");  // mdi:battery-charging-40
                case 30:  return std::string("\U000F0087");  // mdi:battery-charging-30
                case 20:  return std::string("\U000F0086");  // mdi:battery-charging-20
                default:  return std::string("\U000F089C");  // mdi:battery-charging-10
              }
            }
            switch (lvl) {
              case 100: return std::string("\U000F0079");    // mdi:battery (full)
              case 90:  return std::string("\U000F0082");    // mdi:battery-90
              case 80:  return std::string("\U000F0081");    // mdi:battery-80
              case 70:  return std::string("\U000F0080");    // mdi:battery-70
              case 60:  return std::string("\U000F007F");    // mdi:battery-60
              case 50:  return std::string("\U000F007E");    // mdi:battery-50
              case 40:  return std::string("\U000F007D");    // mdi:battery-40
              case 30:  return std::string("\U000F007C");    // mdi:battery-30
              case 20:  return std::string("\U000F007B");    // mdi:battery-20
              case 10:  return std::string("\U000F007A");    // mdi:battery-10
              default:  return std::string("\U000F008E");    // mdi:battery-outline (empty)
            }
          text_color: !lambda |-
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            bool on_external = is_charging || (!isnan(i) && i < 0.05f);
            if (on_external && !id(battery_present)) return lv_color_hex(0xA8DADC); // plugged in, no pack
            if (is_charging) return lv_color_hex(0x4CAF50);   // green while charging
            float p = id(battery_percent).state;
            if (!isnan(p) && p <= 15) return lv_color_hex(0xE53935); // red when low
            return lv_color_hex(0xA8DADC);
      - lvgl.label.update:
          id: battery_pct_label
          text: !lambda |-
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            bool on_external = is_charging || (!isnan(i) && i < 0.05f);
            if (on_external && !id(battery_present)) return std::string("");  // no SoC without a pack
            float p = id(battery_percent).state;
            if (isnan(p)) return std::string("--%");
            return std::to_string((int) roundf(p)) + "%";

  # Sets the wifi status glyph: signal strength when connected, wifi-off otherwise
  - id: update_wifi_icon
    mode: restart
    then:
      - lvgl.label.update:
          id: wifi_icon_label
          text: !lambda |-
            if (!wifi::global_wifi_component->is_connected()) return std::string("\U000F05AA");  // mdi:wifi-off
            float r = id(wifi_rssi).state;
            if (isnan(r)) return std::string("\U000F092F");             // mdi:wifi-strength-outline (unknown)
            if (r >= -55) return std::string("\U000F0928");             // mdi:wifi-strength-4
            if (r >= -65) return std::string("\U000F0925");             // mdi:wifi-strength-3
            if (r >= -75) return std::string("\U000F0922");             // mdi:wifi-strength-2
            if (r >= -85) return std::string("\U000F091F");             // mdi:wifi-strength-1
            return std::string("\U000F092F");                          // mdi:wifi-strength-outline (very weak)

  # Debounce the Main Can Lights slider so dragging doesn't flood HA with calls.
  # 0 = off; anything higher turns on at that brightness.
  - id: debounce_main_cans
    mode: restart
    then:
      - delay: 300ms
      - if:
          condition:
            lambda: 'return id(pending_bright_main_cans) <= 0;'
          then:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: light.quinled_van_lightcontroller_main_can_lights
          else:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: light.quinled_van_lightcontroller_main_can_lights
                  brightness: !lambda 'return id(pending_bright_main_cans);'

  # Bottom-nav tab switching: show one content panel (idx 0..4), hide the rest,
  # and recolor each tab icon/label (active = bright, inactive = grey).
  - id: select_tab
    parameters:
      idx: int
    then:
      - lambda: |-
          lv_obj_t *panels[5] = { id(content_home), id(content_lights), id(content_power), id(content_water), id(content_weather) };
          lv_obj_t *icons[5]  = { id(lbl_tab_home_icon), id(lbl_tab_lights_icon), id(lbl_tab_power_icon), id(lbl_tab_water_icon), id(lbl_tab_weather_icon) };
          lv_obj_t *names[5]  = { id(lbl_tab_home_name), id(lbl_tab_lights_name), id(lbl_tab_power_name), id(lbl_tab_water_name), id(lbl_tab_weather_name) };
          for (int i = 0; i < 5; i++) {
            if (i == idx) lv_obj_clear_flag(panels[i], LV_OBJ_FLAG_HIDDEN);
            else          lv_obj_add_flag(panels[i], LV_OBJ_FLAG_HIDDEN);
            lv_color_t c = (i == idx) ? lv_color_hex(0xF1FAEE) : lv_color_hex(0x8B949E);
            lv_obj_set_style_text_color(icons[i], c, LV_PART_MAIN);
            lv_obj_set_style_text_color(names[i], c, LV_PART_MAIN);
          }

lvgl:
  buffer_size: 100%
  byte_order: little_endian
  rotation: 0
  pages:
    - id: main_page
      bg_color: 0x0E1A2B
      widgets:
        # Content panels (one visible at a time); the bottom nav switches them.
        - obj:
            id: content_home
            x: 0
            y: 0
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            clickable: false
            scrollable: false
            scrollbar_mode: "OFF"
            widgets:
              # Spirit-level bubble. Crosshair + center ring mark level; the
              # bubble image is moved by the 50ms interval above.
              - obj:
                  id: level_field
                  align: CENTER
                  width: 260
                  height: 260
                  radius: 130
                  clip_corner: true
                  bg_color: 0x14243A
                  bg_opa: COVER
                  border_color: 0x456073
                  border_width: 2
                  clickable: false
                  scrollable: false
                  scrollbar_mode: "OFF"
                  pad_all: 0
                  widgets:
                    - line:
                        points: [{x: 18, y: 128}, {x: 238, y: 128}]
                        line_color: 0x456073
                        line_width: 2
                    - line:
                        points: [{x: 128, y: 18}, {x: 128, y: 238}]
                        line_color: 0x456073
                        line_width: 2
                    - obj:
                        align: CENTER
                        width: 54
                        height: 54
                        radius: 27
                        bg_opa: TRANSP
                        border_color: 0x4CAF50
                        border_width: 2
                        clickable: false
                    - image:
                        id: level_bubble
                        src: bubble_img
                        align: CENTER
                        translate_x: 0
                        translate_y: 0
        - obj:
            id: content_lights
            x: 0
            y: 0
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            hidden: true
            clickable: false
            scrollable: false
            scrollbar_mode: "OFF"
            widgets:
              # Light rows stack top-to-bottom; each = toggle (left) + wide slider (right).
              - obj:
                  id: lights_list
                  align: TOP_MID
                  y: 76
                  width: 96%
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  clickable: false
                  scrollable: false
                  scrollbar_mode: "OFF"
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    pad_row: 12
                  widgets:
                    # -- Main Can Lights --
                    - obj:
                        width: 100%
                        height: 100
                        bg_color: 0x14243A
                        bg_opa: COVER
                        border_color: 0x456073
                        border_width: 2
                        radius: 12
                        clickable: false
                        scrollable: false
                        scrollbar_mode: "OFF"
                        pad_all: 14
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_cross: CENTER
                          pad_column: 16
                        widgets:
                          - button:
                              width: 72
                              height: 72
                              bg_color: 0x2D2D44
                              radius: 36
                              on_click:
                                - homeassistant.service:
