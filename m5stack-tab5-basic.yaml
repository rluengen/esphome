esphome:
  name: tab5-ha-hmi
  friendly_name: M5Stack Tab5 Home Assistant HMI
  min_version: 2026.6.0
  on_boot:
    # Log the reset reason early so crashes/brownouts are visible in the boot log
    - priority: 600
      then:
        - lambda: |-
            int reason = esp_reset_reason();
            const char* reason_str;
            switch(reason) {
              case 1: reason_str = "POWERON (normal boot)"; break;
              case 2: reason_str = "EXTERNAL RESET"; break;
              case 3: reason_str = "SOFTWARE RESET"; break;
              case 4: reason_str = "PANIC/EXCEPTION - CRASH!"; break;
              case 5: reason_str = "INTERRUPT WATCHDOG - CRASH!"; break;
              case 6: reason_str = "TASK WATCHDOG - CRASH!"; break;
              case 7: reason_str = "WATCHDOG - CRASH!"; break;
              case 8: reason_str = "DEEPSLEEP RESET"; break;
              case 9: reason_str = "BROWNOUT - POWER ISSUE!"; break;
              case 10: reason_str = "SDIO RESET"; break;
              default: reason_str = "UNKNOWN"; break;
            }
            ESP_LOGW("boot", "ESP32 boot reason: %s (code %d)", reason_str, reason);
    - priority: -100
      then:
        # Make sure the display backlight is on at boot
        - light.turn_on:
            id: backlight
            brightness: 100%
        - lvgl.resume:

esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

packages:
  remote_packages:
    url: https://github.com/rluengen/esphome
    ref: main
    refresh: always
    files:
      - path: packages/display/sleep.yaml
        vars:
          touchscreen_id: touch
          backlight_id: backlight

external_components:
  - source: github://pr#12075
    components: [st7123]
    refresh: 1h

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

psram:
  mode: hex
  speed: 200MHz

api:
  encryption:
    key: !secret encryption_key
  on_client_connected: 
    then:
      - lvgl.widget.show: api_icon_label
  on_client_disconnected: 
    then:
      - lvgl.widget.hide: api_icon_label

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  on_connect: 
    then:
      - script.execute: update_wifi_icon
  on_disconnect: 
    then:
      - script.execute: update_wifi_icon

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
    scan: true

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable

switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3

  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true

  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0

  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    publish_initial_state: true
    on_state:
      # Count charge-status flaps (used to infer a missing battery)
      - lambda: 'id(charge_toggles) += 1;'
      - logger.log:
          format: "Charging: %s"
          args: ['x ? "yes" : "no"']
      - script.execute: update_battery

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

select:
# The DAC Output select needs to be manually 
# (or with an automation) changed to `LINE1` for the onboard speaker
  - platform: es8388
    dac_output:
      name: DAC Output
    adc_input_mic:
      name: ADC Input Mic

  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

motion:
  - platform: bmi270
    i2c_id: bsp_bus
    address: 0x68          # BMI270 is 0x68 or 0x69 - confirm via the I2C scan in the logs
    accelerometer_range: 4G
    gyroscope_range: 2000DPS
    update_interval: 250ms   # poll-only component (no interrupt/on-change); 250ms = responsive wake

sensor:
  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: Battery Voltage
      on_value:
        - logger.log:
            format: "Battery voltage: %.2f V"
            args: ['x']
    current:
      id: battery_current
      name: Battery Current
      # Positive means discharging, negative means charging
      on_value:
        - logger.log:
            format: "Battery current: %.3f A"
            args: ['x']
        - script.execute: update_battery

  # Battery percentage from voltage (2S pack: 6.4V empty=3.2V/cell .. 8.4V full=4.2V/cell)
  - platform: template
    id: battery_percent
    name: "Battery Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    update_interval: 30s
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      float pct = (v - 6.4f) / (8.4f - 6.4f) * 100.0f;
      if (pct > 100.0f) pct = 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      return pct;
    on_value:
      - logger.log:
          format: "Battery level: %.0f%%"
          args: ['x']
      - script.execute: update_battery

  # BMI270 6-axis IMU (accelerometer + gyroscope + temperature)
  - platform: motion
    type: acceleration_x
    id: accel_x
    name: "Accel X"
  - platform: motion
    type: acceleration_y
    id: accel_y
    name: "Accel Y"
  - platform: motion
    type: acceleration_z
    id: accel_z
    name: "Accel Z"
  - platform: motion
    type: gyroscope_x
    id: gyro_x
    name: "Gyro X"
  - platform: motion
    type: gyroscope_y
    id: gyro_y
    name: "Gyro Y"
  - platform: motion
    type: gyroscope_z
    id: gyro_z
    name: "Gyro Z"
    # gyro_z publishes last in each update cycle, so all 6 axes are fresh here.
    on_value:
      - if:
          condition:
            # Pickup/move = rotation or off-gravity accel above the resting noise floor
            lambda: |-
              float gx = id(gyro_x).state, gy = id(gyro_y).state, gz = id(gyro_z).state;
              float ax = id(accel_x).state, ay = id(accel_y).state, az = id(accel_z).state;
              if (isnan(gx) || isnan(ax)) return false;
              float gmag = sqrtf(gx*gx + gy*gy + gz*gz);   // deg/s (~0 at rest)
              float amag = sqrtf(ax*ax + ay*ay + az*az);   // g (~1.0 at rest)
              return gmag > 30.0f || fabsf(amag - 1.0f) > 0.15f;
          then:
            - logger.log: "Device moved - waking screen"
            - script.execute: screen_bump_activity
  - platform: bmi270
    type: temperature
    name: "IMU Temperature"

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 15s
    on_value:
      - script.execute: update_wifi_icon


touchscreen:
  - platform: st7123
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    display: lcd
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5      
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch
      
esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    id: lcd
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4


output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

# Material Design Icons subset for the status-bar glyphs (battery, wifi, HA)
font:
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_icons
    size: 24
    bpp: 4
    glyphs:
      - "\U000F0079"  # mdi:battery (100%)
      - "\U000F0082"  # mdi:battery-90
      - "\U000F0081"  # mdi:battery-80
      - "\U000F0080"  # mdi:battery-70
      - "\U000F007F"  # mdi:battery-60
      - "\U000F007E"  # mdi:battery-50
      - "\U000F007D"  # mdi:battery-40
      - "\U000F007C"  # mdi:battery-30
      - "\U000F007B"  # mdi:battery-20
      - "\U000F007A"  # mdi:battery-10
      - "\U000F008E"  # mdi:battery-outline (empty)
      - "\U000F0083"  # mdi:battery-alert (no reading)
      - "\U000F0085"  # mdi:battery-charging-100
      - "\U000F008B"  # mdi:battery-charging-90
      - "\U000F008A"  # mdi:battery-charging-80
      - "\U000F089E"  # mdi:battery-charging-70
      - "\U000F0089"  # mdi:battery-charging-60
      - "\U000F089D"  # mdi:battery-charging-50
      - "\U000F0088"  # mdi:battery-charging-40
      - "\U000F0087"  # mdi:battery-charging-30
      - "\U000F0086"  # mdi:battery-charging-20
      - "\U000F089C"  # mdi:battery-charging-10
      - "\U000F06A5"  # mdi:power-plug (no battery / on USB)
      - "\U000F1C3C"  # mdi:power-plug-battery-outline (external power, no battery)
      - "\U000F05AA"  # mdi:wifi-off
      - "\U000F091F"  # mdi:wifi-strength-1
      - "\U000F0922"  # mdi:wifi-strength-2
      - "\U000F0925"  # mdi:wifi-strength-3
      - "\U000F0928"  # mdi:wifi-strength-4
      - "\U000F092F"  # mdi:wifi-strength-outline (0 / very weak)

  # Simple Icons (pinned version: its Private-Use codepoints shift between majors)
  - file: "https://cdn.jsdelivr.net/npm/simple-icons-font@14.15.0/font/SimpleIcons.ttf"
    id: si_icons
    size: 24
    bpp: 4
    glyphs:
      - "\uEF11"  # si:homeassistant (Simple Icons v14.15.0)

# Inferred battery presence: a real pack (charging or full) holds a steady
# charge-status line; with no battery the charger oscillates. Count the flaps.
globals:
  - id: charge_toggles
    type: int
    initial_value: "0"
  - id: battery_present
    type: bool
    initial_value: "true"

interval:
  - interval: 5s
    then:
      - lambda: |-
          id(battery_present) = (id(charge_toggles) < 3);
          id(charge_toggles) = 0;
      - script.execute: update_battery
      - script.execute: update_wifi_icon

# Refreshes the clock + date labels from the first valid time source
script:
  - id: update_clock
    mode: restart
    then:
      - lvgl.label.update:
          id: time_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) t = id(sntp_time).now();
            if (!t.is_valid()) t = id(rx8130_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int hour = t.hour % 12;
            if (hour == 0) hour = 12;
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%d:%02d %s", hour, t.minute, t.hour < 12 ? "am" : "pm");
            return std::string(buffer);
      - lvgl.label.update:
          id: date_label
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) t = id(sntp_time).now();
            if (!t.is_valid()) t = id(rx8130_time).now();
            if (!t.is_valid()) return std::string("--- --- -- ----");
            return t.strftime("%A %B %d %Y").c_str();

# Updates the battery status icon (level glyph + charging bolt) and percentage
  - id: update_battery
    mode: restart
    then:
      - lvgl.label.update:
          id: battery_icon_label
          text: !lambda |-
            // Charging when current flows into the pack (INA226: negative = charging)
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            // STAT asserted AND current into pack (INA226: negative) proves a pack is charging
            bool have_batt = id(battery_present) || is_charging;
            // External power, no battery -> charger flaps, pack absent
            if (!have_batt) return std::string("\U000F1C3C");  // mdi:power-plug-battery-outline
            float p = id(battery_percent).state;
            if (isnan(p)) return std::string("\U000F0083");  // mdi:battery-alert (no reading)
            int lvl = (int) (roundf(p / 10.0f) * 10);        // nearest 10%
            if (lvl > 100) lvl = 100;
            if (lvl < 0) lvl = 0;
            if (is_charging) {
              switch (lvl) {
                case 100: return std::string("\U000F0085");  // mdi:battery-charging-100
                case 90:  return std::string("\U000F008B");  // mdi:battery-charging-90
                case 80:  return std::string("\U000F008A");  // mdi:battery-charging-80
                case 70:  return std::string("\U000F089E");  // mdi:battery-charging-70
                case 60:  return std::string("\U000F0089");  // mdi:battery-charging-60
                case 50:  return std::string("\U000F089D");  // mdi:battery-charging-50
                case 40:  return std::string("\U000F0088");  // mdi:battery-charging-40
                case 30:  return std::string("\U000F0087");  // mdi:battery-charging-30
                case 20:  return std::string("\U000F0086");  // mdi:battery-charging-20
                default:  return std::string("\U000F089C");  // mdi:battery-charging-10
              }
            }
            switch (lvl) {
              case 100: return std::string("\U000F0079");    // mdi:battery (full)
              case 90:  return std::string("\U000F0082");    // mdi:battery-90
              case 80:  return std::string("\U000F0081");    // mdi:battery-80
              case 70:  return std::string("\U000F0080");    // mdi:battery-70
              case 60:  return std::string("\U000F007F");    // mdi:battery-60
              case 50:  return std::string("\U000F007E");    // mdi:battery-50
              case 40:  return std::string("\U000F007D");    // mdi:battery-40
              case 30:  return std::string("\U000F007C");    // mdi:battery-30
              case 20:  return std::string("\U000F007B");    // mdi:battery-20
              case 10:  return std::string("\U000F007A");    // mdi:battery-10
              default:  return std::string("\U000F008E");    // mdi:battery-outline (empty)
            }
          text_color: !lambda |-
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            bool have_batt = id(battery_present) || is_charging;
            if (!have_batt) return lv_color_hex(0xA8DADC); // on USB, no battery
            if (is_charging) return lv_color_hex(0x4CAF50);   // green while charging
            float p = id(battery_percent).state;
            if (!isnan(p) && p <= 15) return lv_color_hex(0xE53935); // red when low
            return lv_color_hex(0xA8DADC);
      - lvgl.label.update:
          id: battery_pct_label
          text: !lambda |-
            float i = id(battery_current).state;
            bool is_charging = id(charging).state || (!isnan(i) && i < -0.05f);
            if (!id(battery_present) && !is_charging) return std::string("");   // no SoC without a battery
            float p = id(battery_percent).state;
            if (isnan(p)) return std::string("--%");
            return std::to_string((int) roundf(p)) + "%";

  # Sets the wifi status glyph: signal strength when connected, wifi-off otherwise
  - id: update_wifi_icon
    mode: restart
    then:
      - lvgl.label.update:
          id: wifi_icon_label
          text: !lambda |-
            if (!wifi::global_wifi_component->is_connected()) return std::string("\U000F05AA");  // mdi:wifi-off
            float r = id(wifi_rssi).state;
            if (isnan(r)) return std::string("\U000F092F");             // mdi:wifi-strength-outline (unknown)
            if (r >= -55) return std::string("\U000F0928");             // mdi:wifi-strength-4
            if (r >= -65) return std::string("\U000F0925");             // mdi:wifi-strength-3
            if (r >= -75) return std::string("\U000F0922");             // mdi:wifi-strength-2
            if (r >= -85) return std::string("\U000F091F");             // mdi:wifi-strength-1
            return std::string("\U000F092F");                          // mdi:wifi-strength-outline (very weak)

lvgl:
  buffer_size: 100%
  byte_order: little_endian
  rotation: 270
  pages:
    - id: main_page
      bg_color: 0x0E1A2B
      widgets:
        - label:
            id: time_label
            align: CENTER
            y: -40
            text: "--:--"
            text_font: montserrat_48
            text_color: 0xF1FAEE
        - label:
            id: date_label
            align: CENTER
            y: 40
            text: "--- --- -- ----"
            text_font: montserrat_28
            text_color: 0xA8DADC
        - button:
            id: charge_btn
            align: CENTER
            y: 140
            width: 220
            height: 64
            checkable: true
            on_click:
              - logger.log: "Charge button tapped"
              - switch.toggle: charge_enable
            widgets:
              - label:
                  id: charge_btn_label
                  align: CENTER
                  text: "Charge"
                  text_font: montserrat_20
  top_layer:
    widgets:
      # Top-right status bar. ROW_REVERSE => first child sits furthest right.
      - obj:
          id: status_bar
          align: TOP_RIGHT
          width: 100%
          height: SIZE_CONTENT
          y: 8
          clickable: false
          bg_opa: TRANSP
          border_opa: TRANSP
          pad_right: 16
          layout:
            type: FLEX
            flex_flow: ROW_REVERSE
            flex_align_main: END
            flex_align_cross: CENTER
            pad_column: 16
          widgets:
            - label:
                id: battery_icon_label
                text: "\U000F0079"  # mdi:battery (full)
                text_font: mdi_icons
                text_color: 0xA8DADC
            - label:
                id: battery_pct_label
                text: "--%"
                text_font: montserrat_20
                text_color: 0xA8DADC
            - label:
                id: api_icon_label
                hidden: true
                text: "\uEF11"  # si:homeassistant
                text_font: si_icons
                text_color: 0xA8DADC
            - label:
                id: wifi_icon_label
                text: "\U000F05AA"  # mdi:wifi-off (until connected)
                text_font: mdi_icons
                text_color: 0xA8DADC

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

audio_dac:
  - platform: es8388
    id: es8388_dac

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

media_player:
  - platform: speaker
    name: tab5_media_player
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - rx8130.write_time:
        # Fill the labels in immediately instead of waiting for the next minute
        - script.execute: update_clock
  # Fallback once WiFi is up but HA isn't reachable; both sources sync the RTC
  - platform: sntp
    id: sntp_time
    on_time_sync:
      then:
        - rx8130.write_time:
        - script.execute: update_clock
  - platform: rx8130
    id: rx8130_time
    update_interval: never
    on_time:
      # The label only shows hours:minutes, so refresh on the minute boundary
      # (seconds == 0) rather than every few seconds.
      - seconds: 0
        minutes: '*'
        then:
          - script.execute: update_clock
